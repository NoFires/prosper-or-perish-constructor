  size: 512
  prompt: >-
    EU5-inspired hand-painted strategy-game icon for Clay Washmill, transparent background.
    Center a compact historical horse-powered pugmill with a circular brick-lined wash pit,
    upright wooden pugmill barrel, central vertical shaft, long horse-yoke beam, small horse
    silhouette, wet clay slurry, red clay heap, barrow, and shovel. Large readable 2D icon
    cluster filling most of the canvas, warm clay reds and ochres, tan brick, dark weathered
    wood, muted blue water, no text, no letters, no frame, no modern machinery, not
    photorealistic, not cartoonish.

