version: 2
tag: forest_village
upgrade_chain:
  family: forest_village
  tier: 0
  previous: null
  next: managed_forest_village
  unlock_advance: null
building:
  key: forest_village
  mode: REPLACE
  source: pp_food_buildings.txt
  production_method_slots:
    - name: slot_0
      methods:
        - pp_forest_village_base_leather
        - pp_forest_village_base_wild_game
        - pp_forest_village_base_fur
        - pp_forest_village_base_beeswax
    - name: slot_1
      methods:
        - pp_forest_village_no_primary
        - pp_forest_tannery
        - pp_hunting_lodges
        - pp_fur_trapping
        - pp_forest_village_forest_apiary
  possible_production_methods: []
  body: |2-
        is_foreign = no
        max_levels = forest_max_level
        # Staple-food producer buildings need to be manned first to avoid being outcompeted by non-food-related buildings.
        priority = 90
        pop_type = peasants
        category = village_category
        employment_size = 5
        rural_settlement = yes
        town = yes
        city = yes
        megalopolis = yes
        forbidden_for_estates = yes
        ai_forbid_shutdown = no
        location_potential = {
            OR = {
                vegetation = woods
                vegetation = forest
                vegetation = jungle
                raw_material = goods:lumber
                raw_material = goods:fur
                raw_material = goods:wild_game
            }
        }

        allow = {
            forest_capacity_available > 0
        }
        build_time = village_build_time
        unique_production_methods = {
            pp_forest_village_base_leather = {
                produced = leather
                output = 0.20
                category = building_maintenance
            }
            pp_forest_village_base_wild_game = {
                produced = wild_game
                output = 0.30
                category = building_maintenance
            }
            pp_forest_village_base_fur = {
                produced = fur
                output = 0.136
                category = building_maintenance
            }
            pp_forest_village_base_beeswax = {
                produced = beeswax
                output = 0.25
                category = building_maintenance
            }
        }
        unique_production_methods = {
            pp_forest_village_no_primary = {
                category = building_maintenance
            }
            pp_forest_tannery = {
                produced = leather
                output = 0.196
                sand = 0.1
                tar = 0.02
                wild_game = 0.4
                category = building_maintenance
            }
            pp_hunting_lodges = {
                produced = wild_game
                output = 0.315
                weaponry = 0.1
                debug_max_profit = 0
                category = building_maintenance
            }
            pp_fur_trapping = {
                produced = fur
                output = 0.318
                tools = 0.067 # traps, knives
                weaponry = 0.107 # hunting gear
                debug_max_profit = 0
                category = building_maintenance
            }
            pp_forest_village_forest_apiary = {
                cloth = 0.40
                produced = beeswax
                output = 0.63
                debug_max_profit = 0
                category = building_maintenance
            }
        }
        construction_demand = village_construction
        modifier = {
            # vanilla + injected (additive): 1.0-1.0=0, 0.1-0.1=0, 0.05-0.05=0
            local_monthly_food = 0.0
            local_peasants_estate_power = 0.25
            local_peasant_enfranchisment = 0.01
            local_laborers_desired_pop = 0.1
            local_soldiers_desired_pop = 0.05
        }
advancements:
  - key: pp_fur_trapping_advance_native
    body: |2-
          age = age_1_traditions
          unlock_production_method = pp_forest_village_base_fur
          unlock_production_method = pp_fur_trapping
          requires = agriculture_advance
          # icon = renaissance_advance
          ai_weight = { add = 50 }
          potential = {
              exists = capital
              original_capital ?= {
                  OR = {
                      sub_continent = sub_continent:north_asia
                      sub_continent = sub_continent:eastern_europe
                      sub_continent = sub_continent:central_asia
                      region = region:scandinavian_region
                  }
              }
          }
  - key: pp_fur_trapping_advance_colonial
    body: |2-
          age = age_3_discovery
          unlock_production_method = pp_forest_village_base_fur
          unlock_production_method = pp_fur_trapping
          requires = new_world_advance
          # icon = new_world_advance
          ai_weight = { add = 50 }
          potential = {
              exists = capital
              original_capital ?= {
                  AND = {
                      sub_continent = sub_continent:western_europe
                      NOT = { region = region:scandinavian_region }
                  }
              }
          }
  - key: pp_fur_trapping_advance_general
    body: |2-
          age = age_4_reformation
          unlock_production_method = pp_forest_village_base_fur
          unlock_production_method = pp_fur_trapping
          requires = global_trade_advance
          # icon = renaissance_advance
          ai_weight = { add = 50 }
          potential = {
              exists = capital
              NOT = {
                  OR = {
                      original_capital ?= {
                          OR = {
                              sub_continent = sub_continent:north_asia
                              sub_continent = sub_continent:eastern_europe
                              sub_continent = sub_continent:central_asia
                              region = region:scandinavian_region
                          }
                      }
                      original_capital ?= {
                          AND = {
                              sub_continent = sub_continent:western_europe
                              NOT = { region = region:scandinavian_region }
                          }
                      }
                  }
              }
          }
