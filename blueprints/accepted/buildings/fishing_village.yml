localization:
  entries:
    fishing_village_slot_0: Fishing grounds
    fishing_village_slot_1: Main Catch
    fishing_village_slot_2: Fishing method
    fishing_village_slot_3: Freshwater Works
    pp_arctic_fishing_village_maintenance: Arctic Fishing Village Maintenance
    pp_fishing_village_base_fish: Fishing Grounds
    pp_fishing_village_clinker_craft: Clinker boats
    pp_fishing_village_maintenance: Fishing Village Maintenance
    pp_fishing_village_no_freshwater_works: No Freshwater Works
    pp_fishing_village_no_primary: No Main Catch
    pp_fishing_village_strand_line: Handline fishing
    pp_fishing_village_stew_ponds: Stew Ponds
    pp_fishing_village_wattle_weirs: Wattle Fish Weirs
    pp_distant_water_fishing: Distant-Water Fishing
    pp_distant_water_fishing_desc: Organize provisioned schooner fleets for rich offshore grounds, supported by salt, victuals, and naval supplies.
    pp_herring_buss: The Herring Buss
    pp_herring_buss_desc: Develop broad-beamed herring busses, drift nets, barrels, and salt-curing routines for longer offshore fishing voyages.
    pp_managed_fishponds: Managed Fishponds
    pp_managed_fishponds_desc: Manage local ponds, banks, and timber sluices so village fishers can keep freshwater fish close to market.
    pp_steam_trawling: Steam Trawling
    pp_steam_trawling_desc: Use coal-fired steam trawlers and specialized tools to work deeper fishing grounds at industrial scale.
    pp_wattle_fish_weirs: Wattle Fish Weirs
    pp_wattle_fish_weirs_desc: Build wicker traps, wattle fences, and river weirs that guide local fish into village catches.

