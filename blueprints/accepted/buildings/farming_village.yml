advancements:
  - key: pp_rice_farm_advance_asian
    body: |2-
          age = age_1_traditions
          unlock_production_method = pp_rice_farm_base_rice
          unlock_production_method = pp_rice_farm_maintenance
          requires = agriculture_advance
          # icon = renaissance_advance
          ai_weight = { add = 50 }
          potential = {
              exists = capital
              original_capital ?= {
                  OR = {
                      sub_continent = sub_continent:east_asia
                      sub_continent = sub_continent:south_asia
                      sub_continent = sub_continent:south_east_asia
                      sub_continent = sub_continent:middle_east
                  }
              }
          }
