    iron_mine_improved_slot_0: Iron Deposit
    iron_mine_improved_slot_1: Ore Workings
    iron_mine_improved_slot_2: Ochre Recovery
    iron_mine_improved: Iron Mine
    iron_mine_improved_desc: Timbered ore workings use better dressing floors, haulage, and gangue sorting to raise iron output from true ore deposits, while ochre washers recover minor pigment earths distinct from bog-iron smelting.
    pp_iron_mine_improved_base_iron: Surveyed Iron Ore
    pp_iron_mine_improved_no_primary: No Iron Mining
    pp_iron_mine_improved_iron: Timbered Ore Workings
    pp_iron_mine_improved_slitting_dressed_ore: Slitting-Mill Ore Dressing
    pp_iron_mine_improved_horse_whim_haulage: Horse-Whim Haulage
    pp_iron_mine_improved_ore_dressing_floors: Ore Dressing Floors
    pp_iron_mine_improved_no_secondary: No Ochre Recovery
    pp_iron_mine_improved_ochre: Ochre Washing
    pp_iron_mine_improved_price: Iron Mine Price
    efficient_mining: Ore Dressing
    efficient_mining_desc: Better mine surveys, timbering, haulage, and dressing floors separate useful iron ore from silica-rich gangue and other waste before smelting.
    slitting_mills: Slitting Mills
    slitting_mills_desc: Water-powered slitting and rolling equipment turns smelted blooms and bars into more regular wrought iron, rewarding mines that can feed cleaner dressed ore into regional ironworks.
