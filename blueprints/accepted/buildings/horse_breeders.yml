version: 2
tag: horse_breeders
building:
  key: horse_breeders
  mode: REPLACE
  source: pp_building_adjustments.txt
  production_method_slots:
    - name: slot_0
      methods:
        - pp_horse_breeders_base_horses
    - name: slot_1
      methods:
        - pp_horse_breeders_pasture_herds
        - pp_horse_breeders_stud_yards
  possible_production_methods: []
  body: |2-
    is_foreign = no
    pop_type = laborers
    max_levels = rural_building_cap
    employment_size = 3
    category = rgo_building_category
    rural_settlement = yes
    town = yes
    city = yes
    megalopolis = yes

    location_potential = {
        OR = {
            raw_material = goods:horses
            market = {
                is_produced_in_market = goods:horses
            }
        }
    }

    allow = {
        OR = {
            climate = mediterranean
            climate = continental
            climate = oceanic
        }
    }

    unique_production_methods = {
        pp_horse_breeders_base_horses = {
            produced = horses
            output = 0.300
            category = building_maintenance
        }
    }
    unique_production_methods = {
        pp_horse_breeders_pasture_herds = {
            category = building_maintenance
        }
        pp_horse_breeders_stud_yards = {
            wheat = 1.300 # fodder grain
            leather = 0.140 # tack and harness
            produced = horses
            output = 0.667
            category = building_maintenance
        }
    }

    build_time = rural_build_time
    construction_demand = horse_breeders_construction
localization:
  entries:
    horse_breeders_slot_0: Horse Pastures
    horse_breeders_slot_1: Stud Yards
    pp_horse_breeders_base_horses: Horse Pastures
    pp_horse_breeders_pasture_herds: Pasture Herds
    pp_horse_breeders_stud_yards: Stud Yards

evaluation:
  allow_rules:
    input_throughput: Raw horse breeding intentionally uses low-value feed and tack below the global laborer throughput target.
    output_throughput: Raw horse breeding preserves the generated horse RGO baseline rather than the global laborer throughput target.
  production_methods:
    pp_horse_breeders_base_horses:
      production_efficiency: 1.00
    pp_horse_breeders_stud_yards:
      production_efficiency: 1.05
