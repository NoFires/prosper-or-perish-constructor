    stone_quarry_improved: Stone Dressing Yard
    stone_quarry_improved_desc: Dressing yards pair worked quarry faces with hoists, skids, and block benches so crews can square larger stones for transport. Waste rubble is broken and sorted for lesser construction uses.
    pp_stone_quarry_improved_base_stone: Surveyed Stone Face
    pp_stone_quarry_improved_no_primary: No Block Dressing
    pp_stone_quarry_improved_crane_winch_quarrying: Crane-and-Winch Quarrying
    pp_stone_quarry_improved_ox_haulage: Ox-Drawn Block Haulage
    pp_stone_quarry_improved_no_secondary: No Rubble Sorting
    pp_stone_quarry_improved_rubble_breaking: Rubble Breaking
    pp_stone_quarry_improved_price: Stone Dressing Yard Price
    pp_stone_quarry_improvements: Quarry Dressing
    pp_stone_quarry_improvements_desc: Better quarry logistics, block hoists, skids, and dressing benches let stone yards square larger blocks before transport.
icon:
  source_png: ../assets/icons/stone_quarry_improved.png
  output_dds: stone_quarry_improved.dds
  size: 512
  prompt: >-
    EU5-inspired hand-painted strategy-game icon for Stone Dressing Yard,
    transparent background. Center an early-modern stone quarry dressing yard
    with a gray quarry face, wedge-cut blocks, timber crane or gin pole with
    rope hoist, squared ashlar blocks, timber skids, dressing bench, hand tools,
    wicker baskets, and draft-haulage yoke. Use readable painterly historical
    UI art, natural stone grays, weathered wood browns, muted rope and leather
    tans, no text, no letters, no frame, no modern machinery, not photorealistic,
    not cartoonish.

