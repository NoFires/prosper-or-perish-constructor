icon:
  source_png: ../assets/icons/sand_washery.png
  output_dds: sand_washery.dds
  size: 512
  prompt: >-
    EU5-inspired hand-painted strategy-game icon for Sand Washery, transparent background.
    Center a compact historical sand and gravel washing plant with an inclined perforated
    barrel screen with iron bands, overhead water pipe, wooden flume, rectangular settling
    tank, water pouring through, pale sand stockpiles, small barrow, and shovel. Large readable
    2D icon cluster filling most of the canvas, pale sand cream, dark wet wood, iron bands,
    muted blue water, no text, no letters, no frame, no modern engines, no conveyor belts,
    not photorealistic, not cartoonish.

