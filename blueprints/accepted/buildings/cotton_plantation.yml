version: 2
tag: cotton_plantation
building:
  key: cotton_plantation
  mode: REPLACE
  source: pp_building_adjustments.txt
  production_method_slots:
    - name: slot_0
      methods:
        - pp_cotton_plantation_base_cotton
    - name: slot_1
      methods:
        - pp_cotton_plantation_field_picking
        - pp_cotton_plantation_gin_house
  possible_production_methods: []
  body: |2-
    is_foreign = no
    pop_type = slaves
    max_levels = farm_max_level
    employment_size = plantation_employment
    category = colonial_category

    location_potential = {
        raw_material = goods:cotton
        OR = {
            is_overseas_for_owner = yes
            owner ?= { is_colonial_subject = yes }
        }
    }

    allow = {
        farm_capacity_available > 0
    }

    rural_settlement = yes
    town = yes
    city = yes
    megalopolis = yes
    always_add_demands = yes
    price = pp_plantation_building_price
    build_time = plantation_build_time

    unique_production_methods = {
        pp_cotton_plantation_base_cotton = {
            produced = cotton
            output = 0.300
            category = building_maintenance
        }
    }
    unique_production_methods = {
        pp_cotton_plantation_field_picking = {
            category = building_maintenance
        }
        pp_cotton_plantation_gin_house = {
            slaves_goods = 0.320 # plantation gangs
            lumber = 0.280 # drying sheds
            leather = 0.080 # picking bags
            tools = 0.034 # ginning rollers
            produced = cotton
            output = 0.667
            category = building_maintenance
        }
    }

    modifier = {
        local_cotton_output_modifier = 0.1
        local_slave_pop_satisfaction = -0.005
    }
    construction_demand = plantation_construction
localization:
  entries:
    cotton_plantation_slot_0: Cotton Fields
    cotton_plantation_slot_1: Picking & Ginning
    pp_cotton_plantation_base_cotton: Cotton Fields
    pp_cotton_plantation_field_picking: Field Picking
    pp_cotton_plantation_gin_house: Gin House

evaluation:
  building:
    employment_size: 1.0
  allow_rules:
    input_throughput: Plantation worked input scale preserves the generated raw cotton RGO baseline.
    output_throughput: Plantation worked output scale preserves the generated raw cotton RGO baseline.
    amortization_months: Plantation price is shared with vanilla plantation economics and intentionally outside generic raw payback cadence.
  production_methods:
    pp_cotton_plantation_base_cotton:
      production_efficiency: 1.00
      allow_rules:
        base_output_per_1k: Plantation employment is smaller than the generic laborer raw-site baseline, so the 30% base share is high per 1k.
    pp_cotton_plantation_gin_house:
      production_efficiency: 1.05
