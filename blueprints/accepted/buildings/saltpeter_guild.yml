version: 2
tag: saltpeter_guild
building:
  key: saltpeter_guild
  mode: REPLACE
  source: pp_building_adjustments.txt
  production_method_slots:
    - name: slot_0
      methods:
        - pp_saltpeter_guild_demands
  possible_production_methods: []
  body: |2-
    is_foreign = no
    pop_type = burghers
    max_levels = guild_max_level
    category = basic_industry_category
    employment_size = guild_employment
    town = yes
    city = yes
    megalopolis = yes
    build_time = guild_build_time

    location_potential = {
        NOT = { raw_material = goods:saltpeter }
        market ?= {
            is_produced_in_market = goods:livestock
            is_produced_in_market = goods:clay
        }
    }

    unique_production_methods = {
        pp_saltpeter_guild_demands = {
            pottery = 0.2
            livestock = 1.0
            produced = saltpeter
            output = 1
            category = guild_input
        }
    }

    custom_tags = { guild }
    construction_demand = guild_construction
localization:
  entries:
    saltpeter_guild_slot_0: Saltpeter Guild Demands
    pp_saltpeter_guild_demands: Saltpeter Guild Demands

evaluation:
  building:
    employment_size: 0.1
  allow_rules:
    profit_percent: Vanilla saltpeter guild economics are preserved; this replacement only adds raw-saltpeter anti-overlap.
    input_throughput: Vanilla saltpeter guild economics are preserved; this replacement only adds raw-saltpeter anti-overlap.
    output_throughput: Vanilla saltpeter guild economics are preserved; this replacement only adds raw-saltpeter anti-overlap.
    amortization_months: Vanilla saltpeter guild economics are preserved; this replacement only adds raw-saltpeter anti-overlap.
