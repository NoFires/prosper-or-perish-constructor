    lumber_improvements_absolutism_desc: Surveyed stands, harvest registers, forest ordinances, and improved saw frames turn scattered woodland cutting into a larger planned saw-works system.
    lumber_mill_improved: Planned Saw Works
    lumber_mill_improved_desc: Planned saw works combine managed timber stands, forest ordinances, log landings, and improved saw frames. They move far more wood by employing larger crews and consuming more supplies, not by making lumber extraction inherently more profitable.
