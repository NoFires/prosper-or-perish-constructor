l_simp_chinese:
  # Prosper or Perish - Agricultural & Fishing Innovations (regional variants reuse same text)
  pan_amalgamation_advance: "混汞法"
  pan_amalgamation_advance_desc: "汞齐化提高了从碎矿石中回收贵金属的效率，支持了更大的金矿捣碎机、扩建的炼汞炉以及更可靠的汞供应。"
  pp_herring_buss_north_sea: "鲱鱼捕捞船"
  pp_herring_buss_north_sea_desc: "平底船充当了浮动工厂。船员们可以在海上直接捕捞鲱鱼、去除内脏，并用盐腌制后装入桶中，使渔船能够连续数周出海作业，而无需每日返港。"
  pp_herring_buss_coastal: "鲱鱼捕捞船"
  pp_herring_buss_coastal_desc: "平底船充当了浮动工厂。船员们可以在海上直接捕捞鲱鱼、去除内脏，并用盐腌制后装入桶中，使渔船能够连续数周出海作业，而无需每日返港。"
  pp_herring_buss_general: "鲱鱼捕捞船"
  pp_herring_buss_general_desc: "平底船充当了浮动工厂。船员们可以在海上直接捕捞鲱鱼、去除内脏，并用盐腌制后装入桶中，使渔船能够连续数周出海作业，而无需每日返港。"
  pp_grand_banks_fishery_early: "远洋渔业"
  pp_grand_banks_fishery_early_desc: "船队不再局限于本国港口附近捕鱼，而是开始跨越海洋开发远洋渔场，并带着腌制好的渔获返航。这种从近海到远洋捕捞的转变，极大地拓展了渔业规模与辐射范围，使腌鳕鱼成为全球性商品。"
  pp_grand_banks_fishery_maritime: "远洋渔业"
  pp_grand_banks_fishery_maritime_desc: "船队不再局限于本国港口附近捕鱼，而是开始跨越海洋开发远洋渔场，并带着腌制好的渔获返航。这种从近海到远洋捕捞的转变，极大地拓展了渔业规模与辐射范围，使腌鳕鱼成为全球性商品。"
  pp_grand_banks_fishery_general: "远洋渔业"
  pp_grand_banks_fishery_general_desc: "船队不再局限于本国港口附近捕鱼，而是开始跨越海洋开发远洋渔场，并带着腌制好的渔获返航。这种从近海到远洋捕捞的转变，极大地拓展了渔业规模与辐射范围，使腌鳕鱼成为全球性商品。"
  pp_steam_trawling_north_sea: "蒸汽拖网捕捞"
  pp_steam_trawling_north_sea_desc: "蒸汽机在渔船上的应用使它们能够不受风力和天气影响，持续地在海底拖拽巨大的渔网，从而实现了海洋捕捞的工业化。"
  pp_steam_trawling_general: "蒸汽拖网捕捞"
