l_simp_chinese:
 pp_mod_welcome_situation: "欢迎来到《兴衰存亡》模组"
 pp_mod_welcome_situation_desc: "#T 游戏起始设置#!\n在游戏规则中设置较高的#high 玩家建筑维护费用#!有助于AI遵循历史轨迹发展，但也会让游戏更具挑战性。如果你经验丰富，或是想扮演较大的国家，我推荐启用此选项。\n\n如果你希望AI脱离历史轨迹发展并获得更艰难的挑战，可以在游戏规则中使用『兴衰存亡』（Prosper or Perish，后文全部称为『兴衰存亡）的“更难AI”设置。\n\n你也可以根据自己的偏好关闭[pp_variable_harvests|e]。\n\n#T 兼容性#!\n想继续玩旧的存档？请阅读[Link('百科', '', 'lateralview_encyclopedia_entry_name')]中的[pp_faq|e]，了解如何安装旧版本的模组。\n\n否则，如果你注意到有更新，请开始新游戏。\n\n如果你想使用其他模组，风险自负。我建议始终将『兴衰存亡』放在模组加载列表的最下方，并在观察者模式下运行你的模组列表约半小时，以确保一切看起来正常。\n\n『兴衰存亡』与Faster Universalis兼容。\n\n#T 文档#!\n我已在[Link('百科', '', 'lateralview_encyclopedia_entry_name')]中详细记录了《兴衰存亡》模组的内容；打开它的按钮位于你屏幕的右上角。\n\n#T 0.7.0版本更新（2026年3月23日）#!\n在此补丁中，我添加了更多地图模式；更好且更多的烹饪食谱；来自地点原产、植被、气候、地形、河流和湖泊的农耕产品获得了更精细的加成。此外，一如既往，还有许多其他更改。\n\n#T 0.7.1版本更新（2026年3月25日）#!\n此更新与旧存档兼容；它可能只会导致一些轻微的经济问题，这些问题在正在进行的游戏中应该会很快得到解决。\n\n修复了几个漏洞。劳工建筑的容量已增加。种马场、锯木厂和纤维作物农场的就业规模已从1千人增加到3千人。"
