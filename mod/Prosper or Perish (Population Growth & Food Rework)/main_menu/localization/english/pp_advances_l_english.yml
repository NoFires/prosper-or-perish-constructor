l_english:
  # Prosper or Perish - Agricultural & Fishing Innovations (regional variants reuse same text)
  pan_amalgamation_advance: "Pan Amalgamation"
  pan_amalgamation_advance_desc: "Mercury amalgamation improves the recovery of precious metals from crushed ore, supporting larger gold stamp mills, expanded quicksilver retorts, and more reliable mercury supply."
  pp_herring_buss_north_sea: "The Herring Buss"
  pp_herring_buss_north_sea_desc: "Broad-bottomed ships functioned as floating factories. Crews could catch, gut, and salt-cure herring in barrels while still at sea, allowing fishing fleets to stay out for weeks instead of returning daily."
  pp_herring_buss_coastal: "The Herring Buss"
  pp_herring_buss_coastal_desc: "Broad-bottomed ships functioned as floating factories. Crews could catch, gut, and salt-cure herring in barrels while still at sea, allowing fishing fleets to stay out for weeks instead of returning daily."
  pp_herring_buss_general: "The Herring Buss"
  pp_herring_buss_general_desc: "Broad-bottomed ships functioned as floating factories. Crews could catch, gut, and salt-cure herring in barrels while still at sea, allowing fishing fleets to stay out for weeks instead of returning daily."
  pp_grand_banks_fishery_early: "Distant-Water Fishing"
  pp_grand_banks_fishery_early_desc: "Instead of fishing only near home ports, fleets began crossing oceans to exploit distant fishing grounds and return with preserved catches. This shift from local to distant-water fishing dramatically expanded the scale and reach of the fishery, turning salt cod into a global commodity.\n\nUnlocks the Deep-water fishing production method for Fishing Villages."
  pp_grand_banks_fishery_maritime: "Distant-Water Fishing"
  pp_grand_banks_fishery_maritime_desc: "Instead of fishing only near home ports, fleets began crossing oceans to exploit distant fishing grounds and return with preserved catches. This shift from local to distant-water fishing dramatically expanded the scale and reach of the fishery, turning salt cod into a global commodity.\n\nUnlocks the Deep-water fishing production method for Fishing Villages."
  pp_grand_banks_fishery_general: "Distant-Water Fishing"
  pp_grand_banks_fishery_general_desc: "Instead of fishing only near home ports, fleets began crossing oceans to exploit distant fishing grounds and return with preserved catches. This shift from local to distant-water fishing dramatically expanded the scale and reach of the fishery, turning salt cod into a global commodity.\n\nUnlocks the Deep-water fishing production method for Fishing Villages."
  pp_steam_trawling_north_sea: "Steam Trawling"
  pp_steam_trawling_north_sea_desc: "The application of the steam engine to fishing vessels allowed them to drag massive nets along the sea floor continuously, regardless of wind or weather, industrializing ocean harvest."
  pp_steam_trawling_general: "Steam Trawling"
  pp_steam_trawling_general_desc: "The application of the steam engine to fishing vessels allowed them to drag massive nets along the sea floor continuously, regardless of wind or weather, industrializing ocean harvest."
