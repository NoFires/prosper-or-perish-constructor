l_english:
 pp_mod_welcome_situation: "Welcome to Prosper or Perish"
 pp_mod_welcome_situation_desc: "#T Update 0.8.0 Prosper or Perish: Foundations#!\nWelcome to the new update I call Foundations!\nIt shall serve as the basis for future updates.\nPlease expect tuning issues, polish issues, but hopefully not too many bugs!\n\nPlease familiarize yourself with the new update in the [pp_update_0_8_foundations|e] Europedia.\n\nBut in general this is by far the biggest update I have ever released by at least an order of magnitude.\nIt features:\n$BULLET$ Completely revamped RGO system to be building based and threw out RGOs. You now have interesting buildings with upgrades and advances and many production methods to get your raw resources.\n$BULLET$ ~50 new buildings, hundreds of new production methods, many new advances.\n$BULLET$ Additionally, I have now revamped the entire globe so each location has a unique set of local output modifiers for everything farmed (animals, plants). It is based on real-world datasets and an entire machine learning system to facilitate this.\n$BULLET$ The same thing happened to population capacity values.\n\n#T Game Start Settings#!\nHigher #high Player Building Maintenance#! in the game rules supports historical AI growth, but it makes the campaign harder. I recommend this if you are experienced and/or want to play larger nations.\n\nIf you want ahistorical AI growth and a harder challenge, you can use the P&P harder AI settings in the game rules.\n\nYou can also turn off [pp_variable_harvests|e] if you prefer.\n\n#T Compatibility#!\nWant to play an old savegame? Read [pp_faq|e] in [Link('encyclopedia', '', 'lateralview_encyclopedia_entry_name')] for how to install an older mod version.\n\nOtherwise, start a new game if you notice an update.\n\nIf you want to use other mods, use them at your own risk. I recommend loading P&P last ALWAYS and running your mod list in Observer mode for about half an hour to see if everything looks normal.\n\nP&P is compatible with Faster Universalis.\n\n#T Documentation#!\nI've documented Prosper or Perish extensively in [Link('encyclopedia', '', 'lateralview_encyclopedia_entry_name')]; the button to open it is in the top right of your screen."
