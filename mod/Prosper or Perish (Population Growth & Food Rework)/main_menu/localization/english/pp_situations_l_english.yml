l_english:
 pp_mod_welcome_situation: "Welcome to Prosper or Perish"
 pp_mod_welcome_situation_desc: "#T Update 0.8.1 Prosper or Perish#!\nThis is a minor balance update that is likely not save compatible, so I recommend restarting.\nOr continuing to play on the older version of the mod.\n\nAs usual, check out the Europedia for more detailed patch notes.\n\n#T Update 0.8.0 Prosper or Perish: Foundations#!\nWelcome to the new update I call Foundations.\nIt shall serve as the basis for future updates.\nPlease expect tuning issues and polish issues, but hopefully not too many bugs.\n\nPlease familiarize yourself with the new update in the Foundations Europedia page.\n\nThis is by far the biggest update I have ever released by at least an order of magnitude.\nIt features:\n$BULLET$ Completely revamped RGO system to be building based and threw out RGOs. You now have interesting buildings with upgrades and advances and many production methods to get your raw resources.\n$BULLET$ Around 50 new buildings, hundreds of new production methods, and many new advances.\n$BULLET$ The entire globe now has unique local output modifiers for farmed plants and animals, based on real-world datasets and a machine-learning support pipeline.\n$BULLET$ Population capacity values received the same kind of global pass.\n\n#T Game Start Settings#!\nHigher Player Building Maintenance in the game rules supports historical AI growth, but it makes the campaign harder. I recommend this if you are experienced or want to play larger nations.\n\nIf you want ahistorical AI growth and a harder challenge, you can use the P&P harder AI settings in the game rules.\n\nYou can also turn off Variable Harvests if you prefer.\n\n#T Compatibility#!\nWant to play an old savegame? Read the FAQ in the Europedia for how to install an older mod version.\n\nOtherwise, start a new game if you notice an update.\n\nIf you want to use other mods, use them at your own risk. I recommend loading P&P last ALWAYS and running your mod list in Observer mode for about half an hour to see if everything looks normal.\n\nP&P is compatible with Faster Universalis.\n\n#T Documentation#!\nI've documented Prosper or Perish extensively in the Europedia; the button to open it is in the top right of your screen."
