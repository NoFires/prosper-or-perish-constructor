est outcomes.\n\n#T The Mapmode:#!\nWhen viewing the Variable Harvests [situation|e], the map shows each location's current harvest state. Colors range from dark (failed harvests) to bright (exceptional harvests). locations where pops are [starving|e] or where the market has a negative food balance receive special highlighting to draw attention to food crises."
