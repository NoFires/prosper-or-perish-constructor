l_english:
  # Start generated location potential concept
  game_concept_pp_location_potential: "Location Potential"
  game_concept_pp_location_potential_desc: "Location Potential is the shared calculation behind Prosper or Perish per-location population capacity and local output modifiers.\n\nThe values combine in-game geography with external map-derived evidence. They are meant to represent how suitable each location is for supporting people and producing local raw materials.\n\n#T In-game factors:#!\n$BULLET$ Topography\n$BULLET$ Climate\n$BULLET$ Vegetation\n$BULLET$ River access\n$BULLET$ Lake access\n$BULLET$ Coastal access\n$BULLET$ Location RGO\n\n#T Out-of-game maps and evidence:#!\n$BULLET$ Soil data\n$BULLET$ GAEZ crop potential and suitability maps\n$BULLET$ HYDE historical population coverage\n$BULLET$ Freshwater food support maps\n$BULLET$ Marine food support maps\n$BULLET$ Livestock food support maps\n$BULLET$ Plant food support maps\n$BULLET$ Wild subsistence support maps\n$BULLET$ Land-use confidence maps\n$BULLET$ Water confidence maps\n\nThe modelling and pipeline for this are in the GitHub repo, but they are subject to change. The final numbers are generated by the constructor pipeline, then injected into the shared per-location static modifiers used by the mod."
  # End generated location potential concept
# Override vanilla River concept to document PP's river size scaling
game_concept_river_desc: "A [location|e] may have a River, a moving body of water.\n\nRivers are not navigable by [navies|e], but they impose a [crossing|e] combat malus on [armies|e] who attempt to enter a [location] with a River. Additionally, they slightly increase the [population_capacity|e] of a location.\n\nThis modifier is multiplied by river size."
# Europedia mod overview - appears under Game Concepts, searchable for "prosper", "perish", "harvest"
ENCYCLOPEDIA_PAGE_PROSPER_OR_PERISH: "Prosper or Perish"
game_concept_prosper_perish_mod: "Prosper or Perish (Mod)"
game_concept_prosper_perish_mod_desc: "#T The Mod:#!\nThis mod overhauls the food system until it is fundamentally different from vanilla. After hundreds of modifier and advance changes and many hours of balancing, food is now the primary driver of pop growth and migration—replacing the old ties to [pp_prosperity|e], Development and similar factors, which instead now shape food capacity and growth.\n\nYou will see a sharp split between rural farming locations urbanized rich cities, incentives for local manufacturing in provinces to ease capital-centric \"clumping,\" and higher infrastructure costs so Roads become a strategic choice rather than something to spam.\n\nThe core loop is simple: full province and low food prices mean strong growth and many other benefits; empty storages and high prices mean heavy emigration, pop demotion, death and other bad outcomes.\n\nThe mod adds new Buildings, new production methods and a new Trade good. When you create a new game, check the game rules for Prosper or Perish: you can disable [pp_variable_harvests|e] if you want a steadier food economy without yearly harvest swings. You can also make the campaign harder—higher player building upkeep, stronger AI food efficiency, or cheaper AI building upkeep—or leave everything on defaults for the standard mod experience.\n\nPlease read at least [pp_food|e] and [pp_food_consumption|e]; they should be enough to get you playing.\n\n#T Feedback:#!\nI really need feedback for specific regions—send it on Steam as a PM or in the mod comments. If some regions look weird or super ahistoric, show me where and I will try to fix it. Same with Cookery recipes: we may need to add more to represent some regions. Please confirm it is not caused by other mods before sending screenshots.\n\nThere are many other changes not covered here. If something is confusing or I forgot to document it, tell me and I will try to add it to this Europedia in the future.\n\n#T How I Add Features:#!\nI follow this checklist:\n\n$BULLET$ Is the mechanic fun to manage for the player?\n$BULLET$ Is the mechanic a concept that can be understood historically?\n$BULLET$ Is the AI able to handle the mechanic?\n\nI am fine with victuals not exactly representing how food was traded and produced historically. I am fine with numbers in-game for how much food a noble consumes or a peasant—these are abstractions to get the game working. I can imagine a noble eating very expensive food, which is the abstraction for why he needs \"more\" food. But if I cannot even imagine how it would make sense in our world, I will likely only add it to get the game working at all.\n\n#T Thanks:#!\nA sincere thank you to everyone who reported bugs, helped with balancing, and took the time to share feedback. Thank you as well to everyone who created compatibility patches and collections around Prosper or Perish, and to the EU5 Mod Coop Discord for the discussions, help, and support.\n\nA special thank you to Karkento for letting me spam him with ideas nonstop and for helping so much with balancing and ideas.\n\nAnd a special thank you to Regal Urangutan for creating the EU5 2.0 collection centered around P&P, and for always being ready to chat and excited to talk about EU5."
game_concept_pp_update_0_8_foundations: "Update 0.8: Foundations"
game_concept_pp_update_0_8_foundations_desc: "#T Update 0.8: Foundations#!\nPlaceholder page for the Foundations update.\n\n$BULLET$ RGO rework\n$BULLET$ Farming output modifier rework\n$BULLET$ Population capacity rework"
game_concept_prosper_or_perish: "Prosper or Perish"
game_concept_harvest_situation: "P&P: Variable Harvests"
game_concept_harvest_situation_desc: "Variable Harvests simulates yearly swings in farm output. Each September, regions receive a random harvest outcome affecting food goods prices. Can be turned off via the game rule at game start."
game_concept_pp_variable_harvests: "P&P: Variable Harvests"
game_concept_pp_variable_harvests_desc: "Variable Harvests simulates the historical variability of agriculture. Harvests are intended to matter most in the early game, when [rgo|e] output and food surpluses are tighter. As advances and [buildings|e] expand production capacity, the impact of individual harvest years diminishes.\n\nEach year in September, every [region|e] receives a random harvest outcome. Harvests do not directly impact food production; they affect farmed goods that are subject to yearly swings. Poor harvests raise prices of those goods, making [ShowGoodsName('victuals')|e] and then food more expensive; bountiful harvests ease the pressure. For how food prices affect [population_growth|e], [pp_prosperity|e], and [starving|e], see [pp_food|e].\n\n#T Optional Setting:#!\nVariable Harvests can be turned off. When creating a new game, disable the game rule \"P&P: Variable Harvests\" if you prefer a steadier food economy.\n\n#T Harvest Levels:#!\nThe system uses multiple harvest tiers. Each tier applies different modifiers to locations within the region. Click any harvest type for full modifier details:\n\n$BULLET$ [abysmal_harvest|e] — A disastrous harvest that severely reduces output of affected farmed goods.\n$BULLET$ [very_poor_harvest|e] — A poor harvest that significantly reduces output of affected farmed goods.\n$BULLET$ [poor_harvest|e] — A below-average harvest that reduces output of affected farmed goods.\n$BULLET$ [good_harvest|e] — An above-average harvest that boosts output of affected farmed goods.\n$BULLET$ [very_good_harvest|e] — An excellent harvest that significantly boosts output of affected farmed goods.\n$BULLET$ [bountiful_harvest|e] — An exceptional harvest that greatly boosts output of affected farmed goods.\n\n#T Impact by Good:#!\nHarvests affect different food goods to different degrees. Staples like [ShowGoodsName('fish')] are less subject to yearly swings, while crops such as [ShowGoodsName('wheat')] are more heavily impacted by regional harvest outcomes.\n\n#T The Mapmode:#!\nWhen viewing the Variable Harvests [situation|e], the map shows each location's current harvest state. Colors range from dark (failed harvests) to bright (exceptional harvests). locations where pops are [starving|e] or where the market has a negative food balance receive special highlighting to draw attention to food crises."
