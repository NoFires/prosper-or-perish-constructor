game_concept_very_poor_harvest_desc: "A poor regional harvest that reduces the output of affected farmed goods. Inspect an affected [location|e]'s harvest modifier for the current effects."
game_concept_poor_harvest: "Weak Harvest"
game_concept_poor_harvest_desc: "A weak regional harvest that lowers the output of affected farmed goods. Inspect an affected [location|e]'s harvest modifier for the current effects."
game_concept_good_harvest: "Strong Harvest"
game_concept_good_harvest_desc: "A strong regional harvest that improves the output of affected farmed goods. Inspect an affected [location|e]'s harvest modifier for the current effects."
game_concept_very_good_harvest: "Excellent Harvest"
game_concept_very_good_harvest_desc: "An excellent regional harvest that greatly improves the output of affected farmed goods. Inspect an affected [location|e]'s harvest modifier for the current effects."
game_concept_bountiful_harvest: "Exceptional Harvest"
game_concept_bountiful_harvest_desc: "An exceptional regional harvest that greatly improves the output of affected farmed goods. Inspect an affected [location|e]'s harvest modifier for the current effects."
# Game concepts for P&P feature landing page
game_concept_pp_faq: "F.A.Q."
game_concept_pp_faq_desc: "#T Q: This is overwhelming what do I even do?:#!\nPlay a small country. Build Cookeries to produce victuals in a province. Then build a Victuals Market there. Be careful with overbuilding and watch your province food like a hawk. That's basically it.\n\n#T Q: Why this somewhat games system of victual market?:#!\nOne of the main reasons is that there is NO way in vanilla to directly convert food \"goods\" into actual food for the food market. They are completely separate systems.\n\n#T Q: Why are laborers and soldiers considered \"upper class\" pops now?:#!\nSo they can demote during a famine. If they couldn't, you'd get endless death loops where peasants constantly promote to fill empty mining jobs only to instantly starve to death.\n\n#T Q: My economy crashes and everyone starves on day one. Is the mod broken?:#!\nTry not to leave your food slider maxed out all the time if you're struggling to afford it. It helps to let the global economy stabilize for the first few years. Also, make sure to load this mod last in your playset to prevent other mods from breaking it.\n\n#T Q: The variable harvest is too punishing. Will you nerf it?:#!\nI'd prefer not to, as it's designed to be impactful and make you plan ahead. However, if you find it too harsh for your playstyle, there are game settings available to turn it off.\n\n#T Q: Dude I got horrible harvests and no economy, now my people starve??:#!\nSometimes this happens. Depending on how you play and how rich your country is, you will be able to avoid it. But don't expect every country to be able to avoid it at all times. As with all things in this game, it's a trade-off: keeping only your core provinces fed, or bankrupting yourself to avoid starvation—it's your choice.\n\n#T Q: Why do buildings get more expensive the more you have in a location?:#!\nReal estate gets expensive in crowded cities. This is intended to encourage you to spread out and specialize your production centers instead of stacking 500 buildings in a single location.\n\n#T Q: Why does building up my city reduce my farm capacity?:#!\nBecause cities take up physical space. It represents the trade-off between a sprawling metropolis and open farmland. If you want to maximize a location's farm output, it's best to keep it rural.\n\n#T Q: Why don't trade goods give food directly anymore?:#!\nThe vanilla market system led to weird situations where you'd have a massive overproduction of food goods but zero actual food in the market, or vice versa. The vanilla food production modifiers are also a bit buggy and mathematically illogical right now, so this change makes the system much more reliable.\n\n#T Q: What is going on with the food price and its modifiers?:#!\nVery long story short, selling food has INSANE debuffs in vanilla. When market food reaches max or 0 the food price BUGS out completely. I had to go to great lengths to work around these bugs. The values may look wonky because of this, but this is intended and working great.\n\n#T Q: Province food storage does not show the correct modifier, what's going on?:#!\nThis is another EU5 beta visual bug. The modifier is actually applying and working correctly under the hood, the UI just isn't displaying it properly. I have reported this one as well.\n\n#T Q: Are my 14 other mods compatible with your mod?:#!\nI honestly couldn't tell you. I can't check compatibility for every possible combination of mods out there. P&P is compatible with Faster Universalis. Some great folks in the community have made compatibility patches, so I highly recommend searching for those! Otherwise, my best advice is to load Prosper and Perish last and just test it out to see how it runs.\n\n#T Q: I started a new game i see 5mio buildings being build, what is this bug?:#!\nIts not a bug, its a script that tries to build new buildings and farms so the game starting conditions make sense with the all the mods changes. Its aimed at reducing crazy starvation and other issues. It will be refined more based on your feedback\n\n#T Q: Okay i understand, any tips maybe?:#!\nYes, be VERY wary of spiritualism and aristocracy. The extra nobles and clerics you get in cities can be extremely painful, because they scale with your population. Also check estate buildings once in a while. Toll castles for example DOUBLE noble food consumption if your estate builds them.\n\n#T Q: Your Update ruined my save man.:#!\nDon't worry. All prior releases are found here https://github.com/JanB1989/ProsperOrPerish/releases . Just unzip the file, in there you find a folder (next to the readme) \"Prosper or Perish (Population Growth & Food Rework)\" and you just copy that into C:\\Users\\YourUserName\\Documents\\Paradox Interactive\\Europa Universalis V\\mod and you have it available in game.\n\n#T Q: Why can i only build granaries in the province Capital?:#!\nBecause in ingame terms this is where food decay is calculated and food enters the market from your province. Granaries now reduce food decay, so they should be built in the province capital.\n\n#T Q: Bro the estates spam victual markets everywhere:#!\nThis is needed for the AI to perform much better, remember you can just turn them off for no maintenance cost (dont destroy them they will rebuild)\n\n#T Q: Why do victuals add 0.001 food or whatever?:#!\nThis is so that victuals are considered food by the game, which means their price can also rise if food price is high in the market. You can ignore it since it's so miniscule.\n\n#T Q: How do I install the GitHub beta branch?:#!\nGo to https://github.com/JanB1989/ProsperOrPerish, open the branch menu, select the branch you want (such as beta), and download the latest ZIP. You can see when branches were last updated. The archive contains two folders; the mod is in \"Prosper or Perish (Population Growth & Food Rework)\". Copy that folder into your EU5 mod directory: Documents\\Paradox Interactive\\Europa Universalis V\\mod (for example C:\\Users\\YourUserName\\Documents\\Paradox Interactive\\Europa Universalis V\\mod)."
game_concept_pp_food_consumption: "P&P: Food Consumption"
game_concept_pp_food_consumption_desc: "There are many ways to reduce peasant food consumption (they are more focused on subsistence), which directly increases how much food they contribute to the market. It might be worth it for population-rich rural countries to use these modifiers to your advantage. They are not very useful for already highly urbanized countries, who should rather build their own food industry or just buy it from the market.\n\nFood consumption varies with many factors. When food is cheap, people consume more—less rationing, choosier diets. When food is expensive, they consume less: more frugal, more focused on survival. Because of this link to well-being, food consumption modifiers are strong and have wide effects.\n\n#T What Impacts Food Consumption:#!\nSeveral factors change how much pops consume:\n\n$BULLET$ Local food price on the market (cheap vs expensive)\n$BULLET$ [pp_province_current_food_storage|e] (growing vs shrinking)\n$BULLET$ [pp_prosperity|e] of the location\n$BULLET$ Winter severity\n$BULLET$ [pp_devastation|e] and recovery conditions\n$BULLET$ Pop type (nobles, clergy, burghers, laborers, peasants, soldiers each have different base consumption)\n\nSee [pp_food_storage|e] for how storage works.\n\n#T Cheap food in the market and High food Storages in Provinces:#!\nWhen food is cheap on the market and province storages are well stocked, locations receive [pp_cheap_food|e] and provinces with growing storage receive [pp_province_current_food_storage|e]. Effects scale by how far below the base price the food price is.\n\n#T Display Note:#!\nBecause of Paradox scaling, the maximum value you can actually get is only half of the value shown below.\n\n[ShowModifierEffect('cheap_food_in_location')]\n\n#T Expensive food in the market and Low food Storages in Provinces:#!\nWhen food is expensive on the market and province storages are low or empty, locations receive [pp_expensive_food|e]. People consume less—they get more out of their food, are less picky, and minds focus on feeding families. Other priorities fall by the wayside. Effects scale by how far above the base price the food price is.\n\n#T Display Note:#!\nBecause of Paradox scaling, the maximum value you can actually get is only half of the value shown below.\n\n[ShowModifierEffect('expensive_food_in_location')]\n\nFood consumption modifiers are deliberately strong because consumption is tightly linked to living standards, labor quality, and social stability. [pp_prosperity|e] reinforces the loop: high food availability boosts prosperity, and prosperity in turn supports higher consumption and [population_growth|e].\n\n#T When You Run Out of food:#!\nWhen storages are empty, a province receives [ShowModifier('province_starving')]. People try to feed themselves by any means necessary. [pp_devastation|e] tends to rise, pops demote to lower classes that consume less, and people starve. Supply limit drops, migration attraction plummets, life expectancy falls, and people flee. [pp_prosperity|e] crashes. Soldiers are less willing to defend [starving|e] cities. See [pp_food_storage|e] and [pp_starvation|e].\n\n[ShowModifierEffect('province_starving')]\n\n#T Devastation:#!\n[pp_devastation|e] is best avoided and is caused by starvation or other horrible conditions (blockades, sieges, etc.). For full modifier details and the inversion note (devastation scales 0 to -100%).\n\n[ShowModifierEffect('devastation')]"
game_concept_pp_other_changes: "Other Changes"
game_concept_pp_other_changes_desc: "This section covers Buildings in Location, Available Free Land, Abundant Free Land, Prosperity, Devastation, Cheap Food, Expensive Food, Province Current Food Storage, and Starvation. Use the cards below for details on each topic."
game_concept_pp_victuals: "P&P: New Trade Goods"
game_concept_pp_victuals_desc: "[ShowGoodsName('victuals')|e] are prepared meals, provisions, and rations for civilians, armies, and navies.\n\nThey are produced by [ShowBuildingTypeName('cookery')|e] and [ShowBuildingTypeName('victualling_yard')|e], then distributed locally as food through [ShowBuildingTypeName('victuals_market')|e]. Exact conversion and method details are shown on the building tooltips. See [pp_cookery|e] for the building overview."
game_concept_pp_cookery: "P&P: New Buildings"
game_concept_pp_cookery_desc: "#T P&P Buildings#!\nProsper or Perish adds and rewrites many buildings. The exact inputs, outputs, unlocks, and modifiers are shown in the building and production-method tooltips; this page is only orientation.\n\n#T Victuals Buildings:#!\n[ShowBuildingTypeName('cookery')|e] and [ShowBuildingTypeName('victualling_yard')|e] refine regional food goods into [ShowGoodsName('victuals')|e]: meals, provisions, and rations. [ShowBuildingTypeName('victuals_market')|e] distributes those victuals locally as food for the population.\n\n#T Non-Farming Raw Goods:#!\nNon-farming raw-good buildings, such as [ShowBuildingTypeName('iron_mine')|e], usually have a simple base method that mainly uses population and produces the raw good inefficiently. More advanced production methods use more inputs, refined goods, animals, tools, and later unlocks to produce more and employ workers more efficiently.\n\nMany deposits historically produced multiple useful materials. A lead vein could be galena with silver, and iron ore workings could recover ochre for dyes. I used historical byproducts where I could, so raw-good buildings can have multiple outputs when that fits.\n\nSome buildings also have specific beneficial or detrimental location modifiers. A deeper or riskier mine can hurt [population_growth|e] because the work is dangerous, while still increasing migration attraction because it draws fortune seekers and workers chasing wages.\n\n#T Agriculture:#!\nAgricultural buildings work in the same general style. Base methods give a simple local production option, while better methods use more inputs and unlock over time. Many buildings can choose between related crops or animal outputs, and many have upgrade chains.\n\nFor whether a building fits a location, check its own building tooltip. For how many rural buildings fit, see [pp_farm_capacity|e]. For how productive they are, see [pp_farm_output|e]."
game_concept_pp_population_distribution: "Population Distribution"
game_concept_pp_population_distribution_desc: "The local and the global distribution of your population and their literacy (which estate they belong to) has different benefits for your country.\n\n#T Local impacts:#!\nThese effects apply per location and depend on the types and literacy of pops in that location:\n\n$BULLET$ #Y Literacy impact:#! Literate pops of a given type give local bonuses.\n$BULLET$ [ShowPopTypeName('laborers')]: Maximum RGO Size, raw material output\n$BULLET$ [ShowPopTypeName('peasants')]: wheat, rice, millet, maize, legumes, fruit, olives, potato, livestock, beeswax, wool, fish, wild game, fur, and victuals output modifiers\n$BULLET$ #Y Pop percentage impact:#! The share of each pop type in a location matters.\n$BULLET$ [ShowPopTypeName('laborers')]: monthly development\n$BULLET$ [ShowPopTypeName('soldiers')]: max control\n$BULLET$ [ShowPopTypeName('peasants')]: devastation recovery, construction speed, build cost\n$BULLET$ #Y Unemployed peasants:#! Locations with unemployed peasants receive negative modifiers to monthly development and institution growth.\n\n#T Global impacts:#!\nThese effects apply country-wide based on your overall population distribution:\n\n$BULLET$ [ShowPopTypeName('burghers')] share in country: monthly development, monthly prosperity, merchant capacity modifier\n$BULLET$ [ShowPopTypeName('peasants')] share in country: institution growth modifier (negative)\n$BULLET$ [ShowPopTypeName('soldiers')] share in country: max control"
game_concept_pp_food_in_eu5: "Food in EU5"
game_concept_pp_food_in_eu5_desc: "#T Food in Vanilla EU5:#!\nFood in Europa Universalis 5 is tricky to understand because food goods and actual food split into separate systems.\n\nVanilla food has three main sources:\n\n$BULLET$ #Y Food goods#! such as rice, livestock, wheat, and fish. The amount produced is multiplied by that good's food value.\n$BULLET$ #Y Subsistence agriculture#! from unemployed peasants. This creates food directly and is not tied to a trade good.\n$BULLET$ #Y Flat food sources#! from buildings. These create food directly and are not tied to a food trade good.\n\nThose sources are summed in the location and then multiplied by local food productivity. After that, the trade good and the food are separate. The good enters the goods market through market access. The food enters the province food storage, which is shared by all locations in that province.\n\nLocations can have a food surplus or deficit. They resolve that against province storage first. If storage is high enough, the province can sell food into the food market that the province capital belongs to. If the country buys food, provinces can draw food back from that market.\n\nThe biggest problems are:\n\n$BULLET$ A market can have huge food-good surpluses while the food market is empty and people starve, or the reverse. The split gets stranger as the game progresses.\n$BULLET$ Food productivity multiplies every local food source. A location with excellent farmland can end up multiplying fish, subsistence food, or flat building food in the same way.\n$BULLET$ Food RGOs scale too strongly with food productivity, so stacking food RGOs and productivity becomes dominant.\n$BULLET$ Some goods that could reasonably count as food or drink, such as beer and wine, have no food value.\n\n#T Prosper or Perish:#!\nProsper or Perish keeps the same broad food-storage system, but changes what feeds it.\n\nFood sources in Prosper or Perish are:\n\n$BULLET$ #Y [ShowGoodsName('victuals')|e]#!, the main food good. It represents meals, rations, and preserved provisions.\n$BULLET$ #Y Subsistence agriculture#! from unemployed peasants, as in vanilla.\n$BULLET$ #Y Absolute food sources#! from buildings such as [ShowBuildingTypeName('victuals_market')|e].\n\nHow the P&P system works:\n\n$BULLET$ Food productivity is removed. The goal is to keep [ShowGoodsName('victuals')|e] in the goods market connected to actual food availability.\n$BULLET$ Excess [ShowGoodsName('victuals')|e] can be converted into local food through [ShowBuildingTypeName('victuals_market')|e], or used by buildings such as docks and armories as rations and supplies.\n$BULLET$ [ShowBuildingTypeName('cookery')|e] turns many regional food goods into [ShowGoodsName('victuals')|e], so surplus grain, meat, fish, salt, and similar goods can feed the food chain through the goods market.\n$BULLET$ Instead of one food productivity modifier, locations now have raw-material output modifiers based on historical and geographic data. A location can be good at producing fish without making every other food source there explode.\n\nFor the practical P&P production chain, see [pp_food|e]. For local raw-material productivity, see [pp_farm_output|e]."
game_concept_pp_food: "P&P: Food Production"
game_concept_pp_food_desc: "#T What This Page Covers:#!\nThis page is about producing food in Prosper or Perish. For the vanilla food system and why P&P changes it, see [pp_food_in_eu5|e].\n\n#T Food Sources:#!\nP&P food comes from three places:\n\n$BULLET$ [ShowBuildingTypeName('cookery')|e] and [ShowBuildingTypeName('victualling_yard')|e] refine regional goods into [ShowGoodsName('victuals')|e]. Since [ShowGoodsName('victuals')|e] have food value, producing them also creates food.\n$BULLET$ [ShowBuildingTypeName('victuals_market')|e] converts [ShowGoodsName('victuals')|e] into local food for the province.\n$BULLET$ Unemployed peasants still produce a small amount of subsistence food directly.\n\n#T The Production Chain:#!\nThe intended chain is simple:\n\n$BULLET$ Produce regional food goods such as grain, meat, fish, fruit, salt, and similar goods.\n$BULLET$ Turn those goods into [ShowGoodsName('victuals')|e] through [ShowBuildingTypeName('cookery')|e].\n$BULLET$ Use [ShowBuildingTypeName('victuals_market')|e] where a province needs direct local food.\n\n[ShowGoodsName('victuals')|e] are also useful as an input good for buildings such as docks and armories. The exact inputs, outputs, and conversion rates are shown in building and production-method tooltips.\n\n#T Local Production:#!\nFood productivity is removed. Raw materials instead use specific local output modifiers. A location can be strong at fish, grain, livestock, fruit, or another resource without making every food source in that location stronger.\n\nUse building tooltips, local output map modes, [pp_farm_output|e], and [pp_variable_harvests|e] to understand what a location is good at producing.\n\n#T Practical Rule:#!\nIf a province struggles with food, check whether it has enough raw food inputs, enough [ShowBuildingTypeName('cookery')|e] capacity, enough [ShowGoodsName('victuals')|e], and enough [ShowBuildingTypeName('victuals_market')|e] levels."
game_concept_pp_population_growth: "Population Growth"
game_concept_pp_population_growth_desc: "In general, abundance of food causes [population_growth|e]. Positive [population_growth|e] comes from two main sources: [pp_cheap_food|e] and [pp_province_current_food_storage|e].\n\nNegative [population_growth|e] comes from [pp_starvation|e], [pp_expensive_food|e], or low food storages in provinces.\n\n#T Balancing Modifiers:#!\nSome modifiers—such as negative [population_growth|e] in cities, towns, and rural locations—exist purely to balance out the positive modifiers and create an equilibrium. They have no other meaning.\n\n#T Population Capacity:#!\nWhen a location grows far above [pp_population_capacity|e], [population_growth|e] slowly goes down. Capacity can change through buildings, development, irrigation, advances, and other modifiers, but it is no longer meant to represent housing alone."
game_concept_pp_buildings_in_location: "P&P: Buildings in Location"
game_concept_pp_buildings_in_location_desc: "locations receive [ShowModifier('building_levels')] based on their total [building|e] levels. Buildings can increase [pp_population_capacity|e], but ordinary construction also pressures shared rural space; see [pp_urbanization|e] and [pp_farm_capacity|e].\n\n[ShowModifierEffect('building_levels')]"
game_concept_pp_available_free_land: "P&P: Available Free Land"
game_concept_pp_available_free_land_desc: "Locations below [pp_population_capacity|e] can receive [ShowModifier('available_free_land')]. When fewer people compete for the same land, they can choose better fields, pastures, fishing spots, and forest work sites instead of being forced onto marginal ground.\n\nThis improves farming and other rural raw-good output while the location has spare food-support potential. The bonus fades as population approaches capacity and is gone at full capacity. It is one of the main systems that makes locations become better or worse at farming as they fill up.\n\n[ShowModifierEffect('available_free_land')]"
game_concept_pp_abundant_free_land: "P&P: Abundant Free Land"
game_concept_pp_abundant_free_land_desc: "Locations far below [pp_population_capacity|e] can receive [ShowModifier('abundant_free_land')], the stronger free-land state. The logic is the same: with a lot of unused capacity, people have more choice and can work the best local farming spots first.\n\nAs population grows, this advantage declines and eventually disappears at full capacity. Exact effects are shown below and in the modifier tooltip.\n\n[ShowModifierEffect('abundant_free_land')]"
game_concept_pp_food_storage: "P&P: Food Storage"
game_concept_pp_food_storage_desc: "Storage mechanics for food determine how sieges and shortages play out. Empty storages lead to emigration, demotion, and death."
game_concept_pp_prosperity: "P&P: Prosperity"
game_concept_pp_prosperity_desc: "Prosperity is great for locations in the long term. In this mod, it is closely tied to food availability: cheap food and well-stocked storages boost prosperity, which in turn supports higher food consumption and [population_growth|e]. See [pp_food_consumption|e] for how food prices affect prosperity.\n\n#T Note:#!\nProsperity scales from 0% to 100%.\n\n[ShowModifierEffect('prosperity')]"
game_concept_pp_devastation: "P&P: Devastation"
game_concept_pp_devastation_desc: "Devastation has horrible consequences for locations. See [pp_food_consumption|e] for full context.\n\n#T Note:#!\nDevastation scales from 0 to -100%, so the values shown below are actually inverted at -100% devastation.\n\n[ShowModifierEffect('devastation')]"
game_concept_pp_province_current_food_storage: "P&P: Province Current Food Storage"
game_concept_pp_province_current_food_storage_desc: "A province with growing food storage receives [ShowModifier('positive_province_food_growth')]. This modifier scales with stored province food. See [pp_food_consumption|e] for context.\n\n[ShowModifierEffect('positive_province_food_growth')]"
game_concept_pp_positive_province_food_growth: "P&P: Province Food Growth from Storage"
game_concept_pp_positive_province_food_growth_desc: "Provinces with growing food storage receive [ShowModifier('positive_province_food_growth')]. This modifier scales with stored province food. See [pp_food_consumption|e] for context.\n\n[ShowModifierEffect('positive_province_food_growth')]"
game_concept_pp_cheap_food: "P&P: Cheap Food in Location"
game_concept_pp_cheap_food_desc: "When food is cheap on the market and province storages are well stocked, locations receive [ShowModifier('cheap_food_in_location')]. People consume more—less rationing, choosier diets. These effects scale depending on how far below the base price the food price is: the cheaper it gets, the stronger the modifier. See [pp_food_consumption|e] for full context.\n\n#T Display Note:#!\nBecause of Paradox scaling, the maximum value you can actually get is only half of the value shown below.\n\n[ShowModifierEffect('cheap_food_in_location')]"
game_concept_pp_expensive_food: "P&P: Expensive Food in Location"
game_concept_pp_expensive_food_desc: "When food is expensive on the market and province storages are low or empty, locations receive [ShowModifier('expensive_food_in_location')]. People consume less—they get more out of their food, are less picky, and minds focus on feeding families. These effects scale depending on how far above the base price the food price is: the more expensive it gets, the stronger the modifier. See [pp_food_consumption|e] for full context.\n\n#T Display Note:#!\nBecause of Paradox scaling, the maximum value you can actually get is only half of the value shown below.\n\n[ShowModifierEffect('expensive_food_in_location')]"
game_concept_pp_starvation: "P&P: Starvation"
game_concept_pp_starvation_desc: "When a province's food storage reaches 0, the pops will starve and die.\n\nThis gives the following effect:\n[ShowModifierEffect('province_starving')]"
game_concept_pp_urbanization: "P&P: Urbanization"
game_concept_pp_urbanization_desc: "Over Europa Universalis 5's timeframe, large parts of the rural population moved to cities. This was driven by rising rural productivity: as farms and other rural producers produced more with fewer hands, fewer people were needed in the countryside to feed everyone. You will naturally urbanize more over time as advances and investments raise [pp_farm_output|e].\n\nEach location represents a large area of land—many villages, some towns, and often cities. Building more in a location increases urbanization and thereby reduces parts of its [pp_farm_capacity|e]. It does not reduce the output of existing farms; it simply limits how many land-farm, forest, and lumber levels you can sustain. The trade-off is clear: urbanize a location for manufacturing and [pp_population_capacity|e], or keep it rural to maximize resource production. See [pp_farm_capacity|e] for how capacity is calculated, which buildings are affected, and how the building-order rules work.\n\n#T Affected buildings:#!\nThese rural buildings and building families lose capacity as you urbanize:\n\n$BULLET$ Land-farm buildings that use Building Capacity\n$BULLET$ Forest and lumber buildings that use Forest Capacity"
game_concept_pp_farm_capacity: "P&P: Building Capacity"
game_concept_pp_farm_capacity_desc: "Building Capacity is about how many rural raw-material building levels a location can sustain, not how much each building produces. For productivity, see [pp_farm_output|e]. Exact current values are shown in the relevant building and map-mode tooltips.\n\n#T Land Farm Capacity:#!\nThis pool governs [ShowBuildingTypeName('farming_village')|e], [ShowBuildingTypeName('model_farm')|e], orchards, animal farms, plantations, groves, gardens, sericulture farms, simplers groves, and vineyard estates.\n\nIts more static side comes from local farming suitability and matching agricultural RGOs. Its dynamic side changes with Maximum RGO Size, [pp_population_capacity|e], location rank, river access, irrigation and water-control buildings, farm-capacity modifiers, and urbanization pressure from other buildings in the location.\n\n#T Fishing Capacity:#!\nThis pool governs [ShowBuildingTypeName('fishing_village')|e], [ShowBuildingTypeName('ocean_fishery')|e], and [ShowBuildingTypeName('offshore_fishery')|e]. It does not govern [ShowBuildingTypeName('pearl_fishery')|e].\n\nIts more static side comes from coasts, lakes, wetlands, fish RGOs, and river size. Its dynamic side changes with Maximum RGO Size, Fishing Capacity modifiers such as town rights, and the amount of capacity already used by fish-producing buildings.\n\n#T Forest Capacity:#!\nThis pool governs [ShowBuildingTypeName('forest_village')|e], [ShowBuildingTypeName('managed_forest_village')|e], [ShowBuildingTypeName('lumber_mill')|e], [ShowBuildingTypeName('water_sawmill')|e], and [ShowBuildingTypeName('lumber_mill_improved')|e].\n\nIts more static side comes from forest geography and relevant RGOs. Its dynamic side changes with Maximum RGO Size, location rank, Forest Capacity modifiers, and urbanization pressure from other buildings in the location.\n\n#T Other Raw Material Buildings:#!\nOther raw material producing buildings, such as mines, quarries, saltworks, pearl fisheries, charcoal makers, ivory hunting camps, and similar buildings, do not use the three shared pools above. Their maximum level is governed by Rural Building Capacity.\n\nRural Building Capacity is a simpler cap influenced by the location's basic rural allowance, development, Maximum RGO Size, and river access.\n\n#T Building order:#!\nIf a location ends up above its available capacity, the system can remove excess rural building levels until the location is back within capacity. There is no lasting benefit to building around the limit."
game_concept_pp_fish_capacity: "P&P: Fishing Capacity"
game_concept_pp_fish_capacity_desc: "Fishing Capacity is the shared limit for fish-producing buildings: [ShowBuildingTypeName('fishing_village')|e], [ShowBuildingTypeName('ocean_fishery')|e], and [ShowBuildingTypeName('offshore_fishery')|e]. It does not govern [ShowBuildingTypeName('pearl_fishery')|e].\n\nNatural fishing grounds come from coasts, lakes, wetlands, fish RGOs, and river size. Fishing Capacity modifiers, including river size and town rights, add to the same pool and scale with Maximum RGO Size. Exact values are shown in the relevant building and map-mode tooltips. For the full capacity overview, see [pp_farm_capacity|e]."
game_concept_pp_forest_capacity: "P&P: Forest Capacity"
game_concept_pp_forest_capacity_desc: "Forest Capacity is the shared limit for forest and lumber buildings: [ShowBuildingTypeName('forest_village')|e], [ShowBuildingTypeName('managed_forest_village')|e], [ShowBuildingTypeName('lumber_mill')|e], [ShowBuildingTypeName('water_sawmill')|e], and [ShowBuildingTypeName('lumber_mill_improved')|e]. It does not govern charcoal makers, ivory hunting camps, mines, quarries, or processing buildings.\n\nCapacity comes from forest geography, relevant RGOs, Maximum RGO Size, rank, urbanization pressure, and Forest Capacity modifiers. Exact values are shown in the relevant building and map-mode tooltips. For the full capacity overview, see [pp_farm_capacity|e]."
game_concept_pp_farm_output: "P&P: Building Output"
game_concept_pp_farm_output_desc: "This entry is about how much rural raw-material buildings produce—their productivity—not how many you can build. For quantity, see [pp_farm_capacity|e].\n\nOver Europa Universalis 5's timeframe, rural productivity rose sharply. The mod reflects this by replacing vanilla's flat food modifier with per-good output modifiers. Each raw material can now gain or lose output independently.\n\nBuilding Output is affected by both inert and dynamic factors. Any of these can be beneficial or detrimental.\n\n#T Component one:#!\nDynamic factors that change over the game. Some regions or countries may gain access to productivity improvements earlier or later than others:\n\n$BULLET$ Advances\n$BULLET$ Societal choices\n$BULLET$ Development\n$BULLET$ Government reforms\n$BULLET$ [ShowBuildingTypeName('irrigation_systems')|e]\n\n#T Component two:#!\nInert factors tied to geography and location. Every location has a unique set of local output modifiers estimated from historical and geographic evidence:\n\n$BULLET$ Rainfall and water availability\n$BULLET$ Soil quality\n$BULLET$ Climate\n$BULLET$ Topography\n$BULLET$ Vegetation\n$BULLET$ The location's RGO\n\n#T Harvest:#!\nYearly harvest outcomes vary by region and can further boost or reduce agricultural output beyond the factors above. For full details on harvest levels and how they affect food production, see [pp_variable_harvests|e]."
game_concept_pp_population_capacity: "P&P: Population Capacity"
game_concept_pp_population_capacity_desc: "#T Population Capacity#!\nPopulation Capacity now roughly represents how many people a location can support through local food production, especially farming. It is no longer just housing.\n\nLocations below their capacity have spare food-support potential. This gives them farming output benefits because people can work better land first. The benefit fades as population approaches capacity.\n\n#T Static baseline:#!\nEvery location starts with its own baseline. This uses the same kind of evidence as [pp_farm_output|e]: historical population data, crop suitability, rainfall, water access, soil, climate, topography, vegetation, local RGOs, and other map data.\n\n#T What changes it:#!\nPopulation Capacity can change through development, buildings, advances, societal values, laws, location rank, and other modifiers.\n\n#T Where to inspect it:#!\nUse the Population Capacity map mode and location tooltips to inspect current values. See [pp_farm_capacity|e] for how Population Capacity feeds farming capacity, and [pp_location_potential|e] for the shared static model behind capacity and local output."
