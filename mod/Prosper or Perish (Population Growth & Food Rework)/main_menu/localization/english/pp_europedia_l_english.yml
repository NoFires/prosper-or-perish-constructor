# Game concepts for P&P feature landing page
game_concept_pp_faq: "F.A.Q."
game_concept_pp_faq_desc: "#T Q: This is overwhelming what do I even do?:#!\nPlay a small country. Build Cookeries to produce victuals in a province. Then build a Victuals Market there. Be careful with overbuilding and watch your province food like a hawk. That's basically it.\n\n#T Q: Why this somewhat games system of victual market?:#!\nOne of the main reasons is that there is NO way in vanilla to directly convert food \"goods\" into actual food for the food market. They are completely separate systems.\n\n#T Q: Why are laborers and soldiers considered \"upper class\" pops now?:#!\nSo they can demote during a famine. If they couldn't, you'd get endless death loops where peasants constantly promote to fill empty mining jobs only to instantly starve to death.\n\n#T Q: My economy crashes and everyone starves on day one. Is the mod broken?:#!\nTry not to leave your food slider maxed out all the time if you're struggling to afford it. It helps to let the global economy stabilize for the first few years. Also, make sure to load this mod last in your playset to prevent other mods from breaking it.\n\n#T Q: The variable harvest is too punishing. Will you nerf it?:#!\nI'd prefer not to, as it's designed to be impactful and make you plan ahead. However, if you find it too harsh for your playstyle, there are game settings available to turn it off.\n\n#T Q: Dude I got horrible harvests and no economy, now my people starve??:#!\nSometimes this happens. Depending on how you play and how rich your country is, you will be able to avoid it. But don't expect every country to be able to avoid it at all times. As with all things in this game, it's a trade-off: keeping only your core provinces fed, or bankrupting yourself to avoid starvation—it's your choice.\n\n#T Q: Why do buildings get more expensive the more you have in a location?:#!\nReal estate gets expensive in crowded cities. This is intended to encourage you to spread out and specialize your production centers instead of stacking 500 buildings in a single location.\n\n#T Q: Why does building up my city reduce my farm capacity?:#!\nBecause cities take up physical space. It represents the trade-off between a sprawling metropolis and open farmland. If you want to maximize a location's farm output, it's best to keep it rural.\n\n#T Q: Why don't trade goods give food directly anymore?:#!\nThe vanilla market system led to weird situations where you'd have a massive overproduction of food goods but zero actual food in the market, or vice versa. The vanilla food production modifiers are also a bit buggy and mathematically illogical right now, so this change makes the system much more reliable.\n\n#T Q: What is going on with the food price and its modifiers?:#!\nVery long story short, selling food has INSANE debuffs in vanilla. When market food reaches max or 0 the food price BUGS out completely. I had to go to great lengths to work around these bugs. The values may look wonky because of this, but this is intended and working great.\n\n#T Q: Province food storage does not show the correct modifier, what's going on?:#!\nThis is another EU5 beta visual bug. The modifier is actually applying and working correctly under the hood, the UI just isn't displaying it properly. I have reported this one as well.\n\n#T Q: Are my 14 other mods compatible with your mod?:#!\nI honestly couldn't tell you. I can't check compatibility for every possible combination of mods out there. P&P is compatible with Faster Universalis. Some great folks in the community have made compatibility patches, so I highly recommend searching for those! Otherwise, my best advice is to load Prosper and Perish last and just test it out to see how it runs.\n\n#T Q: I started a new game i see 5mio buildings being build, what is this bug?:#!\nIts not a bug, its a script that tries to build new buildings and farms so the game starting conditions make sense with the all the mods changes. Its aimed at reducing crazy starvation and other issues. It will be refined more based on your feedback\n\n#T Q: Okay i understand, any tips maybe?:#!\nYes, be VERY wary of spiritualism and aristocracy. The extra nobles and clerics you get in cities can be extremely painful, because they scale with your population. Also check estate buildings once in a while. Toll castles for example DOUBLE noble food consumption if your estate builds them.\n\n#T Q: Your Update ruined my save man.:#!\nDon't worry. All prior releases are found here https://github.com/JanB1989/ProsperOrPerish/releases . Just unzip the file, in there you find a folder (next to the readme) \"Prosper or Perish (Population Growth & Food Rework)\" and you just copy that into C:\\Users\\YourUserName\\Documents\\Paradox Interactive\\Europa Universalis V\\mod and you have it available in game.\n\n#T Q: Why can i only build granaries in the province Capital?:#!\nBecause in ingame terms this is where food decay is calculated and food enters the market from your province. Granaries now reduce food decay, so they should be built in the province capital.\n\n#T Q: Bro the estates spam victual markets everywhere:#!\nThis is needed for the AI to perform much better, remember you can just turn them off for no maintenance cost (dont destroy them they will rebuild)\n\n#T Q: Why do victuals add 0.001 food or whatever?:#!\nThis is so that victuals are considered food by the game, which means their price can also rise if food price is high in the market. You can ignore it since it's so miniscule.\n\n#T Q: How do I install the GitHub beta branch?:#!\nGo to https://github.com/JanB1989/ProsperOrPerish, open the branch menu, select the branch you want (such as beta), and download the latest ZIP. You can see when branches were last updated. The archive contains two folders; the mod is in \"Prosper or Perish (Population Growth & Food Rework)\". Copy that folder into your EU5 mod directory: Documents\\Paradox Interactive\\Europa Universalis V\\mod (for example C:\\Users\\YourUserName\\Documents\\Paradox Interactive\\Europa Universalis V\\mod)."
game_concept_pp_food_consumption: "P&P: Food Consumption"
game_concept_pp_food_consumption_desc: "There are many ways to reduce peasant food consumption (they are more focused on subsistence), which directly increases how much food they contribute to the market. It might be worth it for population-rich rural countries to use these modifiers to your advantage. They are not very useful for already highly urbanized countries, who should rather build their own food industry or just buy it from the market.\n\nFood consumption varies with many factors. When food is cheap, people consume more—less rationing, choosier diets. When food is expensive, they consume less: more frugal, more focused on survival. Because of this link to well-being, food consumption modifiers are strong and have wide effects.\n\n#T What Impacts Food Consumption:#!\nSeveral factors change how much pops consume:\n\n$BULLET$ Local food price on the market (cheap vs expensive)\n$BULLET$ [pp_province_current_food_storage|e] (growing vs shrinking)\n$BULLET$ [pp_prosperity|e] of the location\n$BULLET$ Winter severity\n$BULLET$ [pp_devastation|e] and recovery conditions\n$BULLET$ Pop type (nobles, clergy, burghers, laborers, peasants, soldiers each have different base consumption)\n\nSee [pp_food_storage|e] for how storage works.\n\n#T Cheap food in the market and High food Storages in Provinces:#!\nWhen food is cheap on the market and province storages are well stocked, locations receive [pp_cheap_food|e] and provinces with growing storage receive [pp_province_current_food_storage|e]. Effects scale by how far below the base price the food price is.\n\n[ShowModifierEffect('cheap_food_in_location')]\n\n#T Expensive food in the market and Low food Storages in Provinces:#!\nWhen food is expensive on the market and province storages are low or empty, locations receive [pp_expensive_food|e]. People consume less—they get more out of their food, are less picky, and minds focus on feeding families. Other priorities fall by the wayside. Effects scale by how far above the base price the food price is.\n\n[ShowModifierEffect('expensive_food_in_location')]\n\nFood consumption modifiers are deliberately strong because consumption is tightly linked to living standards, labor quality, and social stability. [pp_prosperity|e] reinforces the loop: high food availability boosts prosperity, and prosperity in turn supports higher consumption and [population_growth|e].\n\n#T When You Run Out of food:#!\nWhen storages are empty, a province receives [ShowModifier('province_starving')]. People try to feed themselves by any means necessary. [pp_devastation|e] tends to rise, pops demote to lower classes that consume less, and people starve. Supply limit drops, migration attraction plummets, life expectancy falls, and people flee. [pp_prosperity|e] crashes. Soldiers are less willing to defend [starving|e] cities. See [pp_food_storage|e] and [pp_starvation|e].\n\n[ShowModifierEffect('province_starving')]\n\n#T Devastation:#!\n[pp_devastation|e] is best avoided and is caused by starvation or other horrible conditions (blockades, sieges, etc.). For full modifier details and the inversion note (devastation scales 0 to -100%).\n\n[ShowModifierEffect('devastation')]"
game_concept_pp_other_changes: "Other Changes"
game_concept_pp_other_changes_desc: "This section covers Buildings in Location, Prosperity, Devastation, Cheap Food, Expensive Food, Province Current Food Storage, and Starvation. Use the cards below for details on each topic."
game_concept_pp_victuals: "P&P: New Trade Goods"
game_concept_pp_victuals_desc: "[ShowGoodsName('victuals')|e] are rations for military and civilians: fresh regional meals or preserved provisions. Produced in the [ShowBuildingTypeName('cookery')|e] (see New Buildings), they feed your standing armies and navies, and are distributed to the local population through the [ShowBuildingTypeName('victuals_market')|e].\n\n#T Conversion:#!\nOne victual converts to a fixed amount of food. The rate is constant and unaffected by modifiers, ensuring a predictable supply for your provinces.\n\n#T How You Use Them:#!\nYou can buy food directly on the market, which can be a viable strategy when prices are low, though you remain reliant on other producers. Distributing purchased [ShowGoodsName('victuals')|e] through a [ShowBuildingTypeName('victuals_market')|e] offers a more robust alternative. For maximum security, producing your own victuals in a [ShowBuildingTypeName('cookery')|e] and distributing them locally further insulates your population from volatile market food prices.\n\nVictuals are also easier to ship to other markets or colonies to get them going."
game_concept_pp_cookery: "P&P: New Buildings"
game_concept_pp_cookery_desc: "#T Cookery:#!\nThe [ShowBuildingTypeName('cookery')|e] represents the regional kitchens that supplied armies, fleets, and settlements. It produces victuals rations from meals, drinks and packaging production methods.\n\nThe cookery is meant to produce locally sensible victuals from what the local markets offer. You should see shifts over time as farming becomes more efficient and different staples become available. The idea is that some recipes are not very gold-efficient—they can be expensive to run (if input goods are expensive) but they allow you to stay independent in your victuals production.\n\n#T Victuals Market:#!\nThe [ShowBuildingTypeName('victuals_market')|e] is where [ShowGoodsName('victuals')|e] are distributed/traded to the local population as food.\n\n Each market level consumes victuals and produces local food, giving your pops a centralized place to buy and sell the provisions they need. \n\n In practice this means that you can ship victuals to markets in need or food and distribute it through victual markets in specific provinces if needed. You can also, albeit with the associated risk rely on other to either produce your food or your victuals. You might be outbid on the market though, so be careful."
game_concept_pp_population_distribution: "Population Distribution"
game_concept_pp_population_distribution_desc: "The local and the global distribution of your population and their literacy (which estate they belong to) has different benefits for your country.\n\n#T Local impacts:#!\nThese effects apply per location and depend on the types and literacy of pops in that location:\n\n$BULLET$ #Y Literacy impact:#! Literate pops of a given type give local bonuses.\n$BULLET$ [ShowPopTypeName('laborers')]: max RGO size, raw material output\n$BULLET$ [ShowPopTypeName('peasants')]: wheat, rice, millet, maize, legumes, fruit, olives, potato, livestock, beeswax, wool, fish, wild game, fur, and victuals output modifiers\n$BULLET$ #Y Pop percentage impact:#! The share of each pop type in a location matters.\n$BULLET$ [ShowPopTypeName('laborers')]: monthly development\n$BULLET$ [ShowPopTypeName('soldiers')]: max control\n$BULLET$ [ShowPopTypeName('peasants')]: devastation recovery, construction speed, build cost\n$BULLET$ #Y Unemployed peasants:#! Locations with unemployed peasants receive negative modifiers to monthly development and institution growth.\n\n#T Global impacts:#!\nThese effects apply country-wide based on your overall population distribution:\n\n$BULLET$ [ShowPopTypeName('burghers')] share in country: monthly development, monthly prosperity, merchant capacity modifier\n$BULLET$ [ShowPopTypeName('peasants')] share in country: institution growth modifier (negative)\n$BULLET$ [ShowPopTypeName('soldiers')] share in country: max control"
game_concept_pp_food: "P&P: Food Production"
game_concept_pp_food_desc: "#T Vanilla Problems:#!\nVanilla Europa Universalis 5 has many issues with its food system:\n\n$BULLET$ Food is almost never an issue.\n$BULLET$ Food goods are always raw; a single unit can be worth more depending on the location's food productivity modifier—creating massive surpluses of food goods while the market has no food.\n$BULLET$ Food is too labour-unintensive and easy to produce.\n$BULLET$ No meaningful difference between producing food goods other than the food value they have.\n$BULLET$ How food modifiers and actual good modifiers stack is unintuitive at best and very bugged at worst.\n\n\n#T This System:#!\nBased on these limitations and bugs, this mod introduces a different approach:\n\n$BULLET$ #Y No trade good has food value in itself.#!\n$BULLET$ Nearly all food productivity modifiers (except flavour ones) have been reworked to specific modifiers for farmed goods or [ShowGoodsName('victuals')|e]. See [pp_farm_output|e].\n\n\n#T Food Production:#!\nfood can now only be produced in two ways:\n\n$BULLET$ #Y Peasants#! directly produce it to feed themselves through #Y subsistence farming#!. Reducing peasant food consumption increases how much food they contribute to the market through subsistence (unemployed peasants).\n$BULLET$ [ShowBuildingTypeName('victuals_market')|e] (see New Buildings) use the new trade good [ShowGoodsName('victuals')|e] (see New Trade Goods) at a rate of #Y 1 Victual to 60 food#!.\n\n\nThink of these markets as places where your population sells and buys different forms of regional foods and preserved rations. Your estates partly pay for their maintenance.\n\n\n#T How It Works:#!\n\n$BULLET$ Trade goods like [ShowGoodsName('wheat')], [ShowGoodsName('wine')], [ShowGoodsName('fish')] and others are produced regionally and depend on advances, weather, and more. See [pp_farm_output|e]. This creates swingy prices.\n$BULLET$ These goods are used in the #Y Cookery#! (see New Buildings) to produce [ShowGoodsName('victuals')|e]. The Cookery uses food recipes (three inputs each), a drink slot (well water by default or upgraded drink service with three inputs), and a packing slot (none or a single packaging good per tier through tin cans). Victual prices rise and fall depending on input costs and market demand.\n$BULLET$ [ShowGoodsName('victuals')|e] are used to feed your local population through [ShowBuildingTypeName('victuals_market')|e], to import or export between regions, and to feed your standing armies and navies. Sailor and manpower [buildings|e] require large amounts for campaigns and voyages.\n\n\nThe [ShowGoodsName('victuals')|e] base price is the equivalent price of 60 food, this is also exactly how much a Victuals Market needs to produce 60 food. The AI handles these changes well and understands that it needs to build [ShowBuildingTypeName('victuals_market')|e] to avoid [starving|e].\n#T"
game_concept_pp_population_growth: "Population Growth"
game_concept_pp_population_growth_desc: "In general, abundance of food causes [population_growth|e]. Positive [population_growth|e] comes from two main sources: [pp_cheap_food|e] and [pp_province_current_food_storage|e].\n\nNegative [population_growth|e] comes from [pp_starvation|e], [pp_expensive_food|e], or low food storages in provinces.\n\n#T Balancing Modifiers:#!\nSome modifiers—such as negative [population_growth|e] in cities, towns, and rural locations—exist purely to balance out the positive modifiers and create an equilibrium. They have no other meaning.\n\n#T Housing Capacity:#!\nWhen population capacity in a location can be increased by building more buildings, increasing Development or building Irrigation Systems[population_growth|e] slowly goes down depending on how far above housing capacity the location is."
game_concept_pp_buildings_in_location: "P&P: Buildings in Location"
game_concept_pp_buildings_in_location_desc: "locations receive [ShowModifier('building_levels')] based on their total [building|e] levels. Buildings increase population capacity but take away space from farms—see [pp_urbanization|e] and [pp_farm_capacity|e] for how building more limits farm capacity.\n\n[ShowModifierEffect('building_levels')]"
game_concept_pp_food_storage: "P&P: Food Storage"
game_concept_pp_food_storage_desc: "Storage mechanics for food determine how sieges and shortages play out. Empty storages lead to emigration, demotion, and death."
game_concept_pp_prosperity: "P&P: Prosperity"
game_concept_pp_prosperity_desc: "Prosperity is great for locations in the long term. In this mod, it is closely tied to food availability: cheap food and well-stocked storages boost prosperity, which in turn supports higher food consumption and [population_growth|e]. See [pp_food_consumption|e] for how food prices affect prosperity.\n\n#T Note:#!\nProsperity scales from 0% to 100%.\n\n[ShowModifierEffect('prosperity')]"
game_concept_pp_devastation: "P&P: Devastation"
game_concept_pp_devastation_desc: "Devastation has horrible consequences for locations. See [pp_food_consumption|e] for full context.\n\n#T Note:#!\nDevastation scales from 0 to -100%, so the values shown below are actually inverted at -100% devastation.\n\n[ShowModifierEffect('devastation')]"
game_concept_pp_province_current_food_storage: "P&P: Province Current Food Storage"
game_concept_pp_province_current_food_storage_desc: "A location with growing food storage receives [ShowModifier('positive_province_food_growth')]. This modifier depends on how many years of consumption are stored in the province. It maxes out at 3 years of consumption—the values below would be multiplied by 3 if you had 3 years worth of consumption currently stored. See [pp_food_consumption|e] for context.\n\n[ShowModifierEffect('positive_province_food_growth')]"
game_concept_pp_cheap_food: "P&P: Cheap Food in Location"
game_concept_pp_cheap_food_desc: "When food is cheap on the market and province storages are well stocked, locations receive [ShowModifier('cheap_food_in_location')]. People consume more—less rationing, choosier diets. These effects scale depending on how far below the base price the food price is: the cheaper it gets, the stronger the modifier. See [pp_food_consumption|e] for full context.\n\n[ShowModifierEffect('cheap_food_in_location')]"
game_concept_pp_expensive_food: "P&P: Expensive Food in Location"
game_concept_pp_expensive_food_desc: "When food is expensive on the market and province storages are low or empty, locations receive [ShowModifier('expensive_food_in_location')]. People consume less—they get more out of their food, are less picky, and minds focus on feeding families. These effects scale depending on how far above the base price the food price is: the more expensive it gets, the stronger the modifier. See [pp_food_consumption|e] for full context.\n\n[ShowModifierEffect('expensive_food_in_location')]"
game_concept_pp_starvation: "P&P: Starvation"
game_concept_pp_starvation_desc: "When a province's food storage reaches 0, the pops will starve and die.\n\nThis gives the following effect:\n[ShowModifierEffect('province_starving')]"
game_concept_pp_urbanization: "P&P: Urbanization"
game_concept_pp_urbanization_desc: "Over Europa Universalis 5's timeframe, large parts of the rural population moved to cities. This was driven by rising farm productivity: as farms produced more with fewer hands, fewer people were needed in the countryside to feed everyone. You will naturally urbanize more over time as advances and investments raise farm output.\n\nEach location represents a large area of land—many villages, some towns, and often cities. Building more in a location increases urbanization and thereby reduces its [pp_farm_capacity|e]. It does not reduce the output of existing farms; it simply limits how many you can build. The trade-off is clear: urbanize a location for manufacturing and population capacity, or keep it rural to maximize farm output. See [pp_farm_capacity|e] for how capacity is calculated, which buildings are affected, and how the building-order rules work.\n\n#T Affected buildings:#!\nThese rural buildings lose capacity as you urbanize:\n\n$BULLET$ Farming Village\n$BULLET$ Forest Village\n$BULLET$ Fruit Orchard\n$BULLET$ Sheep Farms"
game_concept_pp_farm_capacity: "P&P: Farm Capacity"
game_concept_pp_farm_capacity_desc: "In vanilla Europa Universalis 5 you can build roughly the same number of farming buildings everywhere. That is not historically accurate. Does it make sense to be able to build the same quantity of fruit orchards in an Arctic Grassland location as in a farmland province with a river in Spain?\nFarm Capacity is about the quantity of farms you can build, not their productivity. See [pp_farm_output|e].\n\n#T Affected buildings:#!\nMaximum building capacity for Farming Village, Model Farm, Fishing Village, Forest Village, Fruit Orchard, and Sheep Farms is limited by available land. Farming Village and Model Farm share one Farming Capacity value; the other rural food buildings still use fixed natural potential plus dynamic factors.\n\n#T What adds capacity:#!\n$BULLET$ Farming Capacity — max RGO size and local population capacity add capacity\n$BULLET$ Other rural food buildings — development, population, fixed geography, and matching modifiers add capacity\n$BULLET$ [ShowBuildingTypeName('irrigation_systems')|e] — adds capacity for Fruit Orchards and Farming Villages through the shared farming capacity modifier\n\n#T What subtracts capacity:#!\n$BULLET$ Farming Capacity — total building levels, Town and City rank, existing Farming Villages, and existing Model Farms reduce capacity\n$BULLET$ Other rural food buildings — [pp_urbanization|e] and location rank reduce capacity where their building type uses those penalties\n\n#T Per-building geography:#!\n#H Fruit Orchard:#! Benefits from Mediterranean and subtropical climates, hills and flatland, farmland and grasslands, and river, lake, or coastal access. A matching Fruit RGO adds capacity.\n\n#H Fishing Village:#! Benefits from coastal access above all, then lake and river. Oceanic and arctic climates favour fishing. A matching Fish, Salt, or Pearls RGO adds capacity. Location rank (Town, City) does not reduce Fishing Village capacity.\n\n#H Sheep Farms:#! Benefits from hills, plateau, and mountains; grasslands and sparse vegetation; arid and cold arid climates. A matching Wool RGO adds capacity.\n\n#H Farming Capacity:#! Farming Village and Model Farm both directly use this shared capacity. It comes from max RGO size and population capacity, then loses space to urbanization, location rank, and existing farming buildings. This avoids the old farming-only geography precalculation.\n\n#H Forest Village:#! Benefits from forest, woods, and jungle; mountains and hills; arctic and continental climates. A matching Forestry RGO (wild game, fur, lumber) adds capacity.\n\n#T Map modes:#!\nThe Farming Capacity map mode shows current maximum capacity for Farming Villages and Model Farms. The other rural food map modes under Geography show natural potential. Hover over a location to see its value and a link to this entry.\n\n#T Building order:#!\nIf you try to outmanoeuvre the system by building farms first and then [pp_urbanization|e]—hoping to keep more farms than the capacity allows—the game will periodically remove excess farms until the location is back within its maximum. There is no lasting benefit; the balance will right itself every few years."
game_concept_pp_farm_output: "P&P: Farm Output"
game_concept_pp_farm_output_desc: "This entry is about how much each farm produces—its productivity—not how many you can build. For farm quantity, see Farm Capacity.Over Europa Universalis 5's timeframe, farm productivity rose sharply. The mod reflects this by replacing vanilla's flat food modifier with per-good output modifiers. Each type of food can now gain or lose output independently.\n\nFarm output is affected by both inert and dynamic factors. Any of these can be beneficial or detrimental.\n\n#T Component one:#!\nDynamic factors that change over the game. Some regions or countries may gain access to productivity improvements earlier or later than others:\n\n$BULLET$ Advances\n$BULLET$ Societal choices\n$BULLET$ Development\n$BULLET$ Government reforms\n$BULLET$ [ShowBuildingTypeName('irrigation_systems')|e]\n\n#T Component two:#!\nInert factors tied to geography and location. These can boost or reduce output depending on the place:\n\n$BULLET$ Vegetation\n$BULLET$ Topography\n$BULLET$ Climate\n$BULLET$ Access to fresh water\n$BULLET$ Coastal status\n$BULLET$ The location's RGO\n\n#T Harvest:#!\nYearly harvest outcomes vary by region and can further boost or reduce farm output beyond the factors above. For full details on harvest levels and how they affect food production, see Variable Harvests."
