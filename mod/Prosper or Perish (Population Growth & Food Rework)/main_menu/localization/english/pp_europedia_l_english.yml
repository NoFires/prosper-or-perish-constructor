l_english:
  # Start generated location potential concept
  game_concept_pp_location_potential: "Location Potential"
  game_concept_pp_location_potential_desc: "Location Potential is the shared calculation behind Prosper or Perish per-location population capacity and local output modifiers.\n\nThe values combine in-game geography with external map-derived evidence. They are meant to represent how suitable each location is for supporting people and producing local raw materials.\n\n#T In-game factors:#!\n$BULLET$ Topography\n$BULLET$ Climate\n$BULLET$ Vegetation\n$BULLET$ River access\n$BULLET$ Lake access\n$BULLET$ Coastal access\n$BULLET$ Location RGO\n\n#T Out-of-game maps and evidence:#!\n$BULLET$ Soil data\n$BULLET$ GAEZ crop potential and suitability maps\n$BULLET$ HYDE historical population coverage\n$BULLET$ Freshwater food support maps\n$BULLET$ Marine food support maps\n$BULLET$ Livestock food support maps\n$BULLET$ Plant food support maps\n$BULLET$ Wild subsistence support maps\n$BULLET$ Land-use confidence maps\n$BULLET$ Water confidence maps\n\nThe modelling and pipeline for this are in the GitHub repo, but they are subject to change. The final numbers are generated by the constructor pipeline, then injected into the shared per-location static modifiers used by the mod."
  # End generated location potential concept
# Override vanilla River concept to document PP's river size scaling
game_concept_river_desc: "A [location|e] may have a River, a moving body of water.\n\nRivers are not navigable by [navies|e], but they impose a [crossing|e] combat malus on [armies|e] who attempt to enter a [location] with a River. Additionally, they slightly increase the [population_capacity|e] of a location.\n\nThis modifier is multiplied by river size."
# Europedia mod overview - appears under Game Concepts, searchable for "prosper", "perish", "harvest"
ENCYCLOPEDIA_PAGE_PROSPER_OR_PERISH: "Prosper or Perish"
game_concept_prosper_perish_mod: "Prosper or Perish (Mod)"
game_concept_prosper_perish_mod_desc: "#T The Mod:#!\nThis mod overhauls the food system until it is fundamentally different from vanilla. After hundreds of modifier and advance changes and many hours of balancing, food is now the primary driver of pop growth and migration—replacing the old ties to [pp_prosperity|e], Development and similar factors, which instead now shape food capacity and growth.\n\nYou will see a sharp split between rural farming locations urbanized rich cities, incentives for local manufacturing in provinces to ease capital-centric \"clumping,\" and higher infrastructure costs so Roads become a strategic choice rather than something to spam.\n\nThe core loop is simple: full province and low food prices mean strong growth and many other benefits; empty storages and high prices mean heavy emigration, pop demotion, death and other bad outcomes.\n\nThe mod adds new Buildings, new production methods and a new Trade good. When you create a new game, check the game rules for Prosper or Perish: you can disable [pp_variable_harvests|e] if you want a steadier food economy without yearly harvest swings. You can also make the campaign harder—higher player building upkeep, stronger AI food efficiency, or cheaper AI building upkeep—or leave everything on defaults for the standard mod experience.\n\nPlease read at least [pp_food|e] and [pp_food_consumption|e]; they should be enough to get you playing.\n\n#T Feedback:#!\nI really need feedback for specific regions—send it on Steam as a PM or in the mod comments. If some regions look weird or super ahistoric, show me where and I will try to fix it. Same with Cookery recipes: we may need to add more to represent some regions. Please confirm it is not caused by other mods before sending screenshots.\n\nThere are many other changes not covered here. If something is confusing or I forgot to document it, tell me and I will try to add it to this Europedia in the future.\n\n#T How I Add Features:#!\nI follow this checklist:\n\n$BULLET$ Is the mechanic fun to manage for the player?\n$BULLET$ Is the mechanic a concept that can be understood historically?\n$BULLET$ Is the AI able to handle the mechanic?\n\nI am fine with victuals not exactly representing how food was traded and produced historically. I am fine with numbers in-game for how much food a noble consumes or a peasant—these are abstractions to get the game working. I can imagine a noble eating very expensive food, which is the abstraction for why he needs \"more\" food. But if I cannot even imagine how it would make sense in our world, I will likely only add it to get the game working at all.\n\n#T Thanks:#!\nA sincere thank you to everyone who reported bugs, helped with balancing, and took the time to share feedback. Thank you as well to everyone who created compatibility patches and collections around Prosper or Perish, and to the EU5 Mod Coop Discord for the discussions, help, and support.\n\nA special thank you to Karkento for letting me spam him with ideas nonstop and for helping so much with balancing and ideas.\n\nThanks as well to Noslon for providing valuable feedback and good solutions to fix the employment system.\n\nAnd a special thank you to Regal Urangutan for creating the EU5 2.0 collection centered around P&P, and for always being ready to chat and excited to talk about EU5."
game_concept_pp_update_0_8_1: "Update 0.8.1"
game_concept_pp_update_0_8_1_desc: "#T Update 0.8.1 Prosper or Perish#!\nThis is a minor balance update that is likely not save compatible, so I recommend restarting or continuing to play on the older version of the mod.\n\n#T Patch Notes:#!\n$BULLET$ Switched a bunch of growth from stored food in provinces to [pp_cheap_food|e] and [pp_positive_province_food_growth|e]. This was done because these are the more interesting modifiers and they are not bugged anymore.\n$BULLET$ Changed employment type and amount for a bunch of food-related buildings based on feedback that they were too micromanagement intensive to keep sorted. The employment-all systems were also changed so they now prioritize how buildings are filled in this order: Granaries > Cookeries > Victuals Market > irrigation type buildings > staple food producing buildings. This has improved AI performance and should reduce the micromanagement needed to keep them staffed. Expect more changes when 1.3 hits. I also want to thank Noslon again here; I think the solution he spearheaded is a good stopgap until we hopefully get better solutions in the 1.3 beta.\n$BULLET$ Fixed a bunch of 1.2-related oversights, including Byzantium now working properly.\n$BULLET$ Improved performance. The game should run around 10% faster now.\n$BULLET$ Reworked all map modes. They should be much clearer now. I am not a UI guy.\n$BULLET$ Fixed a bunch of issues with advances being locked behind age focus.\n$BULLET$ Added minor balancing for outlier start regions, especially Hungary and England.\n\n#T Next Changes:#!\n$BULLET$ I am looking for solutions to change building cost in location into something else, but the options are quite limited. I hope the 1.3 beta gives us more tools; even if not, it will change.\n$BULLET$ Polishing and reducing tedium will be a bigger part of the next patches. 0.8 did a lot of groundwork, and that was extremely time consuming, so I barely had time to actually play the game. Now it is time to fix quirks and make it all more fun, hopefully.\n$BULLET$ As hitting historical benchmarks improves, smaller-scope regions will be finetuned more.\n\nThis will be the last Steam patch before 0.9. Next week I will start on 0.9 when the 1.3 EU5 beta hits, and I will move to work on that."
game_concept_pp_update_0_8_foundations: "Update 0.8: Foundations"
game_concept_pp_update_0_8_foundations_desc: "#T Update 0.8: Foundations#!\nWelcome to Foundations. This is easily the largest Prosper or Perish update yet. Hopefully it is balanced enough and bug free enough, but please expect tuning and polish to continue as feedback comes in.\n\nThis page is only a short overview. Use the linked Europedia pages for the actual details.\n\n#T RGO Rework:#!\nLocations keep their historical raw-material identity and start-of-game RGO levels, but RGO level upgrades are disabled. Raw material growth now comes through buildings, upgrades, production methods, and advances.\n\nFor the building side of this system, see [pp_cookery|e]. For where and how many rural buildings can be built, see [pp_farm_capacity|e]. For local productivity, see [pp_farm_output|e].\n\n#T Agriculture and Rural Production:#!\nAgriculture, animal husbandry, fishing, forestry, and other raw-good production now split into separate questions:\n\n$BULLET$ #Y Can it be built?#! Check the building tooltip and local RGO or geography.\n$BULLET$ #Y How many can be built?#! See [pp_farm_capacity|e], [pp_fish_capacity|e], and [pp_forest_capacity|e].\n$BULLET$ #Y How efficient is it?#! See [pp_farm_output|e] and the local output map modes.\n\n#T Population Capacity:#!\n[pp_population_capacity|e] has also been reworked. It is now about food-support potential, not just housing. The details are on the linked page."
game_concept_prosper_or_perish: "Prosper or Perish"
game_concept_harvest_situation: "P&P: Variable Harvests"
game_concept_harvest_situation_desc: "Each September, regions receive harvest conditions that can change farmed-goods output for the year. Broad harvest areas make nearby regions more likely to move together, but regions inside the same area can still differ. Average years leave no harvest modifier. Active harvest modifiers show their current effects on affected locations."
game_concept_pp_variable_harvests: "P&P: Variable Harvests"
game_concept_pp_variable_harvests_desc: "Harvests represent the yearly uncertainty of agriculture: weather, pests, timing, storage, water control, and local resilience are abstracted into a regional outcome.\n\nEach September, every [region|e] receives harvest conditions. Nearby regions can move together, and a run of good or bad years can make similar conditions more likely for a while. Average years leave no harvest modifier and use the normal map color.\n\n#T Broad Harvest Areas:#!\nThe map is grouped into broad harvest areas, such as Western Europe or South Asia. A broad area can have a favorable or difficult year, then each [region|e] inside it still receives its own harvest result. This makes nearby regions tend to move together without forcing every region to share the same outcome.\n\nThe area name on a harvest modifier tells you which broad harvest area shaped that location's crop mix and risk. The modifier itself shows the current effects for the affected goods.\n\n#T What Harvests Affect:#!\nActive harvests add a location modifier to owned locations. That modifier changes the output of farmed goods such as [ShowGoodsName('wheat')|e], [ShowGoodsName('rice')|e], [ShowGoodsName('livestock')|e], [ShowGoodsName('fish')|e], and plantation or orchard goods. The modifier tooltip shows the current effects.\n\nHarvests do not create food directly. They change goods output, which can move prices for raw foods and [ShowGoodsName('victuals')|e], and that pressure then feeds into the wider food system. For food prices, storage, growth, and starvation, see [pp_food|e].\n\n#T Reading the Map:#!\nDark harvest colors mean poor harvests; bright harvest colors mean good harvests. The default map color means there is no active harvest modifier here. Starvation and negative food-balance warnings can override the harvest color because those crises matter more at a glance.\n\n#T Optional Setting:#!\nYou can disable Variable Harvests with the game rule when starting a campaign."
harvest_situation: "P&P: Variable Harvests"
harvest_situation_desc: "Harvests represent the yearly uncertainty of agriculture: weather, pests, timing, storage, water control, and local resilience are abstracted into a regional outcome.\n\nEach September, every region receives harvest conditions. Nearby regions can move together, and a run of good or bad years can make similar conditions more likely for a while. Average years leave no harvest modifier and use the normal map color.\n\n#T Broad Harvest Areas:#!\nThe map is grouped into broad harvest areas, such as Western Europe or South Asia. A broad area can have a favorable or difficult year, then each region inside it still receives its own harvest result. This makes nearby regions tend to move together without forcing every region to share the same outcome.\n\nThe area name on a harvest modifier tells you which broad harvest area shaped that location's crop mix and risk. The modifier itself shows the current effects for the affected goods.\n\n#T What Harvests Affect:#!\nActive harvests add a location modifier to owned locations. That modifier changes the output of farmed goods such as wheat, rice, livestock, fish, and plantation or orchard goods. The modifier tooltip shows the current effects.\n\nHarvests do not create food directly. They change goods output, which can move prices for raw foods and victuals, and that pressure then feeds into the wider food system.\n\n#T Reading the Map:#!\nDark harvest colors mean poor harvests; bright harvest colors mean good harvests. The default map color means there is no active harvest modifier here. Starvation and negative food-balance warnings can override the harvest color because those crises matter more at a glance.\n\n#T Optional Setting:#!\nYou can disable Variable Harvests with the game rule when starting a campaign."
harvest_situation_monthly: "• Harvests are checked each September for every region\n• Broad harvest areas make nearby regions more likely to move together\n• Active harvests appear as location modifiers; hover an affected location to see current effects\n• Average years have no harvest modifier and use the normal map color\n• Poor harvests reduce farmed-goods output; strong harvests improve it\n• The game rule can disable this system at campaign start"
