# Prosper or Perish variable harvest generation config.
# The generator derives subcontinent/family volatility tiers from generated
# per-location output modifiers, then applies the reviewed overrides below.

subcontinents = [
    "western_europe",
    "eastern_europe",
    "north_asia",
    "central_asia",
    "east_asia",
    "south_asia",
    "south_east_asia",
    "middle_east",
    "north_africa",
    "west_africa",
    "east_africa",
    "central_africa",
    "southern_africa",
    "north_america",
    "south_america",
    "australasia",
    "pacific_islands",
]

[paths]
