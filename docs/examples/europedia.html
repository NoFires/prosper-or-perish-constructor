 <span class=\"token token-building\">Victuals Market<\/span>. Exact conversion and method details are shown on the building tooltips. See <a class=\"concept-link\" href=\"#pp-cookery\">P&amp;P: New Buildings<\/a> for the building overview.<\/p>"},{"id":"pp-cookery","order":10,"filter":"cookery","filter_label":"New Buildings","concept_key":"pp_cookery","title_key":"game_concept_pp_cookery","body_key":"game_concept_pp_cookery_desc","title":"P&P: New Buildings","body_raw":"#T P&P Buildings#!\nProsper or Perish adds and rewrites many buildings. The exact inputs, outputs, unlocks, and modifiers are shown in the building and production-method tooltips; this page is only orientation.\n\n#T Victuals Buildings:#!\n[ShowBuildingTypeName('cookery')|e] and [ShowBuildingTypeName('victualling_yard')|e] refine regional food goods into [ShowGoodsName('victuals')|e]: meals, provisions, and rations. [ShowBuildingTypeName('victuals_market')|e] distributes those victuals locally as food for the population.\n\n#T Non-Farming Raw Goods:#!\nNon-farming raw-good buildings, such as [ShowBuildingTypeName('iron_mine')|e], usually have a simple base method that mainly uses population and produces the raw good inefficiently. More advanced production methods use more inputs, refined goods, animals, tools, and later unlocks to produce more and employ workers more efficiently.\n\nMany deposits historically produced multiple useful materials. A lead vein could be galena with silver, and iron ore workings could recover ochre for dyes. I used historical byproducts where I could, so raw-good buildings can have multiple outputs when that fits.\n\nSome buildings also have specific beneficial or detrimental location modifiers. A deeper or riskier mine can hurt [population_growth|e] because the work is dangerous, while still increasing migration attraction because it draws fortune seekers and workers chasing wages.\n\n#T Agriculture:#!\nAgricultural buildings work in the same general style. Base methods give a simple local production option, while better methods use more inputs and unlock over time. Many buildings can choose between related crops or animal outputs, and many have upgrade chains.\n\nFor whether a building fits a location, check its own building tooltip. For how many rural buildings fit, see [pp_farm_capacity|e]. For how productive they are, see [pp_farm_output|e].","body_plain":"P&P Buildings\nProsper or Perish adds and rewrites many buildings. The exact inputs, outputs, unlocks, and modifiers are shown in the building and production-method tooltips; this page is only orientation.\n\nVictuals Buildings:\nCookery and Victualling Yard refine regional food goods into Victuals: meals, provisions, and rations. Victuals Market distributes those victuals locally as food for the population.\n\nNon-Farming Raw Goods:\nNon-farming raw-good buildings, such as Iron Mine, usually have a simple base method that mainly uses population and produces the raw good inefficiently. More advanced production methods use more inputs, refined goods, animals, tools, and later unlocks to produce more and employ workers more efficiently.\n\nMany deposits historically produced multiple useful materials. A lead vein could be galena with silver, and iron ore workings could recover ochre for dyes. I used historical byproducts where I could, so raw-good buildings can have multiple outputs when that fits.\n\nSome buildings also have specific beneficial or detrimental location modifiers. A deeper or riskier mine can hurt Population Growth because the work is dangerous, while still increasing migration attraction because it draws fortune seekers and workers chasing wages.\n\nAgriculture:\nAgricultural buildings work in the same general style. Base methods give a simple local production option, while better methods use more inputs and unlock over time. Many buildings can choose between related crops or animal outputs, and many have upgrade chains.\n\nFor whether a building fits a location, check its own building tooltip. For how many rural buildings fit, see Pp Farm Capacity. For how productive they are, see Pp Farm Output.","icon_texture":"gfx/interface/icons/flat_icons/balance/buildings_abroad.dds","definition":{"key":"pp_cookery","file":"main_menu/common/game_concepts/pp_new_buildings.txt","line":2,"family":"food","texture":"flat_icons/balance/buildings_abroad","aliases":[]},"source":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concept":"main_menu/common/game_concepts/pp_new_buildings.txt"},"links":["population_growth","pp_farm_capacity","pp_farm_output"],"body_html":"<h3>P&amp;P Buildings<\/h3>\n<p>Prosper or Perish adds and rewrites many buildings. The exact inputs, outputs, unlocks, and modifiers are shown in the building and production-method tooltips; this page is only orientation.<\/p>\n<h3>Victuals Buildings:<\/h3>\n<p><span class=\"token token-building\">Cookery<\/span> and <span class=\"token token-building\">Victualling Yard<\/span> refine regional food goods into <span class=\"token token-good\">Victuals<\/span>: meals, provisions, and rations. <span class=\"token token-building\">Victuals Market<\/span> distributes those victuals locally as food for the population.<\/p>\n<h3>Non-Farming Raw Goods:<\/h3>\n<p>Non-farming raw-good buildings, such as <span class=\"token token-building\">Iron Mine<\/span>, usually have a simple base method that mainly uses population and produces the raw good inefficiently. More advanced production methods use more inputs, refined goods, animals, tools, and later unlocks to produce more and employ workers more efficiently.<\/p>\n<p>Many deposits historically produced multiple useful materials. A lead vein could be galena with silver, and iron ore workings could recover ochre for dyes. I used historical byproducts where I could, so raw-good buildings can have multiple outputs when that fits.<\/p>\n<p>Some buildings also have specific beneficial or detrimental location modifiers. A deeper or riskier mine can hurt <span class=\"concept-ref\">Population Growth<\/span> because the work is dangerous, while still increasing migration attraction because it draws fortune seekers and workers chasing wages.<\/p>\n<h3>Agriculture:<\/h3>\n<p>Agricultural buildings work in the same general style. Base methods give a simple local production option, while better methods use more inputs and unlock over time. Many buildings can choose between related crops or animal outputs, and many have upgrade chains.<\/p>\n<p>For whether a building fits a location, check its own building tooltip. For how many rural buildings fit, see <a class=\"concept-link\" href=\"#pp-farm-capacity\">P&amp;P: Building Capacity<\/a>. For how productive they are, see <a class=\"concept-link\" href=\"#pp-farm-output\">P&amp;P: Building Output<\/a>.<\/p>"},{"id":"pp-farm-capacity","order":11,"filter":"farm_capacity","filter_label":"Building Capacity","concept_key":"pp_farm_capacity","title_key":"game_concept_pp_farm_capacity","body_key":"game_concept_pp_farm_capacity_desc","title":"P&P: Building Capacity","body_raw":"Building Capacity is about how many rural raw-material building levels a location can sustain, not how much each building produces. For productivity, see [pp_farm_output|e]. Exact current values are shown in the relevant building and map-mode tooltips.\n\n#T Land Farm Capacity:#!\nThis pool governs [ShowBuildingTypeName('farming_village')|e], [ShowBuildingTypeName('model_farm')|e], orchards, animal farms, plantations, groves, gardens, sericulture farms, simplers groves, and vineyard estates.\n\nIts more static side comes from local farming suitability and matching agricultural RGOs. Its dynamic side changes with Maximum RGO Size, [pp_population_capacity|e], location rank, river access, irrigation and water-control buildings, farm-capacity modifiers, and urbanization pressure from other buildings in the location.\n\n#T Fishing Capacity:#!\nThis pool governs [ShowBuildingTypeName('fishing_village')|e], [ShowBuildingTypeName('ocean_fishery')|e], and [ShowBuildingTypeName('offshore_fishery')|e]. It does not govern [ShowBuildingTypeName('pearl_fishery')|e].\n\nIts more static side comes from coasts, lakes, wetlands, fish RGOs, and river size. Its dynamic side changes with Maximum RGO Size, Fishing Capacity modifiers such as town rights, and the amount of capacity already used by fish-producing buildings.\n\n#T Forest Capacity:#!\nThis pool governs [ShowBuildingTypeName('forest_village')|e], [ShowBuildingTypeName('managed_forest_village')|e], [ShowBuildingTypeName('lumber_mill')|e], [ShowBuildingTypeName('water_sawmill')|e], and [ShowBuildingTypeName('lumber_mill_improved')|e].\n\nIts more static side comes from forest geography and relevant RGOs. Its dynamic side changes with Maximum RGO Size, location rank, Forest Capacity modifiers, and urbanization pressure from other buildings in the location.\n\n#T Other Raw Material Buildings:#!\nOther raw material producing buildings, such as mines, quarries, saltworks, pearl fisheries, charcoal makers, ivory hunting camps, and similar buildings, do not use the three shared pools above. Their maximum level is governed by Rural Building Capacity.\n\nRural Building Capacity is a simpler cap influenced by the location's basic rural allowance, development, Maximum RGO Size, and river access.\n\n#T Building order:#!\nIf a location ends up above its available capacity, the system can remove excess rural building levels until the location is back within capacity. There is no lasting benefit to building around the limit.","body_plain":"Building Capacity is about how many rural raw-material building levels a location can sustain, not how much each building produces. For productivity, see Pp Farm Output. Exact current values are shown in the relevant building and map-mode tooltips.\n\nLand Farm Capacity:\nThis pool governs Farming Village, Model Farm, orchards, animal farms, plantations, groves, gardens, sericulture farms, simplers groves, and vineyard estates.\n\nIts more static side comes from local farming suitability and matching agricultural RGOs. Its dynamic side changes with Maximum RGO Size, Pp Population Capacity, location rank, river access, irrigation and water-control buildings, farm-capacity modifiers, and urbanization pressure from other buildings in the location.\n\nFishing Capacity:\nThis pool governs Fishing Village, Ocean Fishery, and Offshore Fishery. It does not govern Pearl Fishery.\n\nIts more static side comes from coasts, lakes, wetlands, fish RGOs, and river size. Its dynamic side changes with Maximum RGO Size, Fishing Capacity modifiers such as town rights, and the amount of capacity already used by fish-producing buildings.\n\nForest Capacity:\nThis pool governs Forest Village, Managed Forest Village, Lumber Mill, Water Sawmill, and Lumber Mill Improved.\n\nIts more static side comes from forest geography and relevant RGOs. Its dynamic side changes with Maximum RGO Size, location rank, Forest Capacity modifiers, and urbanization pressure from other buildings in the location.\n\nOther Raw Material Buildings:\nOther raw material producing buildings, such as mines, quarries, saltworks, pearl fisheries, charcoal makers, ivory hunting camps, and similar buildings, do not use the three shared pools above. Their maximum level is governed by Rural Building Capacity.\n\nRural Building Capacity is a simpler cap influenced by the location's basic rural allowance, development, Maximum RGO Size, and river access.\n\nBuilding order:\nIf a location ends up above its available capacity, the system can remove excess rural building levels until the location is back within capacity. There is no lasting benefit to building around the limit.","icon_texture":"gfx/interface/icons/buildings/farming_village.dds","definition":{"key":"pp_farm_capacity","file":"main_menu/common/game_concepts/pp_farm_capacity.txt","line":2,"family":"food","texture":"map_modes/pp_farming_village_capacity","aliases":[]},"source":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concept":"main_menu/common/game_concepts/pp_farm_capacity.txt"},"links":["pp_farm_output","pp_population_capacity"],"body_html":"<p>Building Capacity is about how many rural raw-material building levels a location can sustain, not how much each building produces. For productivity, see <a class=\"concept-link\" href=\"#pp-farm-output\">P&amp;P: Building Output<\/a>. Exact current values are shown in the relevant building and map-mode tooltips.<\/p>\n<h3>Land Farm Capacity:<\/h3>\n<p>This pool governs <span class=\"token token-building\">Farming Village<\/span>, <span class=\"token token-building\">Model Farm<\/span>, orchards, animal farms, plantations, groves, gardens, sericulture farms, simplers groves, and vineyard estates.<\/p>\n<p>Its more static side comes from local farming suitability and matching agricultural RGOs. Its dynamic side changes with Maximum RGO Size, <a class=\"concept-link\" href=\"#pp-population-capacity\">P&amp;P: Population Capacity<\/a>, location rank, river access, irrigation and water-control buildings, farm-capacity modifiers, and urbanization pressure from other buildings in the location.<\/p>\n<h3>Fishing Capacity:<\/h3>\n<p>This pool governs <span class=\"token token-building\">Fishing Village<\/span>, <span class=\"token token-building\">Ocean Fishery<\/span>, and <span class=\"token token-building\">Offshore Fishery<\/span>. It does not govern <span class=\"token token-building\">Pearl Fishery<\/span>.<\/p>\n<p>Its more static side comes from coasts, lakes, wetlands, fish RGOs, and river size. Its dynamic side changes with Maximum RGO Size, Fishing Capacity modifiers such as town rights, and the amount of capacity already used by fish-producing buildings.<\/p>\n<h3>Forest Capacity:<\/h3>\n<p>This pool governs <span class=\"token token-building\">Forest Village<\/span>, <span class=\"token token-building\">Managed Forest Village<\/span>, <span class=\"token token-building\">Lumber Mill<\/span>, <span class=\"token token-building\">Water Sawmill<\/span>, and <span class=\"token token-building\">Lumber Mill Improved<\/span>.<\/p>\n<p>Its more static side comes from forest geography and relevant RGOs. Its dynamic side changes with Maximum RGO Size, location rank, Forest Capacity modifiers, and urbanization pressure from other buildings in the location.<\/p>\n<h3>Other Raw Material Buildings:<\/h3>\n<p>Other raw material producing buildings, such as mines, quarries, saltworks, pearl fisheries, charcoal makers, ivory hunting camps, and similar buildings, do not use the three shared pools above. Their maximum level is governed by Rural Building Capacity.<\/p>\n<p>Rural Building Capacity is a simpler cap influenced by the location&#x27;s basic rural allowance, development, Maximum RGO Size, and river access.<\/p>\n<h3>Building order:<\/h3>\n<p>If a location ends up above its available capacity, the system can remove excess rural building levels until the location is back within capacity. There is no lasting benefit to building around the limit.<\/p>"},{"id":"pp-farm-output","order":12,"filter":"farm_output","filter_label":"Building Output","concept_key":"pp_farm_output","title_key":"game_concept_pp_farm_output","body_key":"game_concept_pp_farm_output_desc","title":"P&P: Building Output","body_raw":"This entry is about how much rural raw-material buildings produce—their productivity—not how many you can build. For quantity, see [pp_farm_capacity|e].\n\nOver Europa Universalis 5's timeframe, rural productivity rose sharply. The mod reflects this by replacing vanilla's flat food modifier with per-good output modifiers. Each raw material can now gain or lose output independently.\n\nBuilding Output is affected by both inert and dynamic factors. Any of these can be beneficial or detrimental.\n\n#T Component one:#!\nDynamic factors that change over the game. Some regions or countries may gain access to productivity improvements earlier or later than others:\n\n$BULLET$ Advances\n$BULLET$ Societal choices\n$BULLET$ Development\n$BULLET$ Government reforms\n$BULLET$ [ShowBuildingTypeName('irrigation_systems')|e]\n\n#T Component two:#!\nInert factors tied to geography and location. Every location has a unique set of local output modifiers estimated from historical and geographic evidence:\n\n$BULLET$ Rainfall and water availability\n$BULLET$ Soil quality\n$BULLET$ Climate\n$BULLET$ Topography\n$BULLET$ Vegetation\n$BULLET$ The location's RGO\n\n#T Harvest:#!\nYearly harvest outcomes vary by region and can further boost or reduce agricultural output beyond the factors above. For full details on harvest levels and how they affect food production, see [pp_variable_harvests|e].","body_plain":"This entry is about how much rural raw-material buildings produce—their productivity—not how many you can build. For quantity, see Pp Farm Capacity.\n\nOver Europa Universalis 5's timeframe, rural productivity rose sharply. The mod reflects this by replacing vanilla's flat food modifier with per-good output modifiers. Each raw material can now gain or lose output independently.\n\nBuilding Output is affected by both inert and dynamic factors. Any of these can be beneficial or detrimental.\n\nComponent one:\nDynamic factors that change over the game. Some regions or countries may gain access to productivity improvements earlier or later than others:\n\n-  Advances\n-  Societal choices\n-  Development\n-  Government reforms\n-  Irrigation Systems\n\nComponent two:\nInert factors tied to geography and location. Every location has a unique set of local output modifiers estimated from historical and geographic evidence:\n\n-  Rainfall and water availability\n-  Soil quality\n-  Climate\n-  Topography\n-  Vegetation\n-  The location's RGO\n\nHarvest:\nYearly harvest outcomes vary by region and can further boost or reduce agricultural output beyond the factors above. For full details on harvest levels and how they affect food production, see Pp Variable Harvests.","icon_texture":"gfx/interface/icons/modifier_types/wheat_positive.dds","definition":{"key":"pp_farm_output","file":"main_menu/common/game_concepts/pp_farm_output.txt","line":2,"family":"food","texture":"modifier_types/wheat_positive","aliases":[]},"source":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concept":"main_menu/common/game_concepts/pp_farm_output.txt"},"links":["pp_farm_capacity","pp_variable_harvests"],"body_html":"<p>This entry is about how much rural raw-material buildings produce—their productivity—not how many you can build. For quantity, see <a class=\"concept-link\" href=\"#pp-farm-capacity\">P&amp;P: Building Capacity<\/a>.<\/p>\n<p>Over Europa Universalis 5&#x27;s timeframe, rural productivity rose sharply. The mod reflects this by replacing vanilla&#x27;s flat food modifier with per-good output modifiers. Each raw material can now gain or lose output independently.<\/p>\n<p>Building Output is affected by both inert and dynamic factors. Any of these can be beneficial or detrimental.<\/p>\n<h3>Component one:<\/h3>\n<p>Dynamic factors that change over the game. Some regions or countries may gain access to productivity improvements earlier or later than others:<\/p>\n<ul><li>Advances<\/li><li>Societal choices<\/li><li>Development<\/li><li>Government reforms<\/li><li><span class=\"token token-building\">Irrigation Systems<\/span><\/li><\/ul>\n<h3>Component two:<\/h3>\n<p>Inert factors tied to geography and location. Every location has a unique set of local output modifiers estimated from historical and geographic evidence:<\/p>\n<ul><li>Rainfall and water availability<\/li><li>Soil quality<\/li><li>Climate<\/li><li>Topography<\/li><li>Vegetation<\/li><li>The location&#x27;s RGO<\/li><\/ul>\n<h3>Harvest:<\/h3>\n<p>Yearly harvest outcomes vary by region and can further boost or reduce agricultural output beyond the factors above. For full details on harvest levels and how they affect food production, see <span class=\"concept-ref\">Pp Variable Harvests<\/span>.<\/p>"},{"id":"harvest-situation","order":13,"filter":"harvest","filter_label":"Variable Harvests","concept_key":"harvest_situation","title_key":"harvest_situation","body_key":"harvest_situation_desc","title":"P&P: Variable Harvests","body_raw":"Harvests represent the yearly uncertainty of agriculture: weather, pests, timing, storage, water control, and local resilience are abstracted into a regional outcome.\n\nEach September, every region receives harvest conditions. Nearby regions can move together, and a run of good or bad years can make similar conditions more likely for a while. Average years leave no harvest modifier and use the normal map color.\n\n#T Broad Harvest Areas:#!\nThe map is grouped into broad harvest areas, such as Western Europe or South Asia. A broad area can have a favorable or difficult year, then each region inside it still receives its own harvest result. This makes nearby regions tend to move together without forcing every region to share the same outcome.\n\nThe area name on a harvest modifier tells you which broad harvest area shaped that location's crop mix and risk. The modifier itself shows the current effects for the affected goods.\n\n#T What Harvests Affect:#!\nActive harvests add a location modifier to owned locations. That modifier changes the output of farmed goods such as wheat, rice, livestock, fish, and plantation or orchard goods. The modifier tooltip shows the current effects.\n\nHarvests do not create food directly. They change goods output, which can move prices for raw foods and victuals, and that pressure then feeds into the wider food system.\n\n#T Reading the Map:#!\nDark harvest colors mean poor harvests; bright harvest colors mean good harvests. The default map color means there is no active harvest modifier here. Starvation and negative food-balance warnings can override the harvest color because those crises matter more at a glance.\n\n#T Optional Setting:#!\nYou can disable Variable Harvests with the game rule when starting a campaign.","body_plain":"Harvests represent the yearly uncertainty of agriculture: weather, pests, timing, storage, water control, and local resilience are abstracted into a regional outcome.\n\nEach September, every region receives harvest conditions. Nearby regions can move together, and a run of good or bad years can make similar conditions more likely for a while. Average years leave no harvest modifier and use the normal map color.\n\nBroad Harvest Areas:\nThe map is grouped into broad harvest areas, such as Western Europe or South Asia. A broad area can have a favorable or difficult year, then each region inside it still receives its own harvest result. This makes nearby regions tend to move together without forcing every region to share the same outcome.\n\nThe area name on a harvest modifier tells you which broad harvest area shaped that location's crop mix and risk. The modifier itself shows the current effects for the affected goods.\n\nWhat Harvests Affect:\nActive harvests add a location modifier to owned locations. That modifier changes the output of farmed goods such as wheat, rice, livestock, fish, and plantation or orchard goods. The modifier tooltip shows the current effects.\n\nHarvests do not create food directly. They change goods output, which can move prices for raw foods and victuals, and that pressure then feeds into the wider food system.\n\nReading the Map:\nDark harvest colors mean poor harvests; bright harvest colors mean good harvests. The default map color means there is no active harvest modifier here. Starvation and negative food-balance warnings can override the harvest color because those crises matter more at a glance.\n\nOptional Setting:\nYou can disable Variable Harvests with the game rule when starting a campaign.","icon_texture":"gfx/interface/icons/alerts_icons/weather_system.dds","definition":{"key":"harvest_situation","file":"main_menu/common/game_concepts/pp_variable_harvests.txt","line":5,"family":null,"texture":"alerts_icons/weather_system","aliases":[]},"source":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concept":"main_menu/common/game_concepts/pp_variable_harvests.txt"},"links":[],"body_html":"<p>Harvests represent the yearly uncertainty of agriculture: weather, pests, timing, storage, water control, and local resilience are abstracted into a regional outcome.<\/p>\n<p>Each September, every region receives harvest conditions. Nearby regions can move together, and a run of good or bad years can make similar conditions more likely for a while. Average years leave no harvest modifier and use the normal map color.<\/p>\n<h3>Broad Harvest Areas:<\/h3>\n<p>The map is grouped into broad harvest areas, such as Western Europe or South Asia. A broad area can have a favorable or difficult year, then each region inside it still receives its own harvest result. This makes nearby regions tend to move together without forcing every region to share the same outcome.<\/p>\n<p>The area name on a harvest modifier tells you which broad harvest area shaped that location&#x27;s crop mix and risk. The modifier itself shows the current effects for the affected goods.<\/p>\n<h3>What Harvests Affect:<\/h3>\n<p>Active harvests add a location modifier to owned locations. That modifier changes the output of farmed goods such as wheat, rice, livestock, fish, and plantation or orchard goods. The modifier tooltip shows the current effects.<\/p>\n<p>Harvests do not create food directly. They change goods output, which can move prices for raw foods and victuals, and that pressure then feeds into the wider food system.<\/p>\n<h3>Reading the Map:<\/h3>\n<p>Dark harvest colors mean poor harvests; bright harvest colors mean good harvests. The default map color means there is no active harvest modifier here. Starvation and negative food-balance warnings can override the harvest color because those crises matter more at a glance.<\/p>\n<h3>Optional Setting:<\/h3>\n<p>You can disable Variable Harvests with the game rule when starting a campaign.<\/p>"},{"id":"pp-population-capacity","order":14,"filter":"pop_capacity","filter_label":"Population Capacity","concept_key":"pp_population_capacity","title_key":"game_concept_pp_population_capacity","body_key":"game_concept_pp_population_capacity_desc","title":"P&P: Population Capacity","body_raw":"#T Population Capacity#!\nPopulation Capacity now roughly represents how many people a location can support through local food production, especially farming. It is no longer just housing.\n\nLocations below their capacity have spare food-support potential. This gives them farming output benefits because people can work better land first. The benefit fades as population approaches capacity.\n\n#T Static baseline:#!\nEvery location starts with its own baseline. This uses the same kind of evidence as [pp_farm_output|e]: historical population data, crop suitability, rainfall, water access, soil, climate, topography, vegetation, local RGOs, and other map data.\n\n#T What changes it:#!\nPopulation Capacity can change through development, buildings, advances, societal values, laws, location rank, and other modifiers.\n\n#T Where to inspect it:#!\nUse the Population Capacity map mode and location tooltips to inspect current values. See [pp_farm_capacity|e] for how Population Capacity feeds farming capacity, and [pp_location_potential|e] for the shared static model behind capacity and local output.","body_plain":"Population Capacity\nPopulation Capacity now roughly represents how many people a location can support through local food production, especially farming. It is no longer just housing.\n\nLocations below their capacity have spare food-support potential. This gives them farming output benefits because people can work better land first. The benefit fades as population approaches capacity.\n\nStatic baseline:\nEvery location starts with its own baseline. This uses the same kind of evidence as Pp Farm Output: historical population data, crop suitability, rainfall, water access, soil, climate, topography, vegetation, local RGOs, and other map data.\n\nWhat changes it:\nPopulation Capacity can change through development, buildings, advances, societal values, laws, location rank, and other modifiers.\n\nWhere to inspect it:\nUse the Population Capacity map mode and location tooltips to inspect current values. See Pp Farm Capacity for how Population Capacity feeds farming capacity, and Pp Location Potential for the shared static model behind capacity and local output.","icon_texture":"gfx/interface/icons/flat_icons/trade_market/food_stockpile.dds","definition":{"key":"pp_population_capacity","file":"main_menu/common/game_concepts/pp_population_capacity.txt","line":2,"family":"food","texture":"map_modes/pp_population_capacity","aliases":[]},"source":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concept":"main_menu/common/game_concepts/pp_population_capacity.txt"},"links":["pp_farm_capacity","pp_farm_output","pp_location_potential"],"body_html":"<h3>Population Capacity<\/h3>\n<p>Population Capacity now roughly represents how many people a location can support through local food production, especially farming. It is no longer just housing.<\/p>\n<p>Locations below their capacity have spare food-support potential. This gives them farming output benefits because people can work better land first. The benefit fades as population approaches capacity.<\/p>\n<h3>Static baseline:<\/h3>\n<p>Every location starts with its own baseline. This uses the same kind of evidence as <a class=\"concept-link\" href=\"#pp-farm-output\">P&amp;P: Building Output<\/a>: historical population data, crop suitability, rainfall, water access, soil, climate, topography, vegetation, local RGOs, and other map data.<\/p>\n<h3>What changes it:<\/h3>\n<p>Population Capacity can change through development, buildings, advances, societal values, laws, location rank, and other modifiers.<\/p>\n<h3>Where to inspect it:<\/h3>\n<p>Use the Population Capacity map mode and location tooltips to inspect current values. See <a class=\"concept-link\" href=\"#pp-farm-capacity\">P&amp;P: Building Capacity<\/a> for how Population Capacity feeds farming capacity, and <span class=\"concept-ref\">Pp Location Potential<\/span> for the shared static model behind capacity and local output.<\/p>"},{"id":"pp-population-growth","order":15,"filter":"pop_growth","filter_label":"Population Growth","concept_key":"pp_population_growth","title_key":"game_concept_pp_population_growth","body_key":"game_concept_pp_population_growth_desc","title":"Population Growth","body_raw":"In general, abundance of food causes [population_growth|e]. Positive [population_growth|e] comes from two main sources: [pp_cheap_food|e] and [pp_province_current_food_storage|e].\n\nNegative [population_growth|e] comes from [pp_starvation|e], [pp_expensive_food|e], or low food storages in provinces.\n\n#T Balancing Modifiers:#!\nSome modifiers—such as negative [population_growth|e] in cities, towns, and rural locations—exist purely to balance out the positive modifiers and create an equilibrium. They have no other meaning.\n\n#T Population Capacity:#!\nWhen a location grows far above [pp_population_capacity|e], [population_growth|e] slowly goes down. Capacity can change through buildings, development, irrigation, advances, and other modifiers, but it is no longer meant to represent housing alone.","body_plain":"In general, abundance of food causes Population Growth. Positive Population Growth comes from two main sources: Pp Cheap Food and Pp Province Current Food Storage.\n\nNegative Population Growth comes from Pp Starvation, Pp Expensive Food, or low food storages in provinces.\n\nBalancing Modifiers:\nSome modifiers—such as negative Population Growth in cities, towns, and rural locations—exist purely to balance out the positive modifiers and create an equilibrium. They have no other meaning.\n\nPopulation Capacity:\nWhen a location grows far above Pp Population Capacity, Population Growth slowly goes down. Capacity can change through buildings, development, irrigation, advances, and other modifiers, but it is no longer meant to represent housing alone.","icon_texture":"gfx/interface/icons/flat_icons/trade_market/food_stockpile.dds","definition":{"key":"pp_population_growth","file":"main_menu/common/game_concepts/pp_population_growth.txt","line":2,"family":"food","texture":"flat_icons/trade_market/food_stockpile","aliases":[]},"source":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concept":"main_menu/common/game_concepts/pp_population_growth.txt"},"links":["population_growth","pp_cheap_food","pp_expensive_food","pp_population_capacity","pp_province_current_food_storage","pp_starvation"],"body_html":"<p>In general, abundance of food causes <span class=\"concept-ref\">Population Growth<\/span>. Positive <span class=\"concept-ref\">Population Growth<\/span> comes from two main sources: <a class=\"concept-link\" href=\"#pp-cheap-food\">P&amp;P: Cheap Food in Location<\/a> and <a class=\"concept-link\" href=\"#pp-province-current-food-storage\">P&amp;P: Province Current Food Storage<\/a>.<\/p>\n<p>Negative <span class=\"concept-ref\">Population Growth<\/span> comes from <a class=\"concept-link\" href=\"#pp-starvation\">P&amp;P: Starvation<\/a>, <a class=\"concept-link\" href=\"#pp-expensive-food\">P&amp;P: Expensive Food in Location<\/a>, or low food storages in provinces.<\/p>\n<h3>Balancing Modifiers:<\/h3>\n<p>Some modifiers—such as negative <span class=\"concept-ref\">Population Growth<\/span> in cities, towns, and rural locations—exist purely to balance out the positive modifiers and create an equilibrium. They have no other meaning.<\/p>\n<h3>Population Capacity:<\/h3>\n<p>When a location grows far above <a class=\"concept-link\" href=\"#pp-population-capacity\">P&amp;P: Population Capacity<\/a>, <span class=\"concept-ref\">Population Growth<\/span> slowly goes down. Capacity can change through buildings, development, irrigation, advances, and other modifiers, but it is no longer meant to represent housing alone.<\/p>"},{"id":"pp-population-distribution","order":16,"filter":"pop_dist","filter_label":"Population Distribution","concept_key":"pp_population_distribution","title_key":"game_concept_pp_population_distribution","body_key":"game_concept_pp_population_distribution_desc","title":"Population Distribution","body_raw":"The local and the global distribution of your population and their literacy (which estate they belong to) has different benefits for your country.\n\n#T Local impacts:#!\nThese effects apply per location and depend on the types and literacy of pops in that location:\n\n$BULLET$ #Y Literacy impact:#! Literate pops of a given type give local bonuses.\n$BULLET$ [ShowPopTypeName('laborers')]: Maximum RGO Size, raw material output\n$BULLET$ [ShowPopTypeName('peasants')]: wheat, rice, millet, maize, legumes, fruit, olives, potato, livestock, beeswax, wool, fish, wild game, fur, and victuals output modifiers\n$BULLET$ #Y Pop percentage impact:#! The share of each pop type in a location matters.\n$BULLET$ [ShowPopTypeName('laborers')]: monthly development\n$BULLET$ [ShowPopTypeName('soldiers')]: max control\n$BULLET$ [ShowPopTypeName('peasants')]: devastation recovery, construction speed, build cost\n$BULLET$ #Y Unemployed peasants:#! Locations with unemployed peasants receive negative modifiers to monthly development and institution growth.\n\n#T Global impacts:#!\nThese effects apply country-wide based on your overall population distribution:\n\n$BULLET$ [ShowPopTypeName('burghers')] share in country: monthly development, monthly prosperity, merchant capacity modifier\n$BULLET$ [ShowPopTypeName('peasants')] share in country: institution growth modifier (negative)\n$BULLET$ [ShowPopTypeName('soldiers')] share in country: max control","body_plain":"The local and the global distribution of your population and their literacy (which estate they belong to) has different benefits for your country.\n\nLocal impacts:\nThese effects apply per location and depend on the types and literacy of pops in that location:\n\n-  Literacy impact: Literate pops of a given type give local bonuses.\n-  Laborers: Maximum RGO Size, raw material output\n-  Peasants: wheat, rice, millet, maize, legumes, fruit, olives, potato, livestock, beeswax, wool, fish, wild game, fur, and victuals output modifiers\n-  Pop percentage impact: The share of each pop type in a location matters.\n-  Laborers: monthly development\n-  Soldiers: max control\n-  Peasants: devastation recovery, construction speed, build cost\n-  Unemployed peasants: Locations with unemployed peasants receive negative modifiers to monthly development and institution growth.\n\nGlobal impacts:\nThese effects apply country-wide based on your overall population distribution:\n\n-  Burghers share in country: monthly development, monthly prosperity, merchant capacity modifier\n-  Peasants share in country: institution growth modifier (negative)\n-  Soldiers share in country: max control","icon_texture":"gfx/interface/icons/flat_icons/building_panel/employees.dds","definition":{"key":"pp_population_distribution","file":"main_menu/common/game_concepts/pp_population_distribution.txt","line":2,"family":"food","texture":"flat_icons/building_panel/employees","aliases":[]},"source":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concept":"main_menu/common/game_concepts/pp_population_distribution.txt"},"links":[],"body_html":"<p>The local and the global distribution of your population and their literacy (which estate they belong to) has different benefits for your country.<\/p>\n<h3>Local impacts:<\/h3>\n<p>These effects apply per location and depend on the types and literacy of pops in that location:<\/p>\n<ul><li><strong>Literacy impact:<\/strong> Literate pops of a given type give local bonuses.<\/li><li><span class=\"token token-pop\">Laborers<\/span>: Maximum RGO Size, raw material output<\/li><li><span class=\"token token-pop\">Peasants<\/span>: wheat, rice, millet, maize, legumes, fruit, olives, potato, livestock, beeswax, wool, fish, wild game, fur, and victuals output modifiers<\/li><li><strong>Pop percentage impact:<\/strong> The share of each pop type in a location matters.<\/li><li><span class=\"token token-pop\">Laborers<\/span>: monthly development<\/li><li><span class=\"token token-pop\">Soldiers<\/span>: max control<\/li><li><span class=\"token token-pop\">Peasants<\/span>: devastation recovery, construction speed, build cost<\/li><li><strong>Unemployed peasants:<\/strong> Locations with unemployed peasants receive negative modifiers to monthly development and institution growth.<\/li><\/ul>\n<h3>Global impacts:<\/h3>\n<p>These effects apply country-wide based on your overall population distribution:<\/p>\n<ul><li><span class=\"token token-pop\">Burghers<\/span> share in country: monthly development, monthly prosperity, merchant capacity modifier<\/li><li><span class=\"token token-pop\">Peasants<\/span> share in country: institution growth modifier (negative)<\/li><li><span class=\"token token-pop\">Soldiers<\/span> share in country: max control<\/li><\/ul>"},{"id":"pp-buildings-in-location","order":17,"filter":"other_changes","filter_label":"Other Changes","concept_key":"pp_buildings_in_location","title_key":"game_concept_pp_buildings_in_location","body_key":"game_concept_pp_buildings_in_location_desc","title":"P&P: Buildings in Location","body_raw":"locations receive [ShowModifier('building_levels')] based on their total [building|e] levels. Buildings can increase [pp_population_capacity|e], but ordinary construction also pressures shared rural space; see [pp_urbanization|e] and [pp_farm_capacity|e].\n\n[ShowModifierEffect('building_levels')]","body_plain":"locations receive Building Levels based on their total Building levels. Buildings can increase Pp Population Capacity, but ordinary construction also pressures shared rural space; see Pp Urbanization and Pp Farm Capacity.\n\nBuilding Levels","icon_texture":"gfx/interface/icons/flat_icons/balance/trade.dds","definition":{"key":"pp_buildings_in_location","file":"main_menu/common/game_concepts/other_changes_pp_buildings_in_location.txt","line":2,"family":"food","texture":"flat_icons/balance/trade","aliases":[]},"source":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concept":"main_menu/common/game_concepts/other_changes_pp_buildings_in_location.txt"},"links":["building","pp_farm_capacity","pp_population_capacity","pp_urbanization"],"body_html":"<p>locations receive <span class=\"token token-modifier\">Building Levels<\/span> based on their total <span class=\"concept-ref\">Building<\/span> levels. Buildings can increase <a class=\"concept-link\" href=\"#pp-population-capacity\">P&amp;P: Population Capacity<\/a>, but ordinary construction also pressures shared rural space; see <a class=\"concept-link\" href=\"#pp-urbanization\">P&amp;P: Urbanization<\/a> and <a class=\"concept-link\" href=\"#pp-farm-capacity\">P&amp;P: Building Capacity<\/a>.<\/p>\n<p><span class=\"token token-effect\">modifier effects: Building Levels<\/span><\/p>"},{"id":"pp-available-free-land","order":18,"filter":"other_changes","filter_label":"Other Changes","concept_key":"pp_available_free_land","title_key":"game_concept_pp_available_free_land","body_key":"game_concept_pp_available_free_land_desc","title":"P&P: Available Free Land","body_raw":"Locations below [pp_population_capacity|e] can receive [ShowModifier('available_free_land')]. When fewer people compete for the same land, they can choose better fields, pastures, fishing spots, and forest work sites instead of being forced onto marginal ground.\n\nThis improves farming and other rural raw-good output while the location has spare food-support potential. The bonus fades as population approaches capacity and is gone at full capacity. It is one of the main systems that makes locations become better or worse at farming as they fill up.\n\n[ShowModifierEffect('available_free_land')]","body_plain":"Locations below Pp Population Capacity can receive Available Free Land. When fewer people compete for the same land, they can choose better fields, pastures, fishing spots, and forest work sites instead of being forced onto marginal ground.\n\nThis improves farming and other rural raw-good output while the location has spare food-support potential. The bonus fades as population approaches capacity and is gone at full capacity. It is one of the main systems that makes locations become better or worse at farming as they fill up.\n\nAvailable Free Land","icon_texture":"gfx/interface/icons/flat_icons/trade_market/food_stockpile.dds","definition":{"key":"pp_available_free_land","file":"main_menu/common/game_concepts/other_changes_pp_available_free_land.txt","line":2,"family":"food","texture":"modifier_types/wheat_positive","aliases":[]},"source":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concept":"main_menu/common/game_concepts/other_changes_pp_available_free_land.txt"},"links":["pp_population_capacity"],"body_html":"<p>Locations below <a class=\"concept-link\" href=\"#pp-population-capacity\">P&amp;P: Population Capacity<\/a> can receive <span class=\"token token-modifier\">Available Free Land<\/span>. When fewer people compete for the same land, they can choose better fields, pastures, fishing spots, and forest work sites instead of being forced onto marginal ground.<\/p>\n<p>This improves farming and other rural raw-good output while the location has spare food-support potential. The bonus fades as population approaches capacity and is gone at full capacity. It is one of the main systems that makes locations become better or worse at farming as they fill up.<\/p>\n<p><span class=\"token token-effect\">modifier effects: Available Free Land<\/span><\/p>"},{"id":"pp-abundant-free-land","order":19,"filter":"other_changes","filter_label":"Other Changes","concept_key":"pp_abundant_free_land","title_key":"game_concept_pp_abundant_free_land","body_key":"game_concept_pp_abundant_free_land_desc","title":"P&P: Abundant Free Land","body_raw":"Locations far below [pp_population_capacity|e] can receive [ShowModifier('abundant_free_land')], the stronger free-land state. The logic is the same: with a lot of unused capacity, people have more choice and can work the best local farming spots first.\n\nAs population grows, this advantage declines and eventually disappears at full capacity. Exact effects are shown below and in the modifier tooltip.\n\n[ShowModifierEffect('abundant_free_land')]","body_plain":"Locations far below Pp Population Capacity can receive Abundant Free Land, the stronger free-land state. The logic is the same: with a lot of unused capacity, people have more choice and can work the best local farming spots first.\n\nAs population grows, this advantage declines and eventually disappears at full capacity. Exact effects are shown below and in the modifier tooltip.\n\nAbundant Free Land","icon_texture":"gfx/interface/icons/flat_icons/trade_market/food_stockpile.dds","definition":{"key":"pp_abundant_free_land","file":"main_menu/common/game_concepts/other_changes_pp_abundant_free_land.txt","line":2,"family":"food","texture":"modifier_types/wheat_positive","aliases":[]},"source":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concept":"main_menu/common/game_concepts/other_changes_pp_abundant_free_land.txt"},"links":["pp_population_capacity"],"body_html":"<p>Locations far below <a class=\"concept-link\" href=\"#pp-population-capacity\">P&amp;P: Population Capacity<\/a> can receive <span class=\"token token-modifier\">Abundant Free Land<\/span>, the stronger free-land state. The logic is the same: with a lot of unused capacity, people have more choice and can work the best local farming spots first.<\/p>\n<p>As population grows, this advantage declines and eventually disappears at full capacity. Exact effects are shown below and in the modifier tooltip.<\/p>\n<p><span class=\"token token-effect\">modifier effects: Abundant Free Land<\/span><\/p>"},{"id":"pp-prosperity","order":20,"filter":"other_changes","filter_label":"Other Changes","concept_key":"pp_prosperity","title_key":"game_concept_pp_prosperity","body_key":"game_concept_pp_prosperity_desc","title":"P&P: Prosperity","body_raw":"Prosperity is great for locations in the long term. In this mod, it is closely tied to food availability: cheap food and well-stocked storages boost prosperity, which in turn supports higher food consumption and [population_growth|e]. See [pp_food_consumption|e] for how food prices affect prosperity.\n\n#T Note:#!\nProsperity scales from 0% to 100%.\n\n[ShowModifierEffect('prosperity')]","body_plain":"Prosperity is great for locations in the long term. In this mod, it is closely tied to food availability: cheap food and well-stocked storages boost prosperity, which in turn supports higher food consumption and Population Growth. See Pp Food Consumption for how food prices affect prosperity.\n\nNote:\nProsperity scales from 0% to 100%.\n\nProsperity","icon_texture":"gfx/interface/icons/flat_icons/trade_market/food_stockpile.dds","definition":{"key":"pp_prosperity","file":"main_menu/common/game_concepts/other_changes_pp_prosperity.txt","line":2,"family":"food","texture":"flat_icons/trade_market/food_stockpile","aliases":[]},"source":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concept":"main_menu/common/game_concepts/other_changes_pp_prosperity.txt"},"links":["population_growth","pp_food_consumption"],"body_html":"<p>Prosperity is great for locations in the long term. In this mod, it is closely tied to food availability: cheap food and well-stocked storages boost prosperity, which in turn supports higher food consumption and <span class=\"concept-ref\">Population Growth<\/span>. See <a class=\"concept-link\" href=\"#pp-food-consumption\">P&amp;P: Food Consumption<\/a> for how food prices affect prosperity.<\/p>\n<h3>Note:<\/h3>\n<p>Prosperity scales from 0% to 100%.<\/p>\n<p><span class=\"token token-effect\">modifier effects: Prosperity<\/span><\/p>"},{"id":"pp-devastation","order":21,"filter":"other_changes","filter_label":"Other Changes","concept_key":"pp_devastation","title_key":"game_concept_pp_devastation","body_key":"game_concept_pp_devastation_desc","title":"P&P: Devastation","body_raw":"Devastation has horrible consequences for locations. See [pp_food_consumption|e] for full context.\n\n#T Note:#!\nDevastation scales from 0 to -100%, so the values shown below are actually inverted at -100% devastation.\n\n[ShowModifierEffect('devastation')]","body_plain":"Devastation has horrible consequences for locations. See Pp Food Consumption for full context.\n\nNote:\nDevastation scales from 0 to -100%, so the values shown below are actually inverted at -100% devastation.\n\nDevastation","icon_texture":"gfx/interface/icons/flat_icons/military/bankruptcy.dds","definition":{"key":"pp_devastation","file":"main_menu/common/game_concepts/other_changes_pp_devastation.txt","line":2,"family":"food","texture":"flat_icons/military/bankruptcy","aliases":[]},"source":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concept":"main_menu/common/game_concepts/other_changes_pp_devastation.txt"},"links":["pp_food_consumption"],"body_html":"<p>Devastation has horrible consequences for locations. See <a class=\"concept-link\" href=\"#pp-food-consumption\">P&amp;P: Food Consumption<\/a> for full context.<\/p>\n<h3>Note:<\/h3>\n<p>Devastation scales from 0 to -100%, so the values shown below are actually inverted at -100% devastation.<\/p>\n<p><span class=\"token token-effect\">modifier effects: Devastation<\/span><\/p>"},{"id":"pp-province-current-food-storage","order":22,"filter":"other_changes","filter_label":"Other Changes","concept_key":"pp_province_current_food_storage","title_key":"game_concept_pp_province_current_food_storage","body_key":"game_concept_pp_province_current_food_storage_desc","title":"P&P: Province Current Food Storage","body_raw":"A province with growing food storage receives [ShowModifier('positive_province_food_growth')]. This modifier scales with stored province food. See [pp_food_consumption|e] for context.\n\n[ShowModifierEffect('positive_province_food_growth')]","body_plain":"A province with growing food storage receives Positive Province Food Growth. This modifier scales with stored province food. See Pp Food Consumption for context.\n\nPositive Province Food Growth","icon_texture":"gfx/interface/icons/flat_icons/trade_market/food_stockpile.dds","definition":{"key":"pp_province_current_food_storage","file":"main_menu/common/game_concepts/other_changes_pp_province_current_food_storage.txt","line":2,"family":"food","texture":"flat_icons/trade_market/food_stockpile","aliases":[]},"source":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concept":"main_menu/common/game_concepts/other_changes_pp_province_current_food_storage.txt"},"links":["pp_food_consumption"],"body_html":"<p>A province with growing food storage receives <span class=\"token token-modifier\">Positive Province Food Growth<\/span>. This modifier scales with stored province food. See <a class=\"concept-link\" href=\"#pp-food-consumption\">P&amp;P: Food Consumption<\/a> for context.<\/p>\n<p><span class=\"token token-effect\">modifier effects: Positive Province Food Growth<\/span><\/p>"},{"id":"pp-cheap-food","order":23,"filter":"other_changes","filter_label":"Other Changes","concept_key":"pp_cheap_food","title_key":"game_concept_pp_cheap_food","body_key":"game_concept_pp_cheap_food_desc","title":"P&P: Cheap Food in Location","body_raw":"When food is cheap on the market and province storages are well stocked, locations receive [ShowModifier('cheap_food_in_location')]. People consume more—less rationing, choosier diets. These effects scale depending on how far below the base price the food price is: the cheaper it gets, the stronger the modifier. See [pp_food_consumption|e] for full context.\n\n#T Display Note:#!\nBecause of Paradox scaling, the maximum value you can actually get is only half of the value shown below.\n\n[ShowModifierEffect('cheap_food_in_location')]","body_plain":"When food is cheap on the market and province storages are well stocked, locations receive Cheap Food In Location. People consume more—less rationing, choosier diets. These effects scale depending on how far below the base price the food price is: the cheaper it gets, the stronger the modifier. See Pp Food Consumption for full context.\n\nDisplay Note:\nBecause of Paradox scaling, the maximum value you can actually get is only half of the value shown below.\n\nCheap Food In Location","icon_texture":"gfx/interface/icons/flat_icons/trade_market/food_stockpile.dds","definition":{"key":"pp_cheap_food","file":"main_menu/common/game_concepts/other_changes_pp_cheap_food.txt","line":2,"family":"food","texture":"flat_icons/trade_market/food_stockpile","aliases":[]},"source":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concept":"main_menu/common/game_concepts/other_changes_pp_cheap_food.txt"},"links":["pp_food_consumption"],"body_html":"<p>When food is cheap on the market and province storages are well stocked, locations receive <span class=\"token token-modifier\">Cheap Food In Location<\/span>. People consume more—less rationing, choosier diets. These effects scale depending on how far below the base price the food price is: the cheaper it gets, the stronger the modifier. See <a class=\"concept-link\" href=\"#pp-food-consumption\">P&amp;P: Food Consumption<\/a> for full context.<\/p>\n<h3>Display Note:<\/h3>\n<p>Because of Paradox scaling, the maximum value you can actually get is only half of the value shown below.<\/p>\n<p><span class=\"token token-effect\">modifier effects: Cheap Food In Location<\/span><\/p>"},{"id":"pp-expensive-food","order":24,"filter":"other_changes","filter_label":"Other Changes","concept_key":"pp_expensive_food","title_key":"game_concept_pp_expensive_food","body_key":"game_concept_pp_expensive_food_desc","title":"P&P: Expensive Food in Location","body_raw":"When food is expensive on the market and province storages are low or empty, locations receive [ShowModifier('expensive_food_in_location')]. People consume less—they get more out of their food, are less picky, and minds focus on feeding families. These effects scale depending on how far above the base price the food price is: the more expensive it gets, the stronger the modifier. See [pp_food_consumption|e] for full context.\n\n#T Display Note:#!\nBecause of Paradox scaling, the maximum value you can actually get is only half of the value shown below.\n\n[ShowModifierEffect('expensive_food_in_location')]","body_plain":"When food is expensive on the market and province storages are low or empty, locations receive Expensive Food In Location. People consume less—they get more out of their food, are less picky, and minds focus on feeding families. These effects scale depending on how far above the base price the food price is: the more expensive it gets, the stronger the modifier. See Pp Food Consumption for full context.\n\nDisplay Note:\nBecause of Paradox scaling, the maximum value you can actually get is only half of the value shown below.\n\nExpensive Food In Location","icon_texture":"gfx/interface/icons/flat_icons/trade_market/food_stockpile.dds","definition":{"key":"pp_expensive_food","file":"main_menu/common/game_concepts/other_changes_pp_expensive_food.txt","line":2,"family":"food","texture":"flat_icons/trade_market/food_stockpile","aliases":[]},"source":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concept":"main_menu/common/game_concepts/other_changes_pp_expensive_food.txt"},"links":["pp_food_consumption"],"body_html":"<p>When food is expensive on the market and province storages are low or empty, locations receive <span class=\"token token-modifier\">Expensive Food In Location<\/span>. People consume less—they get more out of their food, are less picky, and minds focus on feeding families. These effects scale depending on how far above the base price the food price is: the more expensive it gets, the stronger the modifier. See <a class=\"concept-link\" href=\"#pp-food-consumption\">P&amp;P: Food Consumption<\/a> for full context.<\/p>\n<h3>Display Note:<\/h3>\n<p>Because of Paradox scaling, the maximum value you can actually get is only half of the value shown below.<\/p>\n<p><span class=\"token token-effect\">modifier effects: Expensive Food In Location<\/span><\/p>"},{"id":"pp-starvation","order":25,"filter":"other_changes","filter_label":"Other Changes","concept_key":"pp_starvation","title_key":"game_concept_pp_starvation","body_key":"game_concept_pp_starvation_desc","title":"P&P: Starvation","body_raw":"When a province's food storage reaches 0, the pops will starve and die.\n\nThis gives the following effect:\n[ShowModifierEffect('province_starving')]","body_plain":"When a province's food storage reaches 0, the pops will starve and die.\n\nThis gives the following effect:\nProvince Starving","icon_texture":"gfx/interface/icons/flat_icons/military/bankruptcy.dds","definition":{"key":"pp_starvation","file":"main_menu/common/game_concepts/other_changes_pp_starvation.txt","line":2,"family":"food","texture":"flat_icons/military/bankruptcy","aliases":[]},"source":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concept":"main_menu/common/game_concepts/other_changes_pp_starvation.txt"},"links":[],"body_html":"<p>When a province&#x27;s food storage reaches 0, the pops will starve and die.<\/p>\n<p>This gives the following effect:<\/p>\n<p><span class=\"token token-effect\">modifier effects: Province Starving<\/span><\/p>"}]};
    const entriesEl = document.getElementById("entries");
    const filterButtonsEl = document.getElementById("filterButtons");
    const searchInput = document.getElementById("searchInput");
    const summaryMeta = document.getElementById("summaryMeta");
    let activeFilter = "all";

    function renderFilters() {
      filterButtonsEl.innerHTML = "";
      for (const filter of europediaPayload.filters) {
        const button = document.createElement("button");
        button.type = "button";
        button.dataset.filter = filter.id;
        button.className = filter.id === activeFilter ? "active" : "";
        button.textContent = `${filter.label} (${filter.id === "all" ? europediaPayload.entries.length : filter.count})`;
        button.addEventListener("click", () => {
          activeFilter = filter.id;
          render();
        });
        filterButtonsEl.appendChild(button);
      }
    }

    function render() {
      renderFilters();
      const query = searchInput.value.trim().toLowerCase();
      const visibleEntries = europediaPayload.entries.filter(entry => {
        const matchesFilter = activeFilter === "all" || entry.filter === activeFilter;
        const haystack = `${entry.title} ${entry.body_plain} ${entry.title_key} ${entry.body_key}`.toLowerCase();
        return matchesFilter && (!query || haystack.includes(query));
      });
      summaryMeta.textContent = `${visibleEntries.length} of ${europediaPayload.entries.length} entries`;
      entriesEl.innerHTML = visibleEntries.length
        ? visibleEntries.map(entryHtml).join("")
        : '<div class="empty">No Europedia entries match the current filter.</div>';
    }

    function entryHtml(entry) {
      const iconLabel = entry.icon_texture ? entry.icon_texture.split("/").pop().replace(".dds", "") : "PP";
      const source = entry.definition?.file || entry.source.localization;
      return `
        <article class="entry" id="${escapeHtml(entry.id)}">
          <div class="entry-head">
            <div class="icon" title="${escapeHtml(entry.icon_texture || "")}">${escapeHtml(iconLabel.slice(0, 3).toUpperCase())}</div>
            <div>
              <h2>${escapeHtml(entry.title)}</h2>
              <div class="meta">${escapeHtml(entry.filter_label)} · ${escapeHtml(entry.concept_key)}</div>
            </div>
          </div>
          <div class="entry-body">
            ${entry.body_html}
            <div class="source-row">Source: ${escapeHtml(source)} · ${escapeHtml(entry.title_key)} / ${escapeHtml(entry.body_key)}</div>
          </div>
        </article>
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function exportJson() {
      const blob = new Blob([JSON.stringify(europediaPayload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "europedia_entries.json";
      link.click();
      URL.revokeObjectURL(url);
    }

    searchInput.addEventListener("input", render);
    document.getElementById("exportJsonButton").addEventListener("click", exportJson);
    render();
  </script>
