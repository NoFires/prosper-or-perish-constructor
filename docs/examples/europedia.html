    const europediaPayload = {"metadata":{"title":"Prosper or Perish Europedia","entry_count":25,"sources":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concepts":"main_menu/common/game_concepts"}},"filters":[{"id":"all","label":"All","count":25},{"id":"faq","label":"F.A.Q.","count":1},{"id":"update_0_8","label":"Update 0.8","count":1},{"id":"update_0_8_1","label":"Update 0.8.1","count":1},{"id":"overview","label":"Overview","count":1},{"id":"urbanization","label":"Urbanisation","count":1},{"id":"food_in_eu5","label":"Food in EU5","count":1},{"id":"food","label":"Food Production","count":1},{"id":"food_consumption","label":"Food Consumption","count":1},{"id":"victuals","label":"New Trade Goods","count":1},{"id":"cookery","label":"New Buildings","count":1},{"id":"farm_capacity","label":"Building Capacity","count":1},{"id":"farm_output","label":"Building Output","count":1},{"id":"harvest","label":"Variable Harvests","count":1},{"id":"pop_capacity","label":"Population Capacity","count":1},{"id":"pop_growth","label":"Population Growth","count":1},{"id":"pop_dist","label":"Population Distribution","count":1},{"id":"other_changes","label":"Other Changes","count":9}],"entries":[{"id":"pp-update-0-8-1","order":1,"filter":"update_0_8_1","filter_label":"Update 0.8.1","concept_key":"pp_update_0_8_1","title_key":"game_concept_pp_update_0_8_1","body_key":"game_concept_pp_update_0_8_1_desc","title":"Update 0.8.1","body_raw":"#T Update 0.8.1 Prosper or Perish#!\nThis is a minor balance update that is likely not save compatible, so I recommend restarting or continuing to play on the older version of the mod.\n\n#T Patch Notes:#!\n$BULLET$ Switched a bunch of growth from stored food in provinces to [pp_cheap_food|e] and [pp_positive_province_food_growth|e]. This was done because these are the more interesting modifiers and they are not bugged anymore.\n$BULLET$ Changed employment type and amount for a bunch of food-related buildings based on feedback that they were too micromanagement intensive to keep sorted. The employment-all systems were also changed so they now prioritize how buildings are filled in this order: Granaries > Cookeries > Victuals Market > irrigation type buildings > staple food producing buildings. This has improved AI performance and should reduce the micromanagement needed to keep them staffed. Expect more changes when 1.3 hits. I also want to thank Noslon again here; I think the solution he spearheaded is a good stopgap until we hopefully get better solutions in the 1.3 beta.\n$BULLET$ Fixed a bunch of 1.2-related oversights, including Byzantium now working properly.\n$BULLET$ Improved performance. The game should run around 10% faster now.\n$BULLET$ Reworked all map modes. They should be much clearer now. I am not a UI guy.\n$BULLET$ Fixed a bunch of issues with advances being locked behind age focus.\n$BULLET$ Added minor balancing for outlier start regions, especially Hungary and England.\n\n#T Next Changes:#!\n$BULLET$ I am looking for solutions to change building cost in location into something else, but the options are quite limited. I hope the 1.3 beta gives us more tools; even if not, it will change.\n$BULLET$ Polishing and reducing tedium will be a bigger part of the next patches. 0.8 did a lot of groundwork, and that was extremely time consuming, so I barely had time to actually play the game. Now it is time to fix quirks and make it all more fun, hopefully.\n$BULLET$ As hitting historical benchmarks improves, smaller-scope regions will be finetuned more.\n\nThis will be the last Steam patch before 0.9. Next week I will start on 0.9 when the 1.3 EU5 beta hits, and I will move to work on that.","body_plain":"Update 0.8.1 Prosper or Perish\nThis is a minor balance update that is likely not save compatible, so I recommend restarting or continuing to play on the older version of the mod.\n\nPatch Notes:\n-  Switched a bunch of growth from stored food in provinces to Pp Cheap Food and Pp Positive Province Food Growth. This was done because these are the more interesting modifiers and they are not bugged anymore.\n-  Changed employment type and amount for a bunch of food-related buildings based on feedback that they were too micromanagement intensive to keep sorted. The employment-all systems were also changed so they now prioritize how buildings are filled in this order: Granaries > Cookeries > Victuals Market > irrigation type buildings > staple food producing buildings. This has improved AI performance and should reduce the micromanagement needed to keep them staffed. Expect more changes when 1.3 hits. I also want to thank Noslon again here; I think the solution he spearheaded is a good stopgap until we hopefully get better solutions in the 1.3 beta.\n-  Fixed a bunch of 1.2-related oversights, including Byzantium now working properly.\n-  Improved performance. The game should run around 10% faster now.\n-  Reworked all map modes. They should be much clearer now. I am not a UI guy.\n-  Fixed a bunch of issues with advances being locked behind age focus.\n-  Added minor balancing for outlier start regions, especially Hungary and England.\n\nNext Changes:\n-  I am looking for solutions to change building cost in location into something else, but the options are quite limited. I hope the 1.3 beta gives us more tools; even if not, it will change.\n-  Polishing and reducing tedium will be a bigger part of the next patches. 0.8 did a lot of groundwork, and that was extremely time consuming, so I barely had time to actually play the game. Now it is time to fix quirks and make it all more fun, hopefully.\n-  As hitting historical benchmarks improves, smaller-scope regions will be finetuned more.\n\nThis will be the last Steam patch before 0.9. Next week I will start on 0.9 when the 1.3 EU5 beta hits, and I will move to work on that.","icon_texture":"gfx/interface/icons/flat_icons/trade_market/food_stockpile.dds","definition":{"key":"pp_update_0_8_1","file":"main_menu/common/game_concepts/pp_update_0_8_1.txt","line":2,"family":"food","texture":"flat_icons/trade_market/food_stockpile","aliases":[]},"source":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concept":"main_menu/common/game_concepts/pp_update_0_8_1.txt"},"links":["pp_cheap_food","pp_positive_province_food_growth"],"body_html":"<h3>Update 0.8.1 Prosper or Perish<\/h3>\n<p>This is a minor balance update that is likely not save compatible, so I recommend restarting or continuing to play on the older version of the mod.<\/p>\n<h3>Patch Notes:<\/h3>\n<ul><li>Switched a bunch of growth from stored food in provinces to <a class=\"concept-link\" href=\"#pp-cheap-food\">P&amp;P: Cheap Food in Location<\/a> and <span class=\"concept-ref\">Pp Positive Province Food Growth<\/span>. This was done because these are the more interesting modifiers and they are not bugged anymore.<\/li><li>Changed employment type and amount for a bunch of food-related buildings based on feedback that they were too micromanagement intensive to keep sorted. The employment-all systems were also changed so they now prioritize how buildings are filled in this order: Granaries &gt; Cookeries &gt; Victuals Market &gt; irrigation type buildings &gt; staple food producing buildings. This has improved AI performance and should reduce the micromanagement needed to keep them staffed. Expect more changes when 1.3 hits. I also want to thank Noslon again here; I think the solution he spearheaded is a good stopgap until we hopefully get better solutions in the 1.3 beta.<\/li><li>Fixed a bunch of 1.2-related oversights, including Byzantium now working properly.<\/li><li>Improved performance. The game should run around 10% faster now.<\/li><li>Reworked all map modes. They should be much clearer now. I am not a UI guy.<\/li><li>Fixed a bunch of issues with advances being locked behind age focus.<\/li><li>Added minor balancing for outlier start regions, especially Hungary and England.<\/li><\/ul>\n<h3>Next Changes:<\/h3>\n<ul><li>I am looking for solutions to change building cost in location into something else, but the options are quite limited. I hope the 1.3 beta gives us more tools; even if not, it will change.<\/li><li>Polishing and reducing tedium will be a bigger part of the next patches. 0.8 did a lot of groundwork, and that was extremely time consuming, so I barely had time to actually play the game. Now it is time to fix quirks and make it all more fun, hopefully.<\/li><li>As hitting historical benchmarks improves, smaller-scope regions will be finetuned more.<\/li><\/ul>\n<p>This will be the last Steam patch before 0.9. Next week I will start on 0.9 when the 1.3 EU5 beta hits, and I will move to work on that.<\/p>"},{"id":"pp-update-0-8-foundations","order":2,"filter":"update_0_8","filter_label":"Update 0.8","concept_key":"pp_update_0_8_foundations","title_key":"game_concept_pp_update_0_8_foundations","body_key":"game_concept_pp_update_0_8_foundations_desc","title":"Update 0.8: Foundations","body_raw":"#T Update 0.8: Foundations#!\nWelcome to Foundations. This is easily the largest Prosper or Perish update yet. Hopefully it is balanced enough and bug free enough, but please expect tuning and polish to continue as feedback comes in.\n\nThis page is only a short overview. Use the linked Europedia pages for the actual details.\n\n#T RGO Rework:#!\nLocations keep their historical raw-material identity and start-of-game RGO levels, but RGO level upgrades are disabled. Raw material growth now comes through buildings, upgrades, production methods, and advances.\n\nFor the building side of this system, see [pp_cookery|e]. For where and how many rural buildings can be built, see [pp_farm_capacity|e]. For local productivity, see [pp_farm_output|e].\n\n#T Agriculture and Rural Production:#!\nAgriculture, animal husbandry, fishing, forestry, and other raw-good production now split into separate questions:\n\n$BULLET$ #Y Can it be built?#! Check the building tooltip and local RGO or geography.\n$BULLET$ #Y How many can be built?#! See [pp_farm_capacity|e], [pp_fish_capacity|e], and [pp_forest_capacity|e].\n$BULLET$ #Y How efficient is it?#! See [pp_farm_output|e] and the local output map modes.\n\n#T Population Capacity:#!\n[pp_population_capacity|e] has also been reworked. It is now about food-support potential, not just housing. The details are on the linked page.","body_plain":"Update 0.8: Foundations\nWelcome to Foundations. This is easily the largest Prosper or Perish update yet. Hopefully it is balanced enough and bug free enough, but please expect tuning and polish to continue as feedback comes in.\n\nThis page is only a short overview. Use the linked Europedia pages for the actual details.\n\nRGO Rework:\nLocations keep their historical raw-material identity and start-of-game RGO levels, but RGO level upgrades are disabled. Raw material growth now comes through buildings, upgrades, production methods, and advances.\n\nFor the building side of this system, see Pp Cookery. For where and how many rural buildings can be built, see Pp Farm Capacity. For local productivity, see Pp Farm Output.\n\nAgriculture and Rural Production:\nAgriculture, animal husbandry, fishing, forestry, and other raw-good production now split into separate questions:\n\n-  Can it be built? Check the building tooltip and local RGO or geography.\n-  How many can be built? See Pp Farm Capacity, Pp Fish Capacity, and Pp Forest Capacity.\n-  How efficient is it? See Pp Farm Output and the local output map modes.\n\nPopulation Capacity:\nPp Population Capacity has also been reworked. It is now about food-support potential, not just housing. The details are on the linked page.","icon_texture":"gfx/interface/icons/flat_icons/trade_market/food_stockpile.dds","definition":{"key":"pp_update_0_8_foundations","file":"main_menu/common/game_concepts/pp_update_0_8_foundations.txt","line":2,"family":"food","texture":"flat_icons/trade_market/food_stockpile","aliases":[]},"source":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concept":"main_menu/common/game_concepts/pp_update_0_8_foundations.txt"},"links":["pp_cookery","pp_farm_capacity","pp_farm_output","pp_fish_capacity","pp_forest_capacity","pp_population_capacity"],"body_html":"<h3>Update 0.8: Foundations<\/h3>\n<p>Welcome to Foundations. This is easily the largest Prosper or Perish update yet. Hopefully it is balanced enough and bug free enough, but please expect tuning and polish to continue as feedback comes in.<\/p>\n<p>This page is only a short overview. Use the linked Europedia pages for the actual details.<\/p>\n<h3>RGO Rework:<\/h3>\n<p>Locations keep their historical raw-material identity and start-of-game RGO levels, but RGO level upgrades are disabled. Raw material growth now comes through buildings, upgrades, production methods, and advances.<\/p>\n<p>For the building side of this system, see <a class=\"concept-link\" href=\"#pp-cookery\">P&amp;P: New Buildings<\/a>. For where and how many rural buildings can be built, see <a class=\"concept-link\" href=\"#pp-farm-capacity\">P&amp;P: Building Capacity<\/a>. For local productivity, see <a class=\"concept-link\" href=\"#pp-farm-output\">P&amp;P: Building Output<\/a>.<\/p>\n<h3>Agriculture and Rural Production:<\/h3>\n<p>Agriculture, animal husbandry, fishing, forestry, and other raw-good production now split into separate questions:<\/p>\n<ul><li><strong>Can it be built?<\/strong> Check the building tooltip and local RGO or geography.<\/li><li><strong>How many can be built?<\/strong> See <a class=\"concept-link\" href=\"#pp-farm-capacity\">P&amp;P: Building Capacity<\/a>, <span class=\"concept-ref\">Pp Fish Capacity<\/span>, and <span class=\"concept-ref\">Pp Forest Capacity<\/span>.<\/li><li><strong>How efficient is it?<\/strong> See <a class=\"concept-link\" href=\"#pp-farm-output\">P&amp;P: Building Output<\/a> and the local output map modes.<\/li><\/ul>\n<h3>Population Capacity:<\/h3>\n<p><a class=\"concept-link\" href=\"#pp-population-capacity\">P&amp;P: Population Capacity<\/a> has also been reworked. It is now about food-support potential, not just housing. The details are on the linked page.<\/p>"},{"id":"prosper-perish-mod","order":3,"filter":"overview","filter_label":"Overview","concept_key":"prosper_perish_mod","title_key":"game_concept_prosper_perish_mod","body_key":"game_concept_prosper_perish_mod_desc","title":"Prosper or Perish (Mod)","body_raw":"#T The Mod:#!\nThis mod overhauls the food system until it is fundamentally different from vanilla. After hundreds of modifier and advance changes and many hours of balancing, food is now the primary driver of pop growth and migration—replacing the old ties to [pp_prosperity|e], Development and similar factors, which instead now shape food capacity and growth.\n\nYou will see a sharp split between rural farming locations urbanized rich cities, incentives for local manufacturing in provinces to ease capital-centric \"clumping,\" and higher infrastructure costs so Roads become a strategic choice rather than something to spam.\n\nThe core loop is simple: full province and low food prices mean strong growth and many other benefits; empty storages and high prices mean heavy emigration, pop demotion, death and other bad outcomes.\n\nThe mod adds new Buildings, new production methods and a new Trade good. When you create a new game, check the game rules for Prosper or Perish: you can disable [pp_variable_harvests|e] if you want a steadier food economy without yearly harvest swings. You can also make the campaign harder—higher player building upkeep, stronger AI food efficiency, or cheaper AI building upkeep—or leave everything on defaults for the standard mod experience.\n\nPlease read at least [pp_food|e] and [pp_food_consumption|e]; they should be enough to get you playing.\n\n#T Feedback:#!\nI really need feedback for specific regions—send it on Steam as a PM or in the mod comments. If some regions look weird or super ahistoric, show me where and I will try to fix it. Same with Cookery recipes: we may need to add more to represent some regions. Please confirm it is not caused by other mods before sending screenshots.\n\nThere are many other changes not covered here. If something is confusing or I forgot to document it, tell me and I will try to add it to this Europedia in the future.\n\n#T How I Add Features:#!\nI follow this checklist:\n\n$BULLET$ Is the mechanic fun to manage for the player?\n$BULLET$ Is the mechanic a concept that can be understood historically?\n$BULLET$ Is the AI able to handle the mechanic?\n\nI am fine with victuals not exactly representing how food was traded and produced historically. I am fine with numbers in-game for how much food a noble consumes or a peasant—these are abstractions to get the game working. I can imagine a noble eating very expensive food, which is the abstraction for why he needs \"more\" food. But if I cannot even imagine how it would make sense in our world, I will likely only add it to get the game working at all.\n\n#T Thanks:#!\nA sincere thank you to everyone who reported bugs, helped with balancing, and took the time to share feedback. Thank you as well to everyone who created compatibility patches and collections around Prosper or Perish, and to the EU5 Mod Coop Discord for the discussions, help, and support.\n\nA special thank you to Karkento for letting me spam him with ideas nonstop and for helping so much with balancing and ideas.\n\nThanks as well to Noslon for providing valuable feedback and good solutions to fix the employment system.\n\nAnd a special thank you to Regal Urangutan for creating the EU5 2.0 collection centered around P&P, and for always being ready to chat and excited to talk about EU5.","body_plain":"The Mod:\nThis mod overhauls the food system until it is fundamentally different from vanilla. After hundreds of modifier and advance changes and many hours of balancing, food is now the primary driver of pop growth and migration—replacing the old ties to Pp Prosperity, Development and similar factors, which instead now shape food capacity and growth.\n\nYou will see a sharp split between rural farming locations urbanized rich cities, incentives for local manufacturing in provinces to ease capital-centric \"clumping,\" and higher infrastructure costs so Roads become a strategic choice rather than something to spam.\n\nThe core loop is simple: full province and low food prices mean strong growth and many other benefits; empty storages and high prices mean heavy emigration, pop demotion, death and other bad outcomes.\n\nThe mod adds new Buildings, new production methods and a new Trade good. When you create a new game, check the game rules for Prosper or Perish: you can disable Pp Variable Harvests if you want a steadier food economy without yearly harvest swings. You can also make the campaign harder—higher player building upkeep, stronger AI food efficiency, or cheaper AI building upkeep—or leave everything on defaults for the standard mod experience.\n\nPlease read at least Pp Food and Pp Food Consumption; they should be enough to get you playing.\n\nFeedback:\nI really need feedback for specific regions—send it on Steam as a PM or in the mod comments. If some regions look weird or super ahistoric, show me where and I will try to fix it. Same with Cookery recipes: we may need to add more to represent some regions. Please confirm it is not caused by other mods before sending screenshots.\n\nThere are many other changes not covered here. If something is confusing or I forgot to document it, tell me and I will try to add it to this Europedia in the future.\n\nHow I Add Features:\nI follow this checklist:\n\n-  Is the mechanic fun to manage for the player?\n-  Is the mechanic a concept that can be understood historically?\n-  Is the AI able to handle the mechanic?\n\nI am fine with victuals not exactly representing how food was traded and produced historically. I am fine with numbers in-game for how much food a noble consumes or a peasant—these are abstractions to get the game working. I can imagine a noble eating very expensive food, which is the abstraction for why he needs \"more\" food. But if I cannot even imagine how it would make sense in our world, I will likely only add it to get the game working at all.\n\nThanks:\nA sincere thank you to everyone who reported bugs, helped with balancing, and took the time to share feedback. Thank you as well to everyone who created compatibility patches and collections around Prosper or Perish, and to the EU5 Mod Coop Discord for the discussions, help, and support.\n\nA special thank you to Karkento for letting me spam him with ideas nonstop and for helping so much with balancing and ideas.\n\nThanks as well to Noslon for providing valuable feedback and good solutions to fix the employment system.\n\nAnd a special thank you to Regal Urangutan for creating the EU5 2.0 collection centered around P&P, and for always being ready to chat and excited to talk about EU5.","icon_texture":"gfx/interface/icons/flat_icons/trade_market/food_stockpile.dds","definition":{"key":"prosper_perish_mod","file":"main_menu/common/game_concepts/pp_overview.txt","line":3,"family":"food","texture":"flat_icons/trade_market/food_stockpile","aliases":["prosper_or_perish"]},"source":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concept":"main_menu/common/game_concepts/pp_overview.txt"},"links":["pp_food","pp_food_consumption","pp_prosperity","pp_variable_harvests"],"body_html":"<h3>The Mod:<\/h3>\n<p>This mod overhauls the food system until it is fundamentally different from vanilla. After hundreds of modifier and advance changes and many hours of balancing, food is now the primary driver of pop growth and migration—replacing the old ties to <a class=\"concept-link\" href=\"#pp-prosperity\">P&amp;P: Prosperity<\/a>, Development and similar factors, which instead now shape food capacity and growth.<\/p>\n<p>You will see a sharp split between rural farming locations urbanized rich cities, incentives for local manufacturing in provinces to ease capital-centric &quot;clumping,&quot; and higher infrastructure costs so Roads become a strategic choice rather than something to spam.<\/p>\n<p>The core loop is simple: full province and low food prices mean strong growth and many other benefits; empty storages and high prices mean heavy emigration, pop demotion, death and other bad outcomes.<\/p>\n<p>The mod adds new Buildings, new production methods and a new Trade good. When you create a new game, check the game rules for Prosper or Perish: you can disable <span class=\"concept-ref\">Pp Variable Harvests<\/span> if you want a steadier food economy without yearly harvest swings. You can also make the campaign harder—higher player building upkeep, stronger AI food efficiency, or cheaper AI building upkeep—or leave everything on defaults for the standard mod experience.<\/p>\n<p>Please read at least <a class=\"concept-link\" href=\"#pp-food\">P&amp;P: Food Production<\/a> and <a class=\"concept-link\" href=\"#pp-food-consumption\">P&amp;P: Food Consumption<\/a>; they should be enough to get you playing.<\/p>\n<h3>Feedback:<\/h3>\n<p>I really need feedback for specific regions—send it on Steam as a PM or in the mod comments. If some regions look weird or super ahistoric, show me where and I will try to fix it. Same with Cookery recipes: we may need to add more to represent some regions. Please confirm it is not caused by other mods before sending screenshots.<\/p>\n<p>There are many other changes not covered here. If something is confusing or I forgot to document it, tell me and I will try to add it to this Europedia in the future.<\/p>\n<h3>How I Add Features:<\/h3>\n<p>I follow this checklist:<\/p>\n<ul><li>Is the mechanic fun to manage for the player?<\/li><li>Is the mechanic a concept that can be understood historically?<\/li><li>Is the AI able to handle the mechanic?<\/li><\/ul>\n<p>I am fine with victuals not exactly representing how food was traded and produced historically. I am fine with numbers in-game for how much food a noble consumes or a peasant—these are abstractions to get the game working. I can imagine a noble eating very expensive food, which is the abstraction for why he needs &quot;more&quot; food. But if I cannot even imagine how it would make sense in our world, I will likely only add it to get the game working at all.<\/p>\n<h3>Thanks:<\/h3>\n<p>A sincere thank you to everyone who reported bugs, helped with balancing, and took the time to share feedback. Thank you as well to everyone who created compatibility patches and collections around Prosper or Perish, and to the EU5 Mod Coop Discord for the discussions, help, and support.<\/p>\n<p>A special thank you to Karkento for letting me spam him with ideas nonstop and for helping so much with balancing and ideas.<\/p>\n<p>Thanks as well to Noslon for providing valuable feedback and good solutions to fix the employment system.<\/p>\n<p>And a special thank you to Regal Urangutan for creating the EU5 2.0 collection centered around P&amp;P, and for always being ready to chat and excited to talk about EU5.<\/p>"},{"id":"pp-faq","order":4,"filter":"faq","filter_label":"F.A.Q.","concept_key":"pp_faq","title_key":"game_concept_pp_faq","body_key":"game_concept_pp_faq_desc","title":"F.A.Q.","body_raw":"#T Q: This is overwhelming what do I even do?:#!\nPlay a small country. Build Cookeries to produce victuals in a province. Then build a Victuals Market there. Be careful with overbuilding and watch your province food like a hawk. That's basically it.\n\n#T Q: Why this somewhat games system of victual market?:#!\nOne of the main reasons is that there is NO way in vanilla to directly convert food \"goods\" into actual food for the food market. They are completely separate systems.\n\n#T Q: Why are laborers and soldiers considered \"upper class\" pops now?:#!\nSo they can demote during a famine. If they couldn't, you'd get endless death loops where peasants constantly promote to fill empty mining jobs only to instantly starve to death.\n\n#T Q: My economy crashes and everyone starves on day one. Is the mod broken?:#!\nTry not to leave your food slider maxed out all the time if you're struggling to afford it. It helps to let the global economy stabilize for the first few years. Also, make sure to load this mod last in your playset to prevent other mods from breaking it.\n\n#T Q: The variable harvest is too punishing. Will you nerf it?:#!\nI'd prefer not to, as it's designed to be impactful and make you plan ahead. However, if you find it too harsh for your playstyle, there are game settings available to turn it off.\n\n#T Q: Dude I got horrible harvests and no economy, now my people starve??:#!\nSometimes this happens. Depending on how you play and how rich your country is, you will be able to avoid it. But don't expect every country to be able to avoid it at all times. As with all things in this game, it's a trade-off: keeping only your core provinces fed, or bankrupting yourself to avoid starvation—it's your choice.\n\n#T Q: Why do buildings get more expensive the more you have in a location?:#!\nReal estate gets expensive in crowded cities. This is intended to encourage you to spread out and specialize your production centers instead of stacking 500 buildings in a single location.\n\n#T Q: Why does building up my city reduce my farm capacity?:#!\nBecause cities take up physical space. It represents the trade-off between a sprawling metropolis and open farmland. If you want to maximize a location's farm output, it's best to keep it rural.\n\n#T Q: Why don't trade goods give food directly anymore?:#!\nThe vanilla market system led to weird situations where you'd have a massive overproduction of food goods but zero actual food in the market, or vice versa. The vanilla food production modifiers are also a bit buggy and mathematically illogical right now, so this change makes the system much more reliable.\n\n#T Q: What is going on with the food price and its modifiers?:#!\nVery long story short, selling food has INSANE debuffs in vanilla. When market food reaches max or 0 the food price BUGS out completely. I had to go to great lengths to work around these bugs. The values may look wonky because of this, but this is intended and working great.\n\n#T Q: Province food storage does not show the correct modifier, what's going on?:#!\nThis is another EU5 beta visual bug. The modifier is actually applying and working correctly under the hood, the UI just isn't displaying it properly. I have reported this one as well.\n\n#T Q: Are my 14 other mods compatible with your mod?:#!\nI honestly couldn't tell you. I can't check compatibility for every possible combination of mods out there. P&P is compatible with Faster Universalis. Some great folks in the community have made compatibility patches, so I highly recommend searching for those! Otherwise, my best advice is to load Prosper and Perish last and just test it out to see how it runs.\n\n#T Q: I started a new game i see 5mio buildings being build, what is this bug?:#!\nIts not a bug, its a script that tries to build new buildings and farms so the game starting conditions make sense with the all the mods changes. Its aimed at reducing crazy starvation and other issues. It will be refined more based on your feedback\n\n#T Q: Okay i understand, any tips maybe?:#!\nYes, be VERY wary of spiritualism and aristocracy. The extra nobles and clerics you get in cities can be extremely painful, because they scale with your population. Also check estate buildings once in a while. Toll castles for example DOUBLE noble food consumption if your estate builds them.\n\n#T Q: Your Update ruined my save man.:#!\nDon't worry. All prior releases are found here https://github.com/JanB1989/ProsperOrPerish/releases . Just unzip the file, in there you find a folder (next to the readme) \"Prosper or Perish (Population Growth & Food Rework)\" and you just copy that into C:\\Users\\YourUserName\\Documents\\Paradox Interactive\\Europa Universalis V\\mod and you have it available in game.\n\n#T Q: Why can i only build granaries in the province Capital?:#!\nBecause in ingame terms this is where food decay is calculated and food enters the market from your province. Granaries now reduce food decay, so they should be built in the province capital.\n\n#T Q: Bro the estates spam victual markets everywhere:#!\nThis is needed for the AI to perform much better, remember you can just turn them off for no maintenance cost (dont destroy them they will rebuild)\n\n#T Q: Why do victuals add 0.001 food or whatever?:#!\nThis is so that victuals are considered food by the game, which means their price can also rise if food price is high in the market. You can ignore it since it's so miniscule.\n\n#T Q: How do I install the GitHub beta branch?:#!\nGo to https://github.com/JanB1989/ProsperOrPerish, open the branch menu, select the branch you want (such as beta), and download the latest ZIP. You can see when branches were last updated. The archive contains two folders; the mod is in \"Prosper or Perish (Population Growth & Food Rework)\". Copy that folder into your EU5 mod directory: Documents\\Paradox Interactive\\Europa Universalis V\\mod (for example C:\\Users\\YourUserName\\Documents\\Paradox Interactive\\Europa Universalis V\\mod).","body_plain":"Q: This is overwhelming what do I even do?:\nPlay a small country. Build Cookeries to produce victuals in a province. Then build a Victuals Market there. Be careful with overbuilding and watch your province food like a hawk. That's basically it.\n\nQ: Why this somewhat games system of victual market?:\nOne of the main reasons is that there is NO way in vanilla to directly convert food \"goods\" into actual food for the food market. They are completely separate systems.\n\nQ: Why are laborers and soldiers considered \"upper class\" pops now?:\nSo they can demote during a famine. If they couldn't, you'd get endless death loops where peasants constantly promote to fill empty mining jobs only to instantly starve to death.\n\nQ: My economy crashes and everyone starves on day one. Is the mod broken?:\nTry not to leave your food slider maxed out all the time if you're struggling to afford it. It helps to let the global economy stabilize for the first few years. Also, make sure to load this mod last in your playset to prevent other mods from breaking it.\n\nQ: The variable harvest is too punishing. Will you nerf it?:\nI'd prefer not to, as it's designed to be impactful and make you plan ahead. However, if you find it too harsh for your playstyle, there are game settings available to turn it off.\n\nQ: Dude I got horrible harvests and no economy, now my people starve??:\nSometimes this happens. Depending on how you play and how rich your country is, you will be able to avoid it. But don't expect every country to be able to avoid it at all times. As with all things in this game, it's a trade-off: keeping only your core provinces fed, or bankrupting yourself to avoid starvation—it's your choice.\n\nQ: Why do buildings get more expensive the more you have in a location?:\nReal estate gets expensive in crowded cities. This is intended to encourage you to spread out and specialize your production centers instead of stacking 500 buildings in a single location.\n\nQ: Why does building up my city reduce my farm capacity?:\nBecause cities take up physical space. It represents the trade-off between a sprawling metropolis and open farmland. If you want to maximize a location's farm output, it's best to keep it rural.\n\nQ: Why don't trade goods give food directly anymore?:\nThe vanilla market system led to weird situations where you'd have a massive overproduction of food goods but zero actual food in the market, or vice versa. The vanilla food production modifiers are also a bit buggy and mathematically illogical right now, so this change makes the system much more reliable.\n\nQ: What is going on with the food price and its modifiers?:\nVery long story short, selling food has INSANE debuffs in vanilla. When market food reaches max or 0 the food price BUGS out completely. I had to go to great lengths to work around these bugs. The values may look wonky because of this, but this is intended and working great.\n\nQ: Province food storage does not show the correct modifier, what's going on?:\nThis is another EU5 beta visual bug. The modifier is actually applying and working correctly under the hood, the UI just isn't displaying it properly. I have reported this one as well.\n\nQ: Are my 14 other mods compatible with your mod?:\nI honestly couldn't tell you. I can't check compatibility for every possible combination of mods out there. P&P is compatible with Faster Universalis. Some great folks in the community have made compatibility patches, so I highly recommend searching for those! Otherwise, my best advice is to load Prosper and Perish last and just test it out to see how it runs.\n\nQ: I started a new game i see 5mio buildings being build, what is this bug?:\nIts not a bug, its a script that tries to build new buildings and farms so the game starting conditions make sense with the all the mods changes. Its aimed at reducing crazy starvation and other issues. It will be refined more based on your feedback\n\nQ: Okay i understand, any tips maybe?:\nYes, be VERY wary of spiritualism and aristocracy. The extra nobles and clerics you get in cities can be extremely painful, because they scale with your population. Also check estate buildings once in a while. Toll castles for example DOUBLE noble food consumption if your estate builds them.\n\nQ: Your Update ruined my save man.:\nDon't worry. All prior releases are found here https://github.com/JanB1989/ProsperOrPerish/releases . Just unzip the file, in there you find a folder (next to the readme) \"Prosper or Perish (Population Growth & Food Rework)\" and you just copy that into C:\\Users\\YourUserName\\Documents\\Paradox Interactive\\Europa Universalis V\\mod and you have it available in game.\n\nQ: Why can i only build granaries in the province Capital?:\nBecause in ingame terms this is where food decay is calculated and food enters the market from your province. Granaries now reduce food decay, so they should be built in the province capital.\n\nQ: Bro the estates spam victual markets everywhere:\nThis is needed for the AI to perform much better, remember you can just turn them off for no maintenance cost (dont destroy them they will rebuild)\n\nQ: Why do victuals add 0.001 food or whatever?:\nThis is so that victuals are considered food by the game, which means their price can also rise if food price is high in the market. You can ignore it since it's so miniscule.\n\nQ: How do I install the GitHub beta branch?:\nGo to https://github.com/JanB1989/ProsperOrPerish, open the branch menu, select the branch you want (such as beta), and download the latest ZIP. You can see when branches were last updated. The archive contains two folders; the mod is in \"Prosper or Perish (Population Growth & Food Rework)\". Copy that folder into your EU5 mod directory: Documents\\Paradox Interactive\\Europa Universalis V\\mod (for example C:\\Users\\YourUserName\\Documents\\Paradox Interactive\\Europa Universalis V\\mod).","icon_texture":"gfx/interface/icons/flat_icons/effect.dds","definition":{"key":"pp_faq","file":"main_menu/common/game_concepts/pp_faq.txt","line":2,"family":"food","texture":"flat_icons/effect","aliases":[]},"source":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concept":"main_menu/common/game_concepts/pp_faq.txt"},"links":[],"body_html":"<h3>Q: This is overwhelming what do I even do?:<\/h3>\n<p>Play a small country. Build Cookeries to produce victuals in a province. Then build a Victuals Market there. Be careful with overbuilding and watch your province food like a hawk. That&#x27;s basically it.<\/p>\n<h3>Q: Why this somewhat games system of victual market?:<\/h3>\n<p>One of the main reasons is that there is NO way in vanilla to directly convert food &quot;goods&quot; into actual food for the food market. They are completely separate systems.<\/p>\n<h3>Q: Why are laborers and soldiers considered &quot;upper class&quot; pops now?:<\/h3>\n<p>So they can demote during a famine. If they couldn&#x27;t, you&#x27;d get endless death loops where peasants constantly promote to fill empty mining jobs only to instantly starve to death.<\/p>\n<h3>Q: My economy crashes and everyone starves on day one. Is the mod broken?:<\/h3>\n<p>Try not to leave your food slider maxed out all the time if you&#x27;re struggling to afford it. It helps to let the global economy stabilize for the first few years. Also, make sure to load this mod last in your playset to prevent other mods from breaking it.<\/p>\n<h3>Q: The variable harvest is too punishing. Will you nerf it?:<\/h3>\n<p>I&#x27;d prefer not to, as it&#x27;s designed to be impactful and make you plan ahead. However, if you find it too harsh for your playstyle, there are game settings available to turn it off.<\/p>\n<h3>Q: Dude I got horrible harvests and no economy, now my people starve??:<\/h3>\n<p>Sometimes this happens. Depending on how you play and how rich your country is, you will be able to avoid it. But don&#x27;t expect every country to be able to avoid it at all times. As with all things in this game, it&#x27;s a trade-off: keeping only your core provinces fed, or bankrupting yourself to avoid starvation—it&#x27;s your choice.<\/p>\n<h3>Q: Why do buildings get more expensive the more you have in a location?:<\/h3>\n<p>Real estate gets expensive in crowded cities. This is intended to encourage you to spread out and specialize your production centers instead of stacking 500 buildings in a single location.<\/p>\n<h3>Q: Why does building up my city reduce my farm capacity?:<\/h3>\n<p>Because cities take up physical space. It represents the trade-off between a sprawling metropolis and open farmland. If you want to maximize a location&#x27;s farm output, it&#x27;s best to keep it rural.<\/p>\n<h3>Q: Why don&#x27;t trade goods give food directly anymore?:<\/h3>\n<p>The vanilla market system led to weird situations where you&#x27;d have a massive overproduction of food goods but zero actual food in the market, or vice versa. The vanilla food production modifiers are also a bit buggy and mathematically illogical right now, so this change makes the system much more reliable.<\/p>\n<h3>Q: What is going on with the food price and its modifiers?:<\/h3>\n<p>Very long story short, selling food has INSANE debuffs in vanilla. When market food reaches max or 0 the food price BUGS out completely. I had to go to great lengths to work around these bugs. The values may look wonky because of this, but this is intended and working great.<\/p>\n<h3>Q: Province food storage does not show the correct modifier, what&#x27;s going on?:<\/h3>\n<p>This is another EU5 beta visual bug. The modifier is actually applying and working correctly under the hood, the UI just isn&#x27;t displaying it properly. I have reported this one as well.<\/p>\n<h3>Q: Are my 14 other mods compatible with your mod?:<\/h3>\n<p>I honestly couldn&#x27;t tell you. I can&#x27;t check compatibility for every possible combination of mods out there. P&amp;P is compatible with Faster Universalis. Some great folks in the community have made compatibility patches, so I highly recommend searching for those! Otherwise, my best advice is to load Prosper and Perish last and just test it out to see how it runs.<\/p>\n<h3>Q: I started a new game i see 5mio buildings being build, what is this bug?:<\/h3>\n<p>Its not a bug, its a script that tries to build new buildings and farms so the game starting conditions make sense with the all the mods changes. Its aimed at reducing crazy starvation and other issues. It will be refined more based on your feedback<\/p>\n<h3>Q: Okay i understand, any tips maybe?:<\/h3>\n<p>Yes, be VERY wary of spiritualism and aristocracy. The extra nobles and clerics you get in cities can be extremely painful, because they scale with your population. Also check estate buildings once in a while. Toll castles for example DOUBLE noble food consumption if your estate builds them.<\/p>\n<h3>Q: Your Update ruined my save man.:<\/h3>\n<p>Don&#x27;t worry. All prior releases are found here https://github.com/JanB1989/ProsperOrPerish/releases . Just unzip the file, in there you find a folder (next to the readme) &quot;Prosper or Perish (Population Growth &amp; Food Rework)&quot; and you just copy that into C:\\Users\\YourUserName\\Documents\\Paradox Interactive\\Europa Universalis V\\mod and you have it available in game.<\/p>\n<h3>Q: Why can i only build granaries in the province Capital?:<\/h3>\n<p>Because in ingame terms this is where food decay is calculated and food enters the market from your province. Granaries now reduce food decay, so they should be built in the province capital.<\/p>\n<h3>Q: Bro the estates spam victual markets everywhere:<\/h3>\n<p>This is needed for the AI to perform much better, remember you can just turn them off for no maintenance cost (dont destroy them they will rebuild)<\/p>\n<h3>Q: Why do victuals add 0.001 food or whatever?:<\/h3>\n<p>This is so that victuals are considered food by the game, which means their price can also rise if food price is high in the market. You can ignore it since it&#x27;s so miniscule.<\/p>\n<h3>Q: How do I install the GitHub beta branch?:<\/h3>\n<p>Go to https://github.com/JanB1989/ProsperOrPerish, open the branch menu, select the branch you want (such as beta), and download the latest ZIP. You can see when branches were last updated. The archive contains two folders; the mod is in &quot;Prosper or Perish (Population Growth &amp; Food Rework)&quot;. Copy that folder into your EU5 mod directory: Documents\\Paradox Interactive\\Europa Universalis V\\mod (for example C:\\Users\\YourUserName\\Documents\\Paradox Interactive\\Europa Universalis V\\mod).<\/p>"},{"id":"pp-urbanization","order":5,"filter":"urbanization","filter_label":"Urbanisation","concept_key":"pp_urbanization","title_key":"game_concept_pp_urbanization","body_key":"game_concept_pp_urbanization_desc","title":"P&P: Urbanization","body_raw":"Over Europa Universalis 5's timeframe, large parts of the rural population moved to cities. This was driven by rising rural productivity: as farms and other rural producers produced more with fewer hands, fewer people were needed in the countryside to feed everyone. You will naturally urbanize more over time as advances and investments raise [pp_farm_output|e].\n\nEach location represents a large area of land—many villages, some towns, and often cities. Building more in a location increases urbanization and thereby reduces parts of its [pp_farm_capacity|e]. It does not reduce the output of existing farms; it simply limits how many land-farm, forest, and lumber levels you can sustain. The trade-off is clear: urbanize a location for manufacturing and [pp_population_capacity|e], or keep it rural to maximize resource production. See [pp_farm_capacity|e] for how capacity is calculated, which buildings are affected, and how the building-order rules work.\n\n#T Affected buildings:#!\nThese rural buildings and building families lose capacity as you urbanize:\n\n$BULLET$ Land-farm buildings that use Building Capacity\n$BULLET$ Forest and lumber buildings that use Forest Capacity","body_plain":"Over Europa Universalis 5's timeframe, large parts of the rural population moved to cities. This was driven by rising rural productivity: as farms and other rural producers produced more with fewer hands, fewer people were needed in the countryside to feed everyone. You will naturally urbanize more over time as advances and investments raise Pp Farm Output.\n\nEach location represents a large area of land—many villages, some towns, and often cities. Building more in a location increases urbanization and thereby reduces parts of its Pp Farm Capacity. It does not reduce the output of existing farms; it simply limits how many land-farm, forest, and lumber levels you can sustain. The trade-off is clear: urbanize a location for manufacturing and Pp Population Capacity, or keep it rural to maximize resource production. See Pp Farm Capacity for how capacity is calculated, which buildings are affected, and how the building-order rules work.\n\nAffected buildings:\nThese rural buildings and building families lose capacity as you urbanize:\n\n-  Land-farm buildings that use Building Capacity\n-  Forest and lumber buildings that use Forest Capacity","icon_texture":"gfx/interface/icons/flat_icons/building_panel/employees.dds","definition":{"key":"pp_urbanization","file":"main_menu/common/game_concepts/pp_urbanisation.txt","line":2,"family":"food","texture":"flat_icons/building_panel/employees","aliases":[]},"source":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concept":"main_menu/common/game_concepts/pp_urbanisation.txt"},"links":["pp_farm_capacity","pp_farm_output","pp_population_capacity"],"body_html":"<p>Over Europa Universalis 5&#x27;s timeframe, large parts of the rural population moved to cities. This was driven by rising rural productivity: as farms and other rural producers produced more with fewer hands, fewer people were needed in the countryside to feed everyone. You will naturally urbanize more over time as advances and investments raise <a class=\"concept-link\" href=\"#pp-farm-output\">P&amp;P: Building Output<\/a>.<\/p>\n<p>Each location represents a large area of land—many villages, some towns, and often cities. Building more in a location increases urbanization and thereby reduces parts of its <a class=\"concept-link\" href=\"#pp-farm-capacity\">P&amp;P: Building Capacity<\/a>. It does not reduce the output of existing farms; it simply limits how many land-farm, forest, and lumber levels you can sustain. The trade-off is clear: urbanize a location for manufacturing and <a class=\"concept-link\" href=\"#pp-population-capacity\">P&amp;P: Population Capacity<\/a>, or keep it rural to maximize resource production. See <a class=\"concept-link\" href=\"#pp-farm-capacity\">P&amp;P: Building Capacity<\/a> for how capacity is calculated, which buildings are affected, and how the building-order rules work.<\/p>\n<h3>Affected buildings:<\/h3>\n<p>These rural buildings and building families lose capacity as you urbanize:<\/p>\n<ul><li>Land-farm buildings that use Building Capacity<\/li><li>Forest and lumber buildings that use Forest Capacity<\/li><\/ul>"},{"id":"pp-food-in-eu5","order":6,"filter":"food_in_eu5","filter_label":"Food in EU5","concept_key":"pp_food_in_eu5","title_key":"game_concept_pp_food_in_eu5","body_key":"game_concept_pp_food_in_eu5_desc","title":"Food in EU5","body_raw":"#T Food in Vanilla EU5:#!\nFood in Europa Universalis 5 is tricky to understand because food goods and actual food split into separate systems.\n\nVanilla food has three main sources:\n\n$BULLET$ #Y Food goods#! such as rice, livestock, wheat, and fish. The amount produced is multiplied by that good's food value.\n$BULLET$ #Y Subsistence agriculture#! from unemployed peasants. This creates food directly and is not tied to a trade good.\n$BULLET$ #Y Flat food sources#! from buildings. These create food directly and are not tied to a food trade good.\n\nThose sources are summed in the location and then multiplied by local food productivity. After that, the trade good and the food are separate. The good enters the goods market through market access. The food enters the province food storage, which is shared by all locations in that province.\n\nLocations can have a food surplus or deficit. They resolve that against province storage first. If storage is high enough, the province can sell food to the separate country food market. If the country buys food, provinces can draw food back from that market.\n\nThe biggest problems are:\n\n$BULLET$ A market can have huge food-good surpluses while the food market is empty and people starve, or the reverse. The split gets stranger as the game progresses.\n$BULLET$ Food productivity multiplies every local food source. A location with excellent farmland can end up multiplying fish, subsistence food, or flat building food in the same way.\n$BULLET$ Food RGOs scale too strongly with food productivity, so stacking food RGOs and productivity becomes dominant.\n$BULLET$ Some goods that could reasonably count as food or drink, such as beer and wine, have no food value.\n\n#T Prosper or Perish:#!\nProsper or Perish keeps the same broad food-storage system, but changes what feeds it.\n\nFood sources in Prosper or Perish are:\n\n$BULLET$ #Y [ShowGoodsName('victuals')|e]#!, the main food good. It represents meals, rations, and preserved provisions.\n$BULLET$ #Y Subsistence agriculture#! from unemployed peasants, as in vanilla.\n$BULLET$ #Y Absolute food sources#! from buildings such as [ShowBuildingTypeName('victuals_market')|e].\n\nHow the P&P system works:\n\n$BULLET$ Food productivity is removed. The goal is to keep [ShowGoodsName('victuals')|e] in the goods market connected to actual food availability.\n$BULLET$ Excess [ShowGoodsName('victuals')|e] can be converted into local food through [ShowBuildingTypeName('victuals_market')|e], or used by buildings such as docks and armories as rations and supplies.\n$BULLET$ [ShowBuildingTypeName('cookery')|e] turns many regional food goods into [ShowGoodsName('victuals')|e], so surplus grain, meat, fish, salt, and similar goods can feed the food chain through the goods market.\n$BULLET$ Instead of one food productivity modifier, locations now have raw-material output modifiers based on historical and geographic data. A location can be good at producing fish without making every other food source there explode.\n\nFor the practical P&P production chain, see [pp_food|e]. For local raw-material productivity, see [pp_farm_output|e].","body_plain":"Food in Vanilla EU5:\nFood in Europa Universalis 5 is tricky to understand because food goods and actual food split into separate systems.\n\nVanilla food has three main sources:\n\n-  Food goods such as rice, livestock, wheat, and fish. The amount produced is multiplied by that good's food value.\n-  Subsistence agriculture from unemployed peasants. This creates food directly and is not tied to a trade good.\n-  Flat food sources from buildings. These create food directly and are not tied to a food trade good.\n\nThose sources are summed in the location and then multiplied by local food productivity. After that, the trade good and the food are separate. The good enters the goods market through market access. The food enters the province food storage, which is shared by all locations in that province.\n\nLocations can have a food surplus or deficit. They resolve that against province storage first. If storage is high enough, the province can sell food to the separate country food market. If the country buys food, provinces can draw food back from that market.\n\nThe biggest problems are:\n\n-  A market can have huge food-good surpluses while the food market is empty and people starve, or the reverse. The split gets stranger as the game progresses.\n-  Food productivity multiplies every local food source. A location with excellent farmland can end up multiplying fish, subsistence food, or flat building food in the same way.\n-  Food RGOs scale too strongly with food productivity, so stacking food RGOs and productivity becomes dominant.\n-  Some goods that could reasonably count as food or drink, such as beer and wine, have no food value.\n\nProsper or Perish:\nProsper or Perish keeps the same broad food-storage system, but changes what feeds it.\n\nFood sources in Prosper or Perish are:\n\n-  Victuals, the main food good. It represents meals, rations, and preserved provisions.\n-  Subsistence agriculture from unemployed peasants, as in vanilla.\n-  Absolute food sources from buildings such as Victuals Market.\n\nHow the P&P system works:\n\n-  Food productivity is removed. The goal is to keep Victuals in the goods market connected to actual food availability.\n-  Excess Victuals can be converted into local food through Victuals Market, or used by buildings such as docks and armories as rations and supplies.\n-  Cookery turns many regional food goods into Victuals, so surplus grain, meat, fish, salt, and similar goods can feed the food chain through the goods market.\n-  Instead of one food productivity modifier, locations now have raw-material output modifiers based on historical and geographic data. A location can be good at producing fish without making every other food source there explode.\n\nFor the practical P&P production chain, see Pp Food. For local raw-material productivity, see Pp Farm Output.","icon_texture":"gfx/interface/icons/flat_icons/trade_market/food_stockpile.dds","definition":{"key":"pp_food_in_eu5","file":"main_menu/common/game_concepts/pp_food_in_eu5.txt","line":2,"family":"food","texture":"flat_icons/trade_market/food_stockpile","aliases":[]},"source":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concept":"main_menu/common/game_concepts/pp_food_in_eu5.txt"},"links":["pp_farm_output","pp_food"],"body_html":"<h3>Food in Vanilla EU5:<\/h3>\n<p>Food in Europa Universalis 5 is tricky to understand because food goods and actual food split into separate systems.<\/p>\n<p>Vanilla food has three main sources:<\/p>\n<ul><li><strong>Food goods<\/strong> such as rice, livestock, wheat, and fish. The amount produced is multiplied by that good&#x27;s food value.<\/li><li><strong>Subsistence agriculture<\/strong> from unemployed peasants. This creates food directly and is not tied to a trade good.<\/li><li><strong>Flat food sources<\/strong> from buildings. These create food directly and are not tied to a food trade good.<\/li><\/ul>\n<p>Those sources are summed in the location and then multiplied by local food productivity. After that, the trade good and the food are separate. The good enters the goods market through market access. The food enters the province food storage, which is shared by all locations in that province.<\/p>\n<p>Locations can have a food surplus or deficit. They resolve that against province storage first. If storage is high enough, the province can sell food to the separate country food market. If the country buys food, provinces can draw food back from that market.<\/p>\n<p>The biggest problems are:<\/p>\n<ul><li>A market can have huge food-good surpluses while the food market is empty and people starve, or the reverse. The split gets stranger as the game progresses.<\/li><li>Food productivity multiplies every local food source. A location with excellent farmland can end up multiplying fish, subsistence food, or flat building food in the same way.<\/li><li>Food RGOs scale too strongly with food productivity, so stacking food RGOs and productivity becomes dominant.<\/li><li>Some goods that could reasonably count as food or drink, such as beer and wine, have no food value.<\/li><\/ul>\n<h3>Prosper or Perish:<\/h3>\n<p>Prosper or Perish keeps the same broad food-storage system, but changes what feeds it.<\/p>\n<p>Food sources in Prosper or Perish are:<\/p>\n<ul><li><strong><span class=\"token token-good\">Victuals<\/span><\/strong>, the main food good. It represents meals, rations, and preserved provisions.<\/li><li><strong>Subsistence agriculture<\/strong> from unemployed peasants, as in vanilla.<\/li><li><strong>Absolute food sources<\/strong> from buildings such as <span class=\"token token-building\">Victuals Market<\/span>.<\/li><\/ul>\n<p>How the P&amp;P system works:<\/p>\n<ul><li>Food productivity is removed. The goal is to keep <span class=\"token token-good\">Victuals<\/span> in the goods market connected to actual food availability.<\/li><li>Excess <span class=\"token token-good\">Victuals<\/span> can be converted into local food through <span class=\"token token-building\">Victuals Market<\/span>, or used by buildings such as docks and armories as rations and supplies.<\/li><li><span class=\"token token-building\">Cookery<\/span> turns many regional food goods into <span class=\"token token-good\">Victuals<\/span>, so surplus grain, meat, fish, salt, and similar goods can feed the food chain through the goods market.<\/li><li>Instead of one food productivity modifier, locations now have raw-material output modifiers based on historical and geographic data. A location can be good at producing fish without making every other food source there explode.<\/li><\/ul>\n<p>For the practical P&amp;P production chain, see <a class=\"concept-link\" href=\"#pp-food\">P&amp;P: Food Production<\/a>. For local raw-material productivity, see <a class=\"concept-link\" href=\"#pp-farm-output\">P&amp;P: Building Output<\/a>.<\/p>"},{"id":"pp-food","order":7,"filter":"food","filter_label":"Food Production","concept_key":"pp_food","title_key":"game_concept_pp_food","body_key":"game_concept_pp_food_desc","title":"P&P: Food Production","body_raw":"#T What This Page Covers:#!\nThis page is about producing food in Prosper or Perish. For the vanilla food system and why P&P changes it, see [pp_food_in_eu5|e].\n\n#T Food Sources:#!\nP&P food comes from three places:\n\n$BULLET$ [ShowBuildingTypeName('cookery')|e] and [ShowBuildingTypeName('victualling_yard')|e] refine regional goods into [ShowGoodsName('victuals')|e]. Since [ShowGoodsName('victuals')|e] have food value, producing them also creates food.\n$BULLET$ [ShowBuildingTypeName('victuals_market')|e] converts [ShowGoodsName('victuals')|e] into local food for the province.\n$BULLET$ Unemployed peasants still produce a small amount of subsistence food directly.\n\n#T The Production Chain:#!\nThe intended chain is simple:\n\n$BULLET$ Produce regional food goods such as grain, meat, fish, fruit, salt, and similar goods.\n$BULLET$ Turn those goods into [ShowGoodsName('victuals')|e] through [ShowBuildingTypeName('cookery')|e].\n$BULLET$ Use [ShowBuildingTypeName('victuals_market')|e] where a province needs direct local food.\n\n[ShowGoodsName('victuals')|e] are also useful as an input good for buildings such as docks and armories. The exact inputs, outputs, and conversion rates are shown in building and production-method tooltips.\n\n#T Local Production:#!\nFood productivity is removed. Raw materials instead use specific local output modifiers. A location can be strong at fish, grain, livestock, fruit, or another resource without making every food source in that location stronger.\n\nUse building tooltips, local output map modes, [pp_farm_output|e], and [pp_variable_harvests|e] to understand what a location is good at producing.\n\n#T Practical Rule:#!\nIf a province struggles with food, check whether it has enough raw food inputs, enough [ShowBuildingTypeName('cookery')|e] capacity, enough [ShowGoodsName('victuals')|e], and enough [ShowBuildingTypeName('victuals_market')|e] levels.","body_plain":"What This Page Covers:\nThis page is about producing food in Prosper or Perish. For the vanilla food system and why P&P changes it, see Pp Food In Eu5.\n\nFood Sources:\nP&P food comes from three places:\n\n-  Cookery and Victualling Yard refine regional goods into Victuals. Since Victuals have food value, producing them also creates food.\n-  Victuals Market converts Victuals into local food for the province.\n-  Unemployed peasants still produce a small amount of subsistence food directly.\n\nThe Production Chain:\nThe intended chain is simple:\n\n-  Produce regional food goods such as grain, meat, fish, fruit, salt, and similar goods.\n-  Turn those goods into Victuals through Cookery.\n-  Use Victuals Market where a province needs direct local food.\n\nVictuals are also useful as an input good for buildings such as docks and armories. The exact inputs, outputs, and conversion rates are shown in building and production-method tooltips.\n\nLocal Production:\nFood productivity is removed. Raw materials instead use specific local output modifiers. A location can be strong at fish, grain, livestock, fruit, or another resource without making every food source in that location stronger.\n\nUse building tooltips, local output map modes, Pp Farm Output, and Pp Variable Harvests to understand what a location is good at producing.\n\nPractical Rule:\nIf a province struggles with food, check whether it has enough raw food inputs, enough Cookery capacity, enough Victuals, and enough Victuals Market levels.","icon_texture":"gfx/interface/icons/flat_icons/trade_market/food_stockpile.dds","definition":{"key":"pp_food","file":"main_menu/common/game_concepts/pp_food_production.txt","line":3,"family":"food","texture":"flat_icons/trade_market/food_stockpile","aliases":[]},"source":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concept":"main_menu/common/game_concepts/pp_food_production.txt"},"links":["pp_farm_output","pp_food_in_eu5","pp_variable_harvests"],"body_html":"<h3>What This Page Covers:<\/h3>\n<p>This page is about producing food in Prosper or Perish. For the vanilla food system and why P&amp;P changes it, see <a class=\"concept-link\" href=\"#pp-food-in-eu5\">Food in EU5<\/a>.<\/p>\n<h3>Food Sources:<\/h3>\n<p>P&amp;P food comes from three places:<\/p>\n<ul><li><span class=\"token token-building\">Cookery<\/span> and <span class=\"token token-building\">Victualling Yard<\/span> refine regional goods into <span class=\"token token-good\">Victuals<\/span>. Since <span class=\"token token-good\">Victuals<\/span> have food value, producing them also creates food.<\/li><li><span class=\"token token-building\">Victuals Market<\/span> converts <span class=\"token token-good\">Victuals<\/span> into local food for the province.<\/li><li>Unemployed peasants still produce a small amount of subsistence food directly.<\/li><\/ul>\n<h3>The Production Chain:<\/h3>\n<p>The intended chain is simple:<\/p>\n<ul><li>Produce regional food goods such as grain, meat, fish, fruit, salt, and similar goods.<\/li><li>Turn those goods into <span class=\"token token-good\">Victuals<\/span> through <span class=\"token token-building\">Cookery<\/span>.<\/li><li>Use <span class=\"token token-building\">Victuals Market<\/span> where a province needs direct local food.<\/li><\/ul>\n<p><span class=\"token token-good\">Victuals<\/span> are also useful as an input good for buildings such as docks and armories. The exact inputs, outputs, and conversion rates are shown in building and production-method tooltips.<\/p>\n<h3>Local Production:<\/h3>\n<p>Food productivity is removed. Raw materials instead use specific local output modifiers. A location can be strong at fish, grain, livestock, fruit, or another resource without making every food source in that location stronger.<\/p>\n<p>Use building tooltips, local output map modes, <a class=\"concept-link\" href=\"#pp-farm-output\">P&amp;P: Building Output<\/a>, and <span class=\"concept-ref\">Pp Variable Harvests<\/span> to understand what a location is good at producing.<\/p>\n<h3>Practical Rule:<\/h3>\n<p>If a province struggles with food, check whether it has enough raw food inputs, enough <span class=\"token token-building\">Cookery<\/span> capacity, enough <span class=\"token token-good\">Victuals<\/span>, and enough <span class=\"token token-building\">Victuals Market<\/span> levels.<\/p>"},{"id":"pp-food-consumption","order":8,"filter":"food_consumption","filter_label":"Food Consumption","concept_key":"pp_food_consumption","title_key":"game_concept_pp_food_consumption","body_key":"game_concept_pp_food_consumption_desc","title":"P&P: Food Consumption","body_raw":"There are many ways to reduce peasant food consumption (they are more focused on subsistence), which directly increases how much food they contribute to the market. It might be worth it for population-rich rural countries to use these modifiers to your advantage. They are not very useful for already highly urbanized countries, who should rather build their own food industry or just buy it from the market.\n\nFood consumption varies with many factors. When food is cheap, people consume more—less rationing, choosier diets. When food is expensive, they consume less: more frugal, more focused on survival. Because of this link to well-being, food consumption modifiers are strong and have wide effects.\n\n#T What Impacts Food Consumption:#!\nSeveral factors change how much pops consume:\n\n$BULLET$ Local food price on the market (cheap vs expensive)\n$BULLET$ [pp_province_current_food_storage|e] (growing vs shrinking)\n$BULLET$ [pp_prosperity|e] of the location\n$BULLET$ Winter severity\n$BULLET$ [pp_devastation|e] and recovery conditions\n$BULLET$ Pop type (nobles, clergy, burghers, laborers, peasants, soldiers each have different base consumption)\n\nSee [pp_food_storage|e] for how storage works.\n\n#T Cheap food in the market and High food Storages in Provinces:#!\nWhen food is cheap on the market and province storages are well stocked, locations receive [pp_cheap_food|e] and provinces with growing storage receive [pp_province_current_food_storage|e]. Effects scale by how far below the base price the food price is.\n\n#T Display Note:#!\nBecause of Paradox scaling, the maximum value you can actually get is only half of the value shown below.\n\n[ShowModifierEffect('cheap_food_in_location')]\n\n#T Expensive food in the market and Low food Storages in Provinces:#!\nWhen food is expensive on the market and province storages are low or empty, locations receive [pp_expensive_food|e]. People consume less—they get more out of their food, are less picky, and minds focus on feeding families. Other priorities fall by the wayside. Effects scale by how far above the base price the food price is.\n\n#T Display Note:#!\nBecause of Paradox scaling, the maximum value you can actually get is only half of the value shown below.\n\n[ShowModifierEffect('expensive_food_in_location')]\n\nFood consumption modifiers are deliberately strong because consumption is tightly linked to living standards, labor quality, and social stability. [pp_prosperity|e] reinforces the loop: high food availability boosts prosperity, and prosperity in turn supports higher consumption and [population_growth|e].\n\n#T When You Run Out of food:#!\nWhen storages are empty, a province receives [ShowModifier('province_starving')]. People try to feed themselves by any means necessary. [pp_devastation|e] tends to rise, pops demote to lower classes that consume less, and people starve. Supply limit drops, migration attraction plummets, life expectancy falls, and people flee. [pp_prosperity|e] crashes. Soldiers are less willing to defend [starving|e] cities. See [pp_food_storage|e] and [pp_starvation|e].\n\n[ShowModifierEffect('province_starving')]\n\n#T Devastation:#!\n[pp_devastation|e] is best avoided and is caused by starvation or other horrible conditions (blockades, sieges, etc.). For full modifier details and the inversion note (devastation scales 0 to -100%).\n\n[ShowModifierEffect('devastation')]","body_plain":"There are many ways to reduce peasant food consumption (they are more focused on subsistence), which directly increases how much food they contribute to the market. It might be worth it for population-rich rural countries to use these modifiers to your advantage. They are not very useful for already highly urbanized countries, who should rather build their own food industry or just buy it from the market.\n\nFood consumption varies with many factors. When food is cheap, people consume more—less rationing, choosier diets. When food is expensive, they consume less: more frugal, more focused on survival. Because of this link to well-being, food consumption modifiers are strong and have wide effects.\n\nWhat Impacts Food Consumption:\nSeveral factors change how much pops consume:\n\n-  Local food price on the market (cheap vs expensive)\n-  Pp Province Current Food Storage (growing vs shrinking)\n-  Pp Prosperity of the location\n-  Winter severity\n-  Pp Devastation and recovery conditions\n-  Pop type (nobles, clergy, burghers, laborers, peasants, soldiers each have different base consumption)\n\nSee Pp Food Storage for how storage works.\n\nCheap food in the market and High food Storages in Provinces:\nWhen food is cheap on the market and province storages are well stocked, locations receive Pp Cheap Food and provinces with growing storage receive Pp Province Current Food Storage. Effects scale by how far below the base price the food price is.\n\nDisplay Note:\nBecause of Paradox scaling, the maximum value you can actually get is only half of the value shown below.\n\nCheap Food In Location\n\nExpensive food in the market and Low food Storages in Provinces:\nWhen food is expensive on the market and province storages are low or empty, locations receive Pp Expensive Food. People consume less—they get more out of their food, are less picky, and minds focus on feeding families. Other priorities fall by the wayside. Effects scale by how far above the base price the food price is.\n\nDisplay Note:\nBecause of Paradox scaling, the maximum value you can actually get is only half of the value shown below.\n\nExpensive Food In Location\n\nFood consumption modifiers are deliberately strong because consumption is tightly linked to living standards, labor quality, and social stability. Pp Prosperity reinforces the loop: high food availability boosts prosperity, and prosperity in turn supports higher consumption and Population Growth.\n\nWhen You Run Out of food:\nWhen storages are empty, a province receives Province Starving. People try to feed themselves by any means necessary. Pp Devastation tends to rise, pops demote to lower classes that consume less, and people starve. Supply limit drops, migration attraction plummets, life expectancy falls, and people flee. Pp Prosperity crashes. Soldiers are less willing to defend Starving cities. See Pp Food Storage and Pp Starvation.\n\nProvince Starving\n\nDevastation:\nPp Devastation is best avoided and is caused by starvation or other horrible conditions (blockades, sieges, etc.). For full modifier details and the inversion note (devastation scales 0 to -100%).\n\nDevastation","icon_texture":"gfx/interface/icons/flat_icons/trade_market/food_stockpile.dds","definition":{"key":"pp_food_consumption","file":"main_menu/common/game_concepts/pp_food_consumption.txt","line":2,"family":"food","texture":"flat_icons/trade_market/food_stockpile","aliases":[]},"source":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concept":"main_menu/common/game_concepts/pp_food_consumption.txt"},"links":["population_growth","pp_cheap_food","pp_devastation","pp_expensive_food","pp_food_storage","pp_prosperity","pp_province_current_food_storage","pp_starvation","starving"],"body_html":"<p>There are many ways to reduce peasant food consumption (they are more focused on subsistence), which directly increases how much food they contribute to the market. It might be worth it for population-rich rural countries to use these modifiers to your advantage. They are not very useful for already highly urbanized countries, who should rather build their own food industry or just buy it from the market.<\/p>\n<p>Food consumption varies with many factors. When food is cheap, people consume more—less rationing, choosier diets. When food is expensive, they consume less: more frugal, more focused on survival. Because of this link to well-being, food consumption modifiers are strong and have wide effects.<\/p>\n<h3>What Impacts Food Consumption:<\/h3>\n<p>Several factors change how much pops consume:<\/p>\n<ul><li>Local food price on the market (cheap vs expensive)<\/li><li><a class=\"concept-link\" href=\"#pp-province-current-food-storage\">P&amp;P: Province Current Food Storage<\/a> (growing vs shrinking)<\/li><li><a class=\"concept-link\" href=\"#pp-prosperity\">P&amp;P: Prosperity<\/a> of the location<\/li><li>Winter severity<\/li><li><a class=\"concept-link\" href=\"#pp-devastation\">P&amp;P: Devastation<\/a> and recovery conditions<\/li><li>Pop type (nobles, clergy, burghers, laborers, peasants, soldiers each have different base consumption)<\/li><\/ul>\n<p>See <span class=\"concept-ref\">Pp Food Storage<\/span> for how storage works.<\/p>\n<h3>Cheap food in the market and High food Storages in Provinces:<\/h3>\n<p>When food is cheap on the market and province storages are well stocked, locations receive <a class=\"concept-link\" href=\"#pp-cheap-food\">P&amp;P: Cheap Food in Location<\/a> and provinces with growing storage receive <a class=\"concept-link\" href=\"#pp-province-current-food-storage\">P&amp;P: Province Current Food Storage<\/a>. Effects scale by how far below the base price the food price is.<\/p>\n<h3>Display Note:<\/h3>\n<p>Because of Paradox scaling, the maximum value you can actually get is only half of the value shown below.<\/p>\n<p><span class=\"token token-effect\">modifier effects: Cheap Food In Location<\/span><\/p>\n<h3>Expensive food in the market and Low food Storages in Provinces:<\/h3>\n<p>When food is expensive on the market and province storages are low or empty, locations receive <a class=\"concept-link\" href=\"#pp-expensive-food\">P&amp;P: Expensive Food in Location<\/a>. People consume less—they get more out of their food, are less picky, and minds focus on feeding families. Other priorities fall by the wayside. Effects scale by how far above the base price the food price is.<\/p>\n<h3>Display Note:<\/h3>\n<p>Because of Paradox scaling, the maximum value you can actually get is only half of the value shown below.<\/p>\n<p><span class=\"token token-effect\">modifier effects: Expensive Food In Location<\/span><\/p>\n<p>Food consumption modifiers are deliberately strong because consumption is tightly linked to living standards, labor quality, and social stability. <a class=\"concept-link\" href=\"#pp-prosperity\">P&amp;P: Prosperity<\/a> reinforces the loop: high food availability boosts prosperity, and prosperity in turn supports higher consumption and <span class=\"concept-ref\">Population Growth<\/span>.<\/p>\n<h3>When You Run Out of food:<\/h3>\n<p>When storages are empty, a province receives <span class=\"token token-modifier\">Province Starving<\/span>. People try to feed themselves by any means necessary. <a class=\"concept-link\" href=\"#pp-devastation\">P&amp;P: Devastation<\/a> tends to rise, pops demote to lower classes that consume less, and people starve. Supply limit drops, migration attraction plummets, life expectancy falls, and people flee. <a class=\"concept-link\" href=\"#pp-prosperity\">P&amp;P: Prosperity<\/a> crashes. Soldiers are less willing to defend <span class=\"concept-ref\">Starving<\/span> cities. See <span class=\"concept-ref\">Pp Food Storage<\/span> and <a class=\"concept-link\" href=\"#pp-starvation\">P&amp;P: Starvation<\/a>.<\/p>\n<p><span class=\"token token-effect\">modifier effects: Province Starving<\/span><\/p>\n<h3>Devastation:<\/h3>\n<p><a class=\"concept-link\" href=\"#pp-devastation\">P&amp;P: Devastation<\/a> is best avoided and is caused by starvation or other horrible conditions (blockades, sieges, etc.). For full modifier details and the inversion note (devastation scales 0 to -100%).<\/p>\n<p><span class=\"token token-effect\">modifier effects: Devastation<\/span><\/p>"},{"id":"pp-victuals","order":9,"filter":"victuals","filter_label":"New Trade Goods","concept_key":"pp_victuals","title_key":"game_concept_pp_victuals","body_key":"game_concept_pp_victuals_desc","title":"P&P: New Trade Goods","body_raw":"[ShowGoodsName('victuals')|e] are prepared meals, provisions, and rations for civilians, armies, and navies.\n\nThey are produced by [ShowBuildingTypeName('cookery')|e] and [ShowBuildingTypeName('victualling_yard')|e], then distributed locally as food through [ShowBuildingTypeName('victuals_market')|e]. Exact conversion and method details are shown on the building tooltips. See [pp_cookery|e] for the building overview.","body_plain":"Victuals are prepared meals, provisions, and rations for civilians, armies, and navies.\n\nThey are produced by Cookery and Victualling Yard, then distributed locally as food through Victuals Market. Exact conversion and method details are shown on the building tooltips. See Pp Cookery for the building overview.","icon_texture":"gfx/interface/icons/trade_goods/icon_goods_victuals.dds","definition":{"key":"pp_victuals","file":"main_menu/common/game_concepts/pp_new_trade_goods.txt","line":2,"family":"food","texture":"flat_icons/trade_market/food_stockpile","aliases":[]},"source":{"gui":"in_game/gui/encyclopedia_lateralview.gui","localization":"main_menu/localization/english/pp_europedia_l_english.yml","concept":"main_menu/common/game_concepts/pp_new_trade_goods.txt"},"links":["pp_cookery"],"body_html":"<p><span class=\"token token-good\">Victuals<\/span> are prepared meals, provisions, and rations for civilians, armies, and navies.<\/p>\n<p>They are produced by <span class=\"token token-building\">Cookery<\/span> and <span class=\"token token-building\">Victualling Yard<\/span>, then distributed locally as food through
